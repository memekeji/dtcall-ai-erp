<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>盘点单表单</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="/static/layui/css/layui.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header layui-elem-quote" id="cardTitle">新增盘点单</div>
            <div class="layui-card-body">
                <form class="layui-form" id="checkForm">
                    <input type="hidden" name="id" id="id">
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">盘点单号</label>
                                <div class="layui-input-block">
                                    <input type="text" name="code" id="code" placeholder="系统自动生成" class="layui-input" readonly>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">盘点类型</label>
                                <div class="layui-input-block">
                                    <select name="check_type" id="check_type" lay-verify="required">
                                        <option value="partial">部分盘点</option>
                                        <option value="full">全仓盘点</option>
                                        <option value="cycle">循环盘点</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">盘点仓库</label>
                                <div class="layui-input-block">
                                    <select name="warehouse_id" id="warehouse_id" lay-verify="required">
                                        <option value="">请选择仓库</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">盘点类别</label>
                                <div class="layui-input-block">
                                    <select name="category_id" id="category_id">
                                        <option value="">全部分类</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <fieldset class="layui-elem-field">
                        <legend>盘点明细</legend>
                        <div class="layui-field-box">
                            <div id="itemsContainer">
                                <table class="layui-table" id="itemsTable">
                                    <thead>
                                        <tr>
                                            <th style="width: 20%;">物料</th>
                                            <th style="width: 15%;">库位</th>
                                            <th style="width: 12%;">批次号</th>
                                            <th style="width: 12%;">系统数量</th>
                                            <th style="width: 12%;">实盘数量</th>
                                            <th style="width: 12%;">差异数量</th>
                                            <th style="width: 12%;">差异金额</th>
                                            <th style="width: 5%;">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="itemsBody"></tbody>
                                </table>
                                <button type="button" class="layui-btn layui-btn-sm" id="addItemBtn">
                                    <i class="layui-icon">&#xe654;</i> 添加物料
                                </button>
                            </div>
                        </div>
                    </fieldset>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">备注</label>
                        <div class="layui-input-block">
                            <textarea name="remark" id="remark" placeholder="请输入备注" class="layui-textarea"></textarea>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button type="submit" class="layui-btn" lay-submit lay-filter="submitBtn">保存</button>
                            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="/static/js/lib/jquery.min.js"></script>
    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['form', 'layer'], function(){
            var form = layui.form;
            var layer = layui.layer;
            
            var id = getQueryParam('id');
            var items = [];
            
            if(id){
                $('#cardTitle').text('盘点单详情');
                loadData(id);
            } else {
                initForm();
            }
            
            function getQueryParam(name) {
                var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
                var r = window.location.search.substr(1).match(reg);
                if(r != null) return unescape(r[2]);
                return null;
            }
            
            function initForm(){
                $('#code').val('CK' + new Date().getTime());
                loadWarehouses();
                loadCategories();
                form.render();
            }
            
            function loadWarehouses(){
                $.ajax({
                    url: '/api/inventory/warehouse/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var html = '<option value="">请选择仓库</option>';
                            res.data.forEach(function(item){
                                html += '<option value="' + item.id + '">' + item.name + '</option>';
                            });
                            $('#warehouse_id').html(html);
                            form.render('select');
                        }
                    }
                });
            }
            
            function loadCategories(){
                $.ajax({
                    url: '/api/inventory/category/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var html = '<option value="">全部分类</option>';
                            res.data.forEach(function(item){
                                html += '<option value="' + item.id + '">' + item.name + '</option>';
                            });
                            $('#category_id').html(html);
                            form.render('select');
                        }
                    }
                });
            }
            
            function loadData(id){
                $.ajax({
                    url: '/api/inventory/check/' + id + '/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var data = res.data;
                            $('#id').val(data.id);
                            $('#code').val(data.code);
                            $('#check_type').val(data.check_type);
                            $('#warehouse_id').val(data.warehouse_id);
                            $('#category_id').val(data.category_id || '');
                            $('#remark').val(data.remark || '');
                            
                            items = data.items || [];
                            renderItems();
                            
                            loadWarehouses();
                            loadCategories();
                            form.render();
                        }
                    }
                });
            }
            
            $('#addItemBtn').click(function(){
                layer.open({
                    type: 2,
                    title: '选择物料',
                    area: ['800px', '600px'],
                    content: '/inventory/item/',
                    btn: ['确定', '取消'],
                    yes: function(index, layero){
                        var iframeWin = layero.find('iframe')[0].contentWindow;
                        var selectedData = iframeWin.getSelectedData();
                        if(selectedData && selectedData.length > 0){
                            selectedData.forEach(function(item){
                                var exists = items.find(function(i){ return i.item_id === item.id; });
                                if(!exists){
                                    items.push({
                                        item_id: item.id,
                                        item_code: item.code,
                                        item_name: item.name,
                                        location_id: '',
                                        location_name: '',
                                        batch_number: '',
                                        system_quantity: 0,
                                        actual_quantity: 0,
                                        difference: 0,
                                        unit_cost: item.standard_cost || 0,
                                        difference_amount: 0
                                    });
                                }
                            });
                            renderItems();
                        }
                        layer.close(index);
                    }
                });
            });
            
            function renderItems(){
                var html = '';
                items.forEach(function(item, index){
                    html += '<tr>';
                    html += '<td>' + item.item_code + ' ' + item.item_name + '</td>';
                    html += '<td><input type="text" class="layui-input" value="' + (item.location_name || '') + '" data-index="' + index + '" data-field="location_name"></td>';
                    html += '<td><input type="text" class="layui-input" value="' + (item.batch_number || '') + '" data-index="' + index + '" data-field="batch_number"></td>';
                    html += '<td>' + item.system_quantity + '</td>';
                    html += '<td><input type="number" class="layui-input" value="' + item.actual_quantity + '" data-index="' + index + '" data-field="actual_quantity"></td>';
                    html += '<td>' + item.difference + '</td>';
                    html += '<td>' + item.difference_amount.toFixed(2) + '</td>';
                    html += '<td><button type="button" class="layui-btn layui-btn-xs layui-btn-danger" onclick="removeItem(' + index + ')">删除</button></td>';
                    html += '</tr>';
                });
                $('#itemsBody').html(html);
            }
            
            window.removeItem = function(index){
                items.splice(index, 1);
                renderItems();
            };
            
            $('#itemsBody').on('change', 'input', function(){
                var index = $(this).data('index');
                var field = $(this).data('field');
                var value = parseFloat($(this).val()) || 0;
                
                items[index][field] = value;
                items[index].difference = items[index].actual_quantity - items[index].system_quantity;
                items[index].difference_amount = items[index].difference * items[index].unit_cost;
                
                renderItems();
            });
            
            form.on('submit(submitBtn)', function(data){
                var submitData = data.field;
                submitData.items = items.map(function(item){
                    return {
                        item_id: item.item_id,
                        location_id: item.location_id || null,
                        batch_number: item.batch_number || '',
                        system_quantity: item.system_quantity,
                        actual_quantity: item.actual_quantity,
                        difference: item.difference,
                        unit_cost: item.unit_cost,
                        difference_amount: item.difference_amount
                    };
                });
                
                $.ajax({
                    url: '/api/inventory/check/',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(submitData),
                    success: function(res){
                        if(res.code === 0){
                            layer.msg('保存成功', {icon: 1});
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                            parent.table.reload('checkTable');
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    }
                });
                return false;
            });
        });
    </script>
</body>
</html>

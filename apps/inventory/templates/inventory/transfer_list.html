<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>库存调拨</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="/static/layui/css/layui.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <style>
        .status-tag { padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .status-1 { background: #FFB800; color: #fff; }
        .status-2 { background: #1E9FFF; color: #fff; }
        .status-3 { background: #FF5722; color: #fff; }
        .status-4 { background: #009688; color: #fff; }
        .status-5 { background: #999; color: #fff; }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header layui-elem-quote">
                调拨单列表
                <button class="layui-btn layui-btn-sm layui-btn-primary" id="addBtn" style="float: right;">
                    <i class="layui-icon">&#xe654;</i> 新增调拨
                </button>
            </div>
            <div class="layui-card-body">
                <div class="layui-form layui-inline">
                    <div class="layui-input-inline">
                        <select id="searchStatus">
                            <option value="">全部状态</option>
                            <option value="1">待审核</option>
                            <option value="2">已审核</option>
                            <option value="3">调拨中</option>
                            <option value="4">已完成</option>
                            <option value="5">已取消</option>
                        </select>
                    </div>
                    <button class="layui-btn" id="searchBtn">
                        <i class="layui-icon">&#xe615;</i> 查询
                    </button>
                </div>
                <table id="transferTable" lay-filter="transferTable"></table>
            </div>
        </div>
    </div>

    <script src="/static/js/lib/jquery.min.js"></script>
    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['table', 'layer', 'form'], function(){
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            
            table.render({
                elem: '#transferTable',
                url: '/api/inventory/transfer/',
                page: true,
                cols: [[
                    {field: 'id', title: 'ID', width: 80, sort: true},
                    {field: 'code', title: '调拨单号', width: 160},
                    {field: 'from_warehouse_name', title: '调出仓库', width: 120},
                    {field: 'to_warehouse_name', title: '调入仓库', width: 120},
                    {field: 'total_quantity', title: '总数量', width: 90},
                    {field: 'total_amount', title: '总金额', width: 100},
                    {field: 'status_display', title: '状态', width: 90, templet: function(d){
                        return '<span class="status-tag status-' + d.status + '">' + d.status_display + '</span>';
                    }},
                    {field: 'requester_name', title: '申请人', width: 90},
                    {field: 'create_time', title: '创建时间', width: 160},
                    {title: '操作', width: 200, templet: function(d){
                        var html = '<button class="layui-btn layui-btn-xs" lay-event="view">查看</button>';
                        if(d.status == 1){
                            html += '<button class="layui-btn layui-btn-xs layui-btn-warm" lay-event="check">审核</button>';
                        }
                        html += '<button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="cancel">取消</button>';
                        return html;
                    }}
                ]]
            });
            
            $('#searchBtn').click(function(){
                table.reload('transferTable', {
                    where: {status: $('#searchStatus').val()}
                });
            });
            
            $('#addBtn').click(function(){
                openForm();
            });
            
            function openForm(id){
                var title = id ? '调拨单详情' : '新增调拨单';
                var url = id ? '/inventory/transfer/' + id + '/' : '/inventory/transfer/add/';
                layer.open({
                    type: 2,
                    title: title,
                    area: ['900px', '650px'],
                    content: url,
                    end: function(){
                        table.reload('transferTable');
                    }
                });
            }
            
            table.on('tool(transferTable)', function(obj){
                if(obj.event === 'view'){
                    openForm(obj.data.id);
                } else if(obj.event === 'check'){
                    layer.confirm('确定要审核该调拨单吗？', function(index){
                        layer.msg('审核功能开发中');
                    });
                } else if(obj.event === 'cancel'){
                    layer.msg('取消功能开发中');
                }
            });
        });
    </script>
</body>
</html>

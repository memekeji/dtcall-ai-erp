{% extends 'include/common.html' %}
{% load static %}

{% block title %}查看会议预约详情{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <h3>查看会议预约详情</h3>
    </div>
    <div class="layui-card-body">
        <div class="layui-form">
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">会议主题</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.title }}" readonly>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">会议室</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.meeting_room.name }}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">组织者</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.organizer.name }}" readonly>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">状态</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.get_status_display }}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">开始时间</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.start_time|date:'Y-m-d H:i' }}" readonly>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">结束时间</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.end_time|date:'Y-m-d H:i' }}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md12">
                    <div class="layui-form-item">
                        <label class="layui-form-label">参会人员</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{% for attendee in reservation.attendees.all %}{{ attendee.name }}{% if not forloop.last %}, {% endif %}{% endfor %}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md12">
                    <div class="layui-form-item">
                        <label class="layui-form-label">会议描述</label>
                        <div class="layui-input-block">
                            <textarea class="layui-textarea" readonly>{{ reservation.description }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">创建时间</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.created_at|date:'Y-m-d H:i:s' }}" readonly>
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">更新时间</label>
                        <div class="layui-input-block">
                            <input type="text" class="layui-input" value="{{ reservation.updated_at|date:'Y-m-d H:i:s' }}" readonly>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="layui-form-item" style="margin-top: 20px; text-align: center;">
            <a href="{% url 'system:admin_office:meeting_reservation_list' %}" class="layui-btn">返回列表</a>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'include/common.html' %}

{% block title %}会议记录管理{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <div class="layui-row">
            <div class="layui-col-md6">
                <span class="layui-breadcrumb">
                    <a href="javascript:;">会议管理</a>
                    <a><cite>会议记录列表</cite></a>
                </span>
            </div>
            <div class="layui-col-md6 text-right">
                <button class="layui-btn layui-btn-normal" id="addBtn">添加会议记录</button>
            </div>
        </div>
    </div>
    <div class="layui-card-body">
        <div class="layui-form">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">关键词</label>
                    <div class="layui-input-inline">
                        <input type="text" name="keywords" placeholder="请输入关键词" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">日期范围</label>
                    <div class="layui-input-inline">
                        <input type="text" name="diff_time" class="layui-input" id="diffTime" placeholder="请选择日期范围">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="searchBtn">搜索</button>
                    <button class="layui-btn layui-btn-primary" id="resetBtn">重置</button>
                </div>
            </div>
        </div>
        <table id="dataTable" lay-filter="dataTable"></table>
    </div>
</div>

<!-- 操作按钮栏模板 -->
<script type="text/html" id="actionBar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="view">查看</a>
    <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="create_minutes">创建纪要</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
</script>

<script>
var meetingViewUrl = '{% url "meeting_view" 0 %}'.slice(0, -2);
var meetingDeleteUrl = '{% url "meeting_delete" %}';

layui.use(['table', 'form', 'jquery', 'laydate', 'layer'], function(){
    var table = layui.table;
    var $ = layui.jquery;
    var form = layui.form;
    var laydate = layui.laydate;
    var layer = layui.layer;
    
    laydate.render({
        elem: '#diffTime',
        range: true,
        format: 'yyyy-MM-dd'
    });
    
    table.render({
        elem: '#dataTable',
        url: '{% url "meeting_datalist" %}',
        method: 'post',
        page: true,
        cols: [[
            {field: 'id', title: 'ID', width: 80},
            {field: 'title', title: '会议标题'},
            {field: 'meeting_date', title: '会议日期'},
            {field: 'host_name', title: '主持人'},
            {field: 'recorder_name', title: '记录人'},
            {fixed: 'right', title: '操作', toolbar: '#actionBar', width: 200}
        ]]
    });
    
    $('#searchBtn').on('click', function(){
        var keywords = $('input[name="keywords"]').val();
        var diff_time = $('input[name="diff_time"]').val();
        table.reload('dataTable', {
            where: {keywords: keywords, diff_time: diff_time}
        });
    });
    
    $('#resetBtn').on('click', function(){
        $('input[name="keywords"]').val('');
        $('input[name="diff_time"]').val('');
        table.reload('dataTable', {
            where: {keywords: '', diff_time: ''}
        });
    });
    
    $('#addBtn').on('click', function(){
        layer.open({
            type: 2,
            title: '添加会议记录',
            shadeClose: false,
            shade: 0.3,
            maxmin: true,
            area: ['80%', '90%'],
            offset: 'r',
            anim: 2,
            content: '{% url "meeting_apply" %}',
            success: function(layero, index) {
                if (layero && typeof layero.css === 'function') {
                    layero.css({
                        'right': '0',
                        'top': '0',
                        'height': '100%'
                    });
                }
            },
            end: function(){ table.reload('dataTable'); }
        });
    });
    
    table.on('tool(dataTable)', function(obj){
        var data = obj.data;
        if(obj.event === 'edit'){
            layer.open({
                type: 2,
                title: '编辑会议记录',
                shadeClose: false,
                shade: 0.3,
                maxmin: true,
                area: ['80%', '90%'],
                offset: 'r',
                anim: 2,
                content: meetingViewUrl + data.id + '/',
                success: function(layero, index) {
                    if (layero && typeof layero.css === 'function') {
                        layero.css({
                            'right': '0',
                            'top': '0',
                            'height': '100%'
                        });
                    }
                },
                end: function(){ table.reload('dataTable'); }
            });
        } else if(obj.event === 'view'){
            layer.open({
                type: 2,
                title: '查看会议记录',
                shadeClose: false,
                shade: 0.3,
                maxmin: true,
                area: ['80%', '90%'],
                offset: 'r',
                anim: 2,
                content: meetingViewUrl + data.id + '/',
                success: function(layero, index) {
                    if (layero && typeof layero.css === 'function') {
                        layero.css({
                            'right': '0',
                            'top': '0',
                            'height': '100%'
                        });
                    }
                }
            });
        } else if(obj.event === 'create_minutes'){
            layer.open({
                type: 2,
                title: '创建会议纪要',
                shadeClose: false,
                shade: 0.3,
                maxmin: true,
                area: ['80%', '90%'],
                offset: 'r',
                anim: 2,
                content: '{% url "meeting_minutes" %}?id=' + data.id,
                success: function(layero, index) {
                    if (layero && typeof layero.css === 'function') {
                        layero.css({
                            'right': '0',
                            'top': '0',
                            'height': '100%'
                        });
                    }
                }
            });
        } else if(obj.event === 'delete'){
            layer.confirm('确定要删除该会议记录吗？', function(index){
                $.ajax({
                    url: meetingDeleteUrl,
                    type: 'post',
                    data: {id: data.id},
                    success: function(res){
                        if(res.code === 0){
                            layer.msg('删除成功');
                            table.reload('dataTable');
                        } else {
                            layer.msg(res.msg);
                        }
                    }
                });
                layer.close(index);
            });
        }
    });
});
</script>
{% endblock %}

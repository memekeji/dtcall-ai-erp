{% extends 'include/common.html' %}

{% block title %}会议室管理{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <div class="layui-row">
            <div class="layui-col-md6">
                <span class="layui-breadcrumb">
                    <a href="javascript:;">会议室管理</a>
                    <a><cite>会议室列表</cite></a>
                </span>
            </div>
            <div class="layui-col-md6 text-right">
                <button class="layui-btn layui-btn-normal" id="addBtn">添加会议室</button>
            </div>
        </div>
    </div>
    <div class="layui-card-body">
        <div class="layui-form">
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">关键词</label>
                    <div class="layui-input-inline">
                        <input type="text" name="keywords" placeholder="请输入关键词" class="layui-input" id="keywordsInput">
                    </div>
                </div>
                <div class="layui-inline">
                    <button class="layui-btn" id="searchBtn">搜索</button>
                    <button class="layui-btn layui-btn-primary" id="resetBtn">重置</button>
                </div>
            </div>
        </div>
        <table class="layui-table" id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>会议室名称</th>
                    <th>编号</th>
                    <th>位置</th>
                    <th>容量</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" style="text-align:center;">正在加载数据...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
layui.use(['jquery', 'layer'], function(){
    var $ = layui.jquery;
    var layer = layui.layer;
    var csrfToken = $('meta[name="csrf-token"]').attr('content');
    
    function loadData(page, keywords){
        $.ajax({
            url: '/system/admin_office/meeting_room/',
            type: 'POST',
            headers: {
                'X-CSRFToken': csrfToken,
                'Content-Type': 'application/json'
            },
            data: JSON.stringify({page: page || 1, keywords: keywords || ''}),
            success: function(res){
                if(res.code === 200 && res.data){
                    renderTable(res.data);
                } else {
                    $('#tableBody').html('<tr><td colspan="7" style="text-align:center;color:red;">加载失败: ' + (res.msg || '未知错误') + '</td></tr>');
                }
            },
            error: function(xhr){
                $('#tableBody').html('<tr><td colspan="7" style="text-align:center;color:red;">网络请求失败 (' + xhr.status + ')</td></tr>');
            }
        });
    }
    
    function renderTable(data){
        var html = '';
        if(data.length === 0){
            html = '<tr><td colspan="7" style="text-align:center;">暂无数据</td></tr>';
        } else {
            for(var i = 0; i < data.length; i++){
                var item = data[i];
                html += '<tr>' +
                    '<td>' + item.id + '</td>' +
                    '<td>' + item.name + '</td>' +
                    '<td>' + (item.code || '') + '</td>' +
                    '<td>' + (item.location || '') + '</td>' +
                    '<td>' + item.capacity + '人</td>' +
                    '<td>' + (item.status_display || '未知') + '</td>' +
                    '<td>' +
                    '<button class="layui-btn layui-btn-xs" onclick="editRoom(' + item.id + ')">编辑</button>' +
                    '<button class="layui-btn layui-btn-xs layui-btn-normal" onclick="viewRoom(' + item.id + ')">查看</button>' +
                    '<button class="layui-btn layui-btn-xs layui-btn-danger" onclick="deleteRoom(' + item.id + ')">删除</button>' +
                    '</td>' +
                    '</tr>';
            }
        }
        $('#tableBody').html(html);
    }
    
    window.editRoom = function(id){
        layer.open({
            type: 2,
            title: '编辑会议室',
            shadeClose: false,
            shade: 0.3,
            maxmin: true,
            area: ['80%', '100%'],
            offset: 'r',
            anim: 2,
            content: '/system/admin_office/meeting_room/update/' + id + '/',
            success: function(layero, index) {
                if (layero && typeof layero.css === 'function') {
                    layero.css({
                        'right': '0',
                        'top': '0',
                        'height': '100%'
                    });
                }
            },
            end: function(){
                loadData(1, $('#keywordsInput').val());
            }
        });
    };
    
    window.viewRoom = function(id){
        layer.open({
            type: 2,
            title: '查看会议室',
            shadeClose: false,
            shade: 0.3,
            maxmin: true,
            area: ['80%', '100%'],
            offset: 'r',
            anim: 2,
            content: '/system/admin_office/meeting_room/update/' + id + '/',
            success: function(layero, index) {
                if (layero && typeof layero.css === 'function') {
                    layero.css({
                        'right': '0',
                        'top': '0',
                        'height': '100%'
                    });
                }
            }
        });
    };
    
    window.deleteRoom = function(id){
        layer.confirm('确定要删除该会议室吗？', function(index){
            $.ajax({
                url: '/system/admin_office/meeting_room/delete/' + id + '/',
                type: 'POST',
                headers: {'X-CSRFToken': csrfToken},
                success: function(res){
                    if(res.code === 200){
                        layer.msg('删除成功');
                        loadData(1, $('#keywordsInput').val());
                    } else {
                        layer.msg(res.msg || '删除失败');
                    }
                }
            });
            layer.close(index);
        });
    };
    
    loadData(1, '');
    
    $('#searchBtn').on('click', function(){
        loadData(1, $('#keywordsInput').val());
    });
    
    $('#resetBtn').on('click', function(){
        $('#keywordsInput').val('');
        loadData(1, '');
    });
    
    $('#addBtn').on('click', function(){
        layer.open({
            type: 2,
            title: '添加会议室',
            shadeClose: false,
            shade: 0.3,
            maxmin: true,
            area: ['80%', '100%'],
            offset: 'r',
            anim: 2,
            content: '/system/admin_office/meeting_room/create/',
            success: function(layero, index) {
                if (layero && typeof layero.css === 'function') {
                    layero.css({
                        'right': '0',
                        'top': '0',
                        'height': '100%'
                    });
                }
            },
            end: function(){
                loadData(1, $('#keywordsInput').val());
            }
        });
    });
});
</script>
{% endblock %}

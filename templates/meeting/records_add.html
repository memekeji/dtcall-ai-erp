{% extends 'include/common.html' %}

{% block title %}{% if detail %}编辑会议记录{% else %}添加会议记录{% endif %}{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <div class="layui-row">
            <div class="layui-col-md6">
                <span class="layui-breadcrumb">
                    <a href="javascript:;">会议管理</a>
                    <a href="{% url 'adm_meeting_records' %}">会议记录列表</a>
                    <a><cite>{% if detail %}编辑会议记录{% else %}添加会议记录{% endif %}</cite></a>
                </span>
            </div>
        </div>
    </div>
    <div class="layui-card-body">
        <form class="layui-form" lay-filter="formData">
            <input type="hidden" name="id" value="{{ detail.id|default:'' }}">
            <div class="layui-form-item">
                <label class="layui-form-label">会议标题</label>
                <div class="layui-input-block">
                    <input type="text" name="title" value="{{ detail.title|default:'' }}" lay-verify="required" placeholder="请输入会议标题" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">会议日期</label>
                <div class="layui-input-block">
                    <input type="text" name="meeting_date" value="{{ detail.meeting_date|default:'' }}" id="meetingDate" lay-verify="required" placeholder="请选择会议日期" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">主持人</label>
                <div class="layui-input-block">
                    <select name="host_id" lay-search>
                        <option value="">请选择主持人</option>
                        {% for user in users %}
                        <option value="{{ user.id }}" {% if detail.host_id == user.id %}selected{% endif %}>{{ user.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">会议内容</label>
                <div class="layui-input-block">
                    <textarea name="content" placeholder="请输入会议内容" class="layui-textarea" lay-verify="required">{{ detail.content|default:'' }}</textarea>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit lay-filter="submitBtn">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
// 获取CSRF Token的函数
function getCSRFToken() {
    const cookieValue = document.cookie
        .split('; ') 
        .find(row => row.startsWith('csrftoken=')) 
        ?.split('=')[1];
    return cookieValue || '';
}

// 设置全局AJAX请求头
$.ajaxSetup({
    beforeSend: function(xhr, settings) {
        if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) {
            xhr.setRequestHeader("X-CSRFToken", getCSRFToken());
        }
    }
});

layui.use(['form', 'jquery', 'laydate'], function(){
    var form = layui.form;
    var $ = layui.jquery;
    var laydate = layui.laydate;
    
    // 初始化日期选择器
    laydate.render({
        elem: '#meetingDate',
        format: 'yyyy-MM-dd'
    });
    
    // 表单提交
    form.on('submit(submitBtn)', function(data){
        $.ajax({
            url: '{% if detail %}{% url "adm_meeting_records_edit" %}{% else %}{% url "adm_meeting_records_add" %}{% endif %}',
            type: 'post',
            data: data.field,
            success: function(res){
                if(res.code === 0){
                    layer.msg('操作成功', function(){
                        var index = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(index);
                        parent.layui.table.reload('dataTable');
                    });
                } else {
                    layer.msg(res.msg);
                }
            }
        });
        return false;
    });
});
</script>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享已过期</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .expired-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .expired-icon {
            font-size: 80px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        .expired-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .expired-desc {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }
        .share-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .info-label {
            font-weight: bold;
            color: #333;
        }
        .info-value {
            color: #666;
        }
        .expired-time {
            color: #ff6b6b;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e6e6e6;
        }
        .btn-secondary:hover {
            background: #e6e6e6;
            color: #333;
        }
        .tips {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
        .tips i {
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <div class="expired-container">
        <div class="expired-icon">
            <i class="layui-icon layui-icon-time"></i>
        </div>
        
        <h1 class="expired-title">分享链接已过期</h1>
        <p class="expired-desc">
            很抱歉，您访问的分享链接已经过期，无法继续访问分享内容。
        </p>
        
        <div class="share-info">
            <div class="info-row">
                <span class="info-label">分享内容：</span>
                <span class="info-value">{{ share.get_item_name }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">分享者：</span>
                <span class="info-value">{{ share.creator.username }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">创建时间：</span>
                <span class="info-value">{{ share.create_time|date:"Y-m-d H:i" }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">过期时间：</span>
                <span class="info-value expired-time">{{ share.expire_time|date:"Y-m-d H:i" }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">分享码：</span>
                <span class="info-value">{{ share.share_code }}</span>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="history.back()">
                <i class="layui-icon layui-icon-return"></i>
                返回上页
            </button>
            <a href="/adm/disk/personal/" class="btn btn-primary">
                <i class="layui-icon layui-icon-home"></i>
                访问网盘
            </a>
        </div>
        
        <div class="tips">
            <i class="layui-icon layui-icon-tips"></i>
            <strong>提示：</strong>如果您需要重新获取此内容，请联系分享者重新创建分享链接。
        </div>
    </div>

    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        // 页面加载完成后的处理
        layui.use(['layer'], function () {
            var layer = layui.layer;
            
            // 可以在这里添加一些交互效果
            console.log('分享链接已过期');
        });
    </script>
</body>

</html>

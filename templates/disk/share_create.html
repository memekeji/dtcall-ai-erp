{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建分享链接</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        * {
            box-sizing: border-box;
        }
        
        html, body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        .share-form {
            padding: 20px;
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 0;
            box-shadow: none;
        }
        
        h2 {
            margin: 0 0 20px 0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e6e6e6;
            padding-bottom: 12px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .permission-group {
            border: 1px solid #e6e6e6;
            border-radius: 0;
            padding: 15px;
            background-color: #f8f9fa;
        }
        
        .permission-item {
            margin-bottom: 12px;
        }
        
        .permission-item:last-child {
            margin-bottom: 0;
        }
        
        .share-result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: #f0f9ff;
            border: 1px solid #b3d8ff;
            border-radius: 0;
        }
        
        .share-result h3 {
            margin: 0 0 20px 0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .share-link {
            word-break: break-all;
            background-color: #fff;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .copy-btn {
            margin-left: 10px;
        }
        
        /* 访问限制布局优化 */
        .access-limit {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .access-limit-item {
            flex: 1;
            min-width: 150px;
        }
        
        /* 按钮样式优化 */
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        /* 辅助文字样式 */
        .layui-form-mid.layui-word-aux {
            margin-top: 5px;
            display: block;
            font-size: 12px;
        }
        
        /* 分享结果样式 */
        #shareResult .form-group {
            margin-bottom: 18px;
        }
        
        #shareResult .form-label {
            margin-bottom: 6px;
            font-size: 13px;
            color: #666;
        }
        
        #expireTime {
            font-size: 14px;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="share-form">
        <h2>创建分享链接</h2>
        
        <form id="shareForm">
            {% csrf_token %}
            <input type="hidden" name="type" value="{{ share_type }}">
            <input type="hidden" name="id" value="{{ item_id }}">
            
            <!-- 基本设置 -->
            <div class="form-group">
                <label class="form-label">分享密码</label>
                <input type="text" name="password" class="layui-input" placeholder="留空则无需密码" maxlength="20">
            </div>
            
            <div class="form-group">
                <label class="form-label">有效期</label>
                <select name="expire_days" class="layui-input">
                    <option value="1">1天</option>
                    <option value="7" selected>7天</option>
                    <option value="30">30天</option>
                    <option value="0">永久有效</option>
                </select>
            </div>
            
            <!-- 权限设置 -->
            <div class="form-group">
                <label class="form-label">权限设置</label>
                <div class="permission-group">
                    <div class="permission-item">
                        <label class="form-label">权限类型</label>
                        <select name="permission_type" class="layui-input">
                            <option value="view">仅查看</option>
                            <option value="download" selected>可下载</option>
                            <option value="edit">可编辑</option>
                        </select>
                    </div>
                    
                    <div class="permission-item">
                        <input type="checkbox" name="allow_download" checked lay-skin="primary" title="允许下载">
                    </div>
                </div>
            </div>
            
            <!-- 访问限制 -->
            <div class="form-group">
                <label class="form-label">访问限制</label>
                <div class="access-limit">
                    <div class="access-limit-item">
                        <label class="form-label">访问次数限制</label>
                        <input type="number" name="access_limit" class="layui-input" value="0" min="0" placeholder="0表示无限制">
                    </div>
                    <div class="access-limit-item">
                        <label class="form-label">下载次数限制</label>
                        <input type="number" name="download_limit" class="layui-input" value="0" min="0" placeholder="0表示无限制">
                    </div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="form-actions">
                <button type="submit" class="layui-btn layui-btn-normal">
                    <i class="layui-icon layui-icon-share"></i> 创建分享链接
                </button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="closeDialog()">
                    <i class="layui-icon layui-icon-close"></i> 取消
                </button>
            </div>
        </form>
        
        <!-- 分享结果 -->
        <div id="shareResult" class="share-result">
            <h3>分享链接创建成功！</h3>
            <div class="form-group">
                <label class="form-label">分享链接</label>
                <div class="share-link" id="shareUrl"></div>
                <button type="button" class="layui-btn layui-btn-xs copy-btn" onclick="copyToClipboard('shareUrl')">
                    <i class="layui-icon layui-icon-file"></i> 复制链接
                </button>
            </div>
            
            <div class="form-group" id="passwordGroup" style="display: none;">
                <label class="form-label">提取密码</label>
                <div class="share-link" id="sharePassword"></div>
                <button type="button" class="layui-btn layui-btn-xs copy-btn" onclick="copyToClipboard('sharePassword')">
                    <i class="layui-icon layui-icon-file"></i> 复制密码
                </button>
            </div>
            
            <div class="form-group">
                <label class="form-label">有效期至</label>
                <div id="expireTime"></div>
            </div>
            
            <div class="form-group">
                <button type="button" class="layui-btn layui-btn-xs" onclick="copyShareText()">
                    <i class="layui-icon layui-icon-file"></i> 复制分享文本
                </button>
                <button type="button" class="layui-btn layui-btn-xs layui-btn-primary" onclick="createAnother()">
                    <i class="layui-icon layui-icon-add-1"></i> 再次分享
                </button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['layer', 'form'], function () {
            var layer = layui.layer;
            var form = layui.form;
            
            // 表单提交
            $('#shareForm').on('submit', function(e) {
                e.preventDefault();
                
                var formData = new FormData(this);
                
                // 处理复选框
                formData.set('allow_download', $('input[name="allow_download"]').is(':checked') ? 'on' : 'off');
                
                $.ajax({
                    url: '/adm/disk/share/create/',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        if (response.code === 0) {
                            showShareResult(response.data);
                        } else {
                            layer.msg(response.msg, {icon: 2});
                        }
                    },
                    error: function() {
                        layer.msg('创建分享失败', {icon: 2});
                    }
                });
            });
        });
        
        // 显示分享结果
        function showShareResult(data) {
            $('#shareUrl').text(data.share_url);
            $('#expireTime').text(data.expire_time);
            
            if (data.password) {
                $('#sharePassword').text(data.password);
                $('#passwordGroup').show();
            } else {
                $('#passwordGroup').hide();
            }
            
            $('#shareForm').hide();
            $('#shareResult').show();
        }
        
        // 复制到剪贴板
        function copyToClipboard(elementId) {
            var text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(function() {
                layui.use('layer', function() {
                    var layer = layui.layer;
                    layer.msg('已复制到剪贴板', {icon: 1});
                });
            });
        }
        
        // 复制分享文本
        function copyShareText() {
            var shareUrl = $('#shareUrl').text();
            var password = $('#sharePassword').text();
            var expireTime = $('#expireTime').text();
            
            var shareText = `分享链接：${shareUrl}`;
            if (password) {
                shareText += `\\n提取密码：${password}`;
            }
            shareText += `\\n有效期至：${expireTime}`;
            
            navigator.clipboard.writeText(shareText).then(function() {
                layui.use('layer', function() {
                    var layer = layui.layer;
                    layer.msg('分享文本已复制到剪贴板', {icon: 1});
                });
            });
        }
        
        // 再次分享
        function createAnother() {
            $('#shareForm').show();
            $('#shareResult').hide();
        }
        
        // 关闭对话框
        function closeDialog() {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        }
    </script>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享访问错误</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b6b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .error-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .error-icon {
            font-size: 80px;
            color: #ff4757;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .error-desc {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }
        .error-message {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e6e6e6;
        }
        .btn-secondary:hover {
            background: #e6e6e6;
            color: #333;
        }
        .possible-reasons {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .possible-reasons h4 {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 16px;
        }
        .possible-reasons ul {
            margin: 0;
            padding-left: 20px;
            color: #666;
        }
        .possible-reasons li {
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .contact-info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            color: #0050b3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
        .contact-info i {
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="layui-icon layui-icon-close"></i>
        </div>
        
        <h1 class="error-title">访问出错了</h1>
        <p class="error-desc">
            很抱歉，访问分享链接时发生了错误，请检查链接是否正确或稍后重试。
        </p>
        
        {% if error %}
        <div class="error-message">
            错误信息：{{ error }}
        </div>
        {% endif %}
        
        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="history.back()">
                <i class="layui-icon layui-icon-return"></i>
                返回上页
            </button>
            <button class="btn btn-secondary" onclick="location.reload()">
                <i class="layui-icon layui-icon-refresh"></i>
                重新加载
            </button>
            <a href="/adm/disk/personal/" class="btn btn-primary">
                <i class="layui-icon layui-icon-home"></i>
                访问网盘
            </a>
        </div>
        
        <div class="possible-reasons">
            <h4>可能的原因：</h4>
            <ul>
                <li>分享链接不存在或已被删除</li>
                <li>分享链接已过期</li>
                <li>分享链接格式不正确</li>
                <li>网络连接问题</li>
                <li>服务器临时故障</li>
                <li>您没有访问权限</li>
            </ul>
        </div>
        
        <div class="contact-info">
            <i class="layui-icon layui-icon-tips"></i>
            <strong>需要帮助？</strong>如果问题持续存在，请联系分享者或系统管理员获取帮助。
        </div>
    </div>

    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        // 页面加载完成后的处理
        layui.use(['layer'], function () {
            var layer = layui.layer;
            
            // 记录错误信息（可选）
            console.error('分享访问错误:', '{{ error|default:"未知错误" }}');
        });
        
        // 自动重试功能（可选）
        let retryCount = 0;
        const maxRetries = 3;
        
        function autoRetry() {
            if (retryCount < maxRetries) {
                retryCount++;
                setTimeout(() => {
                    location.reload();
                }, 3000 * retryCount); // 递增延迟重试
            }
        }
        
        // 如果是网络错误，可以启用自动重试
        // autoRetry();
    </script>
</body>

</html>

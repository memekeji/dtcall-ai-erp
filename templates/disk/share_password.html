{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输入提取密码</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .password-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .share-icon {
            font-size: 64px;
            color: #667eea;
            margin-bottom: 20px;
        }
        .share-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .share-desc {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .password-form {
            margin-bottom: 20px;
        }
        .password-input {
            width: 100%;
            height: 50px;
            border: 2px solid #e6e6e6;
            border-radius: 8px;
            padding: 0 15px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .password-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        .submit-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .share-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .error-msg {
            color: #ff4757;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        .loading {
            display: none;
        }
        .loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="password-container">
        <div class="share-icon">
            <i class="layui-icon layui-icon-share"></i>
        </div>
        
        <h1 class="share-title">请输入提取密码</h1>
        <p class="share-desc">
            此分享内容受密码保护<br>
            请输入正确的提取密码以继续访问
        </p>
        
        <form class="password-form" id="passwordForm">
            {% csrf_token %}
            <input type="password" 
                   name="password" 
                   class="password-input" 
                   placeholder="请输入提取密码" 
                   maxlength="20" 
                   autocomplete="off"
                   required>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">确认访问</span>
                <span class="loading">
                    <i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i>
                    验证中...
                </span>
            </button>
            
            <div class="error-msg" id="errorMsg"></div>
        </form>
        
        <div class="share-info">
            <div><strong>分享信息</strong></div>
            <div>分享者：{{ share.creator.username }}</div>
            <div>创建时间：{{ share.create_time|date:"Y-m-d H:i" }}</div>
            {% if share.expire_time %}
            <div>有效期至：{{ share.expire_time|date:"Y-m-d H:i" }}</div>
            {% else %}
            <div>有效期：永久有效</div>
            {% endif %}
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        $(document).ready(function() {
            // 自动聚焦密码输入框
            $('input[name="password"]').focus();
            
            // 表单提交
            $('#passwordForm').on('submit', function(e) {
                e.preventDefault();
                
                var password = $('input[name="password"]').val().trim();
                if (!password) {
                    showError('请输入提取密码');
                    return;
                }
                
                // 显示加载状态
                showLoading(true);
                hideError();
                
                // 提交验证
                $.ajax({
                    url: window.location.href,
                    type: 'POST',
                    data: {
                        password: password,
                        csrfmiddlewaretoken: $('input[name="csrfmiddlewaretoken"]').val()
                    },
                    success: function(response) {
                        if (response.code === 0) {
                            // 验证成功，刷新页面
                            window.location.reload();
                        } else {
                            showError(response.msg || '密码错误，请重试');
                            showLoading(false);
                            // 清空密码输入框并重新聚焦
                            $('input[name="password"]').val('').focus();
                        }
                    },
                    error: function() {
                        showError('网络错误，请重试');
                        showLoading(false);
                    }
                });
            });
            
            // 密码输入框回车提交
            $('input[name="password"]').on('keypress', function(e) {
                if (e.which === 13) {
                    $('#passwordForm').submit();
                }
            });
        });
        
        // 显示错误信息
        function showError(message) {
            $('#errorMsg').text(message).show();
        }
        
        // 隐藏错误信息
        function hideError() {
            $('#errorMsg').hide();
        }
        
        // 显示/隐藏加载状态
        function showLoading(show) {
            var $btn = $('#submitBtn');
            var $btnText = $btn.find('.btn-text');
            var $loading = $btn.find('.loading');
            
            if (show) {
                $btn.prop('disabled', true);
                $btnText.hide();
                $loading.show();
            } else {
                $btn.prop('disabled', false);
                $btnText.show();
                $loading.hide();
            }
        }
    </script>
</body>

</html>

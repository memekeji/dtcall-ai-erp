{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>部门管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <style>
        .layui-container {
            width: 100% !important;
            max-width: none !important;
            padding: 0;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }
        .layui-col-md12 {
            display: flex;
            position: relative;
        }
        .tree-box {
            width: 160px;
            height: calc(100vh - 120px);
            border-right: 1px solid #eee;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .content-box {
            flex-grow: 1;
            padding: 20px;
            margin-left: 20px;
            width: calc(100% - 280px);
            box-sizing: border-box;
            overflow-y: auto;
            height: calc(100vh - 120px);
        }
        .search-bar {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .status-active { background-color: #52c41a; }
        .status-inactive { background-color: #ff4d4f; }
        .layui-table-cell {
            height: auto !important;
            white-space: normal;
        }
        .department-item {
            display: flex; align-items: center; padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }
        .department-item:hover {
            background-color: #f8f9fa;
        }
        .department-item:last-child {
            border-bottom: none;
        }
        .department-title {
            font-weight: 600; color: #333; flex: 1;
            display: flex;
            align-items: center;
        }
        /* 层级缩进样式 */
        .department-level-1 {
            padding-left: 0px;
        }
        .department-level-2 {
            padding-left: 20px;
        }
        .department-level-3 {
            padding-left: 40px;
        }
        .department-level-4 {
            padding-left: 60px;
        }
        .department-level-5 {
            padding-left: 80px;
        }
        .department-level-6 {
            padding-left: 100px;
        }
        /* 层级指示器 */
        .level-indicator {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            position: relative;
        }
        .level-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background-color: #666;
            border-radius: 50%;
        }
        .level-indicator.has-children::before {
            background-color: #1890ff;
            width: 6px;
            height: 6px;
        }
        .department-status {
            padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-right: 15px;
        }
        .department-actions {
            display: flex; gap: 5px;
        }
        .btn-action { padding: 5px 10px; border-radius: 6px; font-size: 13px; }
        .btn-add {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: none; color: white; padding: 8px 20px; border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }
        
        /* 右侧弹出层样式 */
        .slide-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .slide-panel-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .slide-panel-wrapper {
            position: fixed;
            top: 0;
            right: -75%;
            width: 75%;
            height: 100%;
            background: white;
            box-shadow: -2px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        /* 修复layer提示框被遮罩的问题 */
        .layui-layer {
            z-index: 20000 !important;
        }
        
        .layui-layer-shade {
            z-index: 19999 !important;
        }
        
        .layui-layer-content {
            z-index: 20000 !important;
        }
        
        .slide-panel-wrapper.active {
            right: 0;
        }
        
        .slide-panel-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .slide-panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        
        .slide-panel-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #666;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        
        .slide-panel-close:hover {
            background: #e9ecef;
        }
        
        .slide-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        .slide-panel-body {
            padding: 20px;
            height: 100%;
        }
        
        body.slide-panel-open {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="layui-container">
        <div class="layui-row">
            <div class="layui-col-md12">
                <div class="tree-box" id="departmentTree"></div>
                <div class="content-box">  
                    <div class="search-bar">
                        <div class="layui-form layui-form-item">
                            <div class="layui-form-item">
                                <div class="layui-inline">
                                    <label class="layui-form-label">部门状态</label>
                                    <div class="layui-input-inline">
                                        <select name="status" lay-filter="status">
                                            <option value="">全部状态</option>
                                            <option value="1">启用</option>
                                            <option value="0">禁用</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="layui-inline">
                                    <div class="layui-input-inline" style="width: 200px;">
                                        <input type="text" name="keyword" placeholder="关键字、部门名称、负责人" class="layui-input">
                                    </div>
                                    <button class="layui-btn" id="searchBtn">搜索</button>
                                    <div style="display: inline-block; margin-left: 200px;">
                                    <button class="layui-btn" id="addBtn">添加部门</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <table class="layui-table" id="departmentTable" lay-filter="departmentTable"></table>
                </div>
            </div>
        </div>
    </div>

    <!-- 新版弹窗容器 - 完全独立DOM树 -->
    <div id="slidePanelContainer">
        <div class="slide-panel-overlay" id="slidePanelOverlay"></div>
        <div class="slide-panel-wrapper" id="slidePanelWrapper">
            <div class="slide-panel-header">
                <h3 class="slide-panel-title" id="panelTitle">部门信息</h3>
                <button class="slide-panel-close" id="slidePanelClose">×</button>
            </div>
            <div class="slide-panel-content">
                <div class="slide-panel-body" id="slidePanelContent"></div>
            </div>
        </div>
    </div>

    <script type="text/html" id="statusTpl">
    {% verbatim %}
        {{#  if(d.is_active == 1) { }}
    <span class="layui-badge layui-bg-green">启用</span>
{{#  } else { }}
    <span class="layui-badge layui-bg-red">禁用</span>
{{#  } }}
    {% endverbatim %}
    </script>

    <script type="text/html" id="barTpl">
    {% verbatim %}
        <a class="layui-btn layui-btn-xs" lay-event="detail">查看</a>
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="role_management">角色管理</a>
        {{#  if(d.is_active == 1) { }}
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="disable">禁用</a>
        {{#  } else { }}
            <a class="layui-btn layui-btn-xs layui-btn-success" lay-event="enable">启用</a>
        {{#  } }}
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
    {% endverbatim %}
    </script>

    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        function closeSlidePanel() {
            const panel = document.getElementById('slidePanelWrapper');
            const overlay = document.getElementById('slidePanelOverlay');
            if (panel && overlay) {
                panel.classList.remove('active');
                overlay.classList.remove('active');
                document.body.classList.remove('slide-panel-open');
            }
        }

        // 获取CSRF令牌的辅助函数
        function getCookie(name) {
            var cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = jQuery.trim(cookies[i]);
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // 设置全局AJAX请求头，包含CSRF令牌
        $.ajaxSetup({
            beforeSend: function(xhr) {
                xhr.setRequestHeader('X-CSRFToken', getCookie('csrftoken'));
            }
        });

        layui.use(['tree', 'table', 'form', 'layer'], function() {
            var tree = layui.tree;
            var table = layui.table;
            var form = layui.form;
            var layer = layui.layer;

            // 渲染部门树形结构
            var departmentData = JSON.parse('{{ department_tree_json|safe|default:"[]" }}');
            console.log('部门树形数据:', departmentData);
            if (departmentData && departmentData.length > 0) {
                layui.tree.render({
                    elem: '#departmentTree',
                    data: departmentData,
                    showLine: true,
                    showCheckbox: false,
                    id: 'departmentTreeId',
                    click: function(obj){
                        table.reload('departmentTable', {
                            where: { parent_id: obj.data.id },
                            page: { curr: 1 }
                        });
                    }
                });
            } else {
                $('#departmentTree').html('<div style="padding: 20px; text-align: center; color: #999;">暂无部门数据</div>');
            }

            // 渲染部门表格
            
            // 构建树形结构的数据
            function buildTreeData(data) {
                // 创建部门ID到部门对象的映射
                var deptMap = {};
                var rootDepts = [];
                
                // 首先构建映射并收集所有部门
                data.forEach(function(dept) {
                    deptMap[dept.id] = dept;
                    dept.children = [];
                });
                
                // 构建树形结构
                data.forEach(function(dept) {
                    if (dept.parent_id && dept.parent_id !== 0 && deptMap[dept.parent_id]) {
                        deptMap[dept.parent_id].children.push(dept);
                    } else {
                        rootDepts.push(dept);
                    }
                });
                
                // 扁平化树形结构，同时保持层级关系
                var flatData = [];
                
                function flattenTree(depts, level = 0) {
                    depts.forEach(function(dept) {
                        dept.level = level;
                        flatData.push(dept);
                        if (dept.children && dept.children.length > 0) {
                            flattenTree(dept.children, level + 1);
                        }
                    });
                }
                
                // 先按sort排序根部门，再递归处理子部门
                rootDepts.sort(function(a, b) {
                    if (a.sort !== b.sort) {
                        return a.sort - b.sort;
                    }
                    return a.id - b.id;
                });
                
                flattenTree(rootDepts);
                return flatData;
            }
            
            table.render({
                elem: '#departmentTable',
                url: '/system/department/department-list-api/',
                page: true,
                cols: [[
                    { field: 'id', title: 'ID', width: 80 },
                    { field: 'name', title: '部门名称', width: 280, templet: function(d) {
                        // 根据level字段添加CSS类实现层级缩进
                        var level = d.level || 0;
                        var levelClass = 'department-level-' + Math.min(level + 1, 6); // 最多支持6级缩进
                        
                        // 检查是否有子部门
                        var hasChildren = d.children && d.children.length > 0;
                        
                        // 添加部门图标
                        var icon = '<i class="layui-icon layui-icon-organization" style="margin-right:5px;color:#4e89ae;"></i>';
                        
                        // 顶级部门（level=0）不显示层级指示器
                        if (level === 0) {
                            // 使用CSS类实现缩进
                            return '<div class="department-name ' + levelClass + '">' + icon + d.name + '</div>';
                        } else {
                            // 非顶级部门显示层级指示器
                            var indicatorClass = hasChildren ? 'level-indicator has-children' : 'level-indicator';
                            var indicator = '<span class="' + indicatorClass + '"></span>';
                            return '<div class="department-name ' + levelClass + '">' + indicator + icon + d.name + '</div>';
                        }
                    }},
                    { field: 'parent_name', title: '上级部门', width: 150 },
                    { field: 'leader_name', title: '负责人', width: 120 },
                    { field: 'leader_phone', title: '负责人电话', width: 150, templet: function(d) {
                        return d.leader_phone || '-';
                    }},
                    { field: 'sort', title: '排序', width: 80 },
                    { field: 'status', title: '状态', width: 100, templet: '#statusTpl' },
                    { field: 'roles', title: '已分配角色', width: 200, templet: function(d) {
                        if (d.roles && d.roles.length > 0) {
                            return d.roles.join(', ');
                        } else {
                            return '<span style="color: #999;">未分配</span>';
                        }
                    }},
                    { title: '操作', width: 320,toolbar: '#barTpl' }
                ]],
                parseData: function(res) {
                    if (res.code === 0) {
                        // 构建树形结构数据
                        var treeData = buildTreeData(res.data);
                        return {
                            "code": 0,
                            "msg": "",
                            "count": treeData.length,
                            "data": treeData
                        };
                    } else {
                        return {
                            "code": 1,
                            "msg": res.msg || '获取数据失败',
                            "count": 0,
                            "data": []
                        };
                    }
                }
            });

            // 监听工具条
            table.on('tool(departmentTable)', function(obj) {
                var data = obj.data;
                if (obj.event === 'detail') {
                    // 打开详情页面（右侧弹出层）
                    openSlidePanel('部门详情', '/system/department/' + data.id + '/detail/');
                } else if (obj.event === 'edit') {
                    // 打开编辑页面（右侧弹出层）
                    openSlidePanel('编辑部门', '/system/department/' + data.id + '/update/');
                } else if (obj.event === 'disable') {
                    layer.confirm('确定要禁用该部门吗？', function(index) {
                        $.ajax({
                            url: '/system/department/' + data.id + '/change_status/',
                            type: 'POST',
                            data: {status: 0},
                            headers: {
                                'X-CSRFToken': getCookie('csrftoken')
                            },
                            success: function(res) {
                                if (res.code === 0) {
                    layer.msg('操作成功', {icon: 1});
                    // 更新状态字段，确保与模板字段一致
                    obj.update({
                        status: 0,
                        is_active: 0
                    });
                    // 重新渲染工具栏，确保按钮正确转换
                    obj.del();
                    table.reload('departmentTable');
                    layer.close(index);
                                } else {
                                    layer.msg(res.msg || '操作失败', {icon: 5});
                                }
                            },
                            error: function() {
                                layer.msg('网络错误', {icon: 5});
                            }
                        });
                    });
                } else if (obj.event === 'enable') {
                    layer.confirm('确定要启用该部门吗？', function(index) {
                        $.ajax({
                            url: '/system/department/' + data.id + '/change_status/',
                            type: 'POST',
                            data: {status: 1},
                            headers: {
                                'X-CSRFToken': getCookie('csrftoken')
                            },
                            success: function(res) {
                                if (res.code === 0) {
                    layer.msg('操作成功', {icon: 1});
                    // 更新状态字段，确保与模板字段一致
                    obj.update({
                        status: 1,
                        is_active: 1
                    });
                    // 重新渲染工具栏，确保按钮正确转换
                    obj.del();
                    table.reload('departmentTable');
                    layer.close(index);
                                } else {
                                    layer.msg(res.msg || '操作失败', {icon: 5});
                                }
                            },
                            error: function() {
                                layer.msg('网络错误', {icon: 5});
                            }
                        });
                    });
                } else if (obj.event === 'role_management') {
                    // 打开右侧弹出层显示部门角色管理
                    openSlidePanel('部门角色管理', '/system/permission/departments/' + data.id + '/roles/');
                } else if (obj.event === 'delete') {
                    layer.confirm('确定要删除该部门吗？删除后无法恢复，且该部门下的所有子部门和员工也会受到影响。', function(index) {
                        $.ajax({
                            url: '/system/department/' + data.id + '/delete/',
                            type: 'POST',
                            headers: {
                                'X-CSRFToken': getCookie('csrftoken')
                            },
                            success: function(res) {
                                if (res.code === 0) {
                                    layer.msg('删除成功', {icon: 1});
                                    // 删除成功后从表格中移除该行
                                    obj.del();
                                    layer.close(index);
                                } else {
                                    layer.msg(res.msg || '删除失败', {icon: 5});
                                }
                            },
                            error: function() {
                                layer.msg('网络错误', {icon: 5});
                            }
                        });
                    });
                }
            });

            // 打开右侧弹出层函数
            function openSlidePanel(title, url) {
                $('#panelTitle').text(title);
                $('#slidePanelContent').load(url, function() {
                    layui.form.render();
                    var scrollPos = $(window).scrollTop();
                    $('body')
                        .data('scroll-pos', scrollPos)
                        .css('--scroll-pos', -scrollPos + 'px')
                        .addClass('slide-panel-open');
                    $('#slidePanelOverlay').addClass('active');
                    $('#slidePanelWrapper').addClass('active');
                });
            }

            // 关闭右侧弹出层函数
            function closeSlidePanel() {
                $('#slidePanelOverlay').removeClass('active');
                $('#slidePanelWrapper').removeClass('active');
                $('body').removeClass('slide-panel-open');
                $('#slidePanelContent').empty();
                // 恢复滚动位置
                var scrollPos = $('body').data('scroll-pos');
                if (scrollPos !== undefined) {
                    $(window).scrollTop(scrollPos);
                }
            }

            // 添加部门按钮
            $('#addBtn').click(function() {
                openSlidePanel('添加部门', '/system/department/add/');
            });

            // 关闭按钮点击事件
            $('#slidePanelClose').on('click', function() {
                closeSlidePanel();
            });

            // 遮罩层点击事件
            $('#slidePanelOverlay').on('click', function() {
                closeSlidePanel();
            });

            // ESC键关闭事件
            $(document).on('keydown', function(e) {
                if (e.keyCode === 27 && $('body').hasClass('slide-panel-open')) {
                    closeSlidePanel();
                }
            });
        });
    </script>
</body>
</html>

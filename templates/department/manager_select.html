{% extends 'home/base.html' %}
{% load static %}

{% block title %}选择部门负责人{% endblock %}

{% block css %}
<style>
    .layui-card {
        margin: 10px;
    }
    .layui-card-body {
        padding: 15px;
    }
    .user-list {
        max-height: 400px;
        overflow-y: auto;
    }
    .user-item {
        padding: 8px 15px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    .user-item:hover {
        background-color: #f5f5f5;
    }
    .user-item.selected {
        background-color: #e6f7ff;
        border-left: 3px solid #1890ff;
    }
    .user-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .user-name {
        font-weight: 500;
        color: #333;
    }
    .user-dept {
        color: #999;
        font-size: 12px;
    }
    .user-id {
        color: #666;
        font-size: 12px;
    }
    .tree-container {
        max-height: 400px;
        overflow-y: auto;
        padding: 10px;
    }
    .search-box {
        margin-bottom: 15px;
    }
    .no-data {
        text-align: center;
        color: #999;
        padding: 50px 0;
    }
</style>
{% endblock %}

{% block content %}
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md4">
            <div class="layui-card">
                <div class="layui-card-header">组织架构</div>
                <div class="layui-card-body">
                    <div id="department_tree" class="tree-container"></div>
                </div>
            </div>
        </div>
        <div class="layui-col-md8">
            <div class="layui-card">
                <div class="layui-card-header">
                    <span>人员列表</span>
                    <div class="layui-inline" style="float: right;">
                        <input type="text" id="user_search" placeholder="搜索人员姓名或工号" 
                               class="layui-input" style="width: 200px;">
                    </div>
                </div>
                <div class="layui-card-body">
                    <div id="user_list" class="user-list">
                        <div class="no-data">请选择部门查看人员</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
    layui.use(['tree', 'form'], function() {
        var tree = layui.tree;
        var form = layui.form;
        var layer = layui.layer;
        
        // 存储用户数据
        var userData = {{ users|safe }};
        var departmentTree = {{ departments|safe }};
        var selectedUser = null;
        
        // 初始化部门树
        tree.render({
            elem: '#department_tree',
            data: departmentTree,
            showCheckbox: false,
            accordion: true,
            click: function(obj) {
                loadUsersByDepartment(obj.data.id);
            }
        });
        
        // 根据部门加载用户
        function loadUsersByDepartment(departmentId) {
            var filteredUsers = userData.filter(function(user) {
                return user.department_id == departmentId;
            });
            
            renderUserList(filteredUsers);
        }
        
        // 渲染用户列表
        function renderUserList(users) {
            var html = '';
            if (users.length > 0) {
                users.forEach(function(user) {
                    var isSelected = selectedUser && selectedUser.id == user.id;
                    html += '<div class="user-item ' + (isSelected ? 'selected' : '') + '" data-user-id="' + user.id + '">';
                    html += '<div class="user-info">';
                    html += '<div>';
                    html += '<div class="user-name">' + user.name + '</div>';
                    html += '<div class="user-dept">' + user.department_name + '</div>';
                    html += '</div>';
                    html += '<div class="user-id">工号: ' + (user.employee_id || '-') + '</div>';
                    html += '</div>';
                    html += '</div>';
                });
            } else {
                html = '<div class="no-data">该部门暂无人员</div>';
            }
            
            $('#user_list').html(html);
            
            // 绑定用户选择事件
            $('.user-item').click(function() {
                $('.user-item').removeClass('selected');
                $(this).addClass('selected');
                
                var userId = $(this).data('user-id');
                selectedUser = userData.find(function(user) {
                    return user.id == userId;
                });
            });
        }
        
        // 搜索功能
        $('#user_search').on('input', function() {
            var searchText = $(this).val().toLowerCase().trim();
            
            if (searchText === '') {
                $('#user_list').html('<div class="no-data">请选择部门查看人员</div>');
                return;
            }
            
            var filteredUsers = userData.filter(function(user) {
                return user.name.toLowerCase().includes(searchText) || 
                       (user.employee_id && user.employee_id.toLowerCase().includes(searchText));
            });
            
            renderUserList(filteredUsers);
        });
        
        // 提供给父页面的函数
        window.getSelectedUser = function() {
            return selectedUser;
        };
    });
</script>
{% endblock %}

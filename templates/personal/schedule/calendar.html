{% extends 'include/common.html' %}
{% load static %}

{% block title %}日程日历{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <div class="layui-row">
            <div class="layui-col-md6">
                <h3>日程日历</h3>
            </div>
            <div class="layui-col-md6" style="text-align: right;">
                <a href="{% url 'personal:schedule_add' %}" class="layui-btn layui-btn-sm">
                    <i class="layui-icon layui-icon-add-1"></i> 新增日程
                </a>
            </div>
        </div>
    </div>
    <div class="layui-card-body">
        <!-- 日历导航 -->
        <div class="layui-row" style="margin-bottom: 15px;">
            <div class="layui-col-md12" style="text-align: center;">
                {% if month == 1 %}
                    <a href="?year={{ year|add:'-1' }}&month=12" class="layui-btn layui-btn-sm">
                {% else %}
                    <a href="?year={{ year }}&month={{ month|add:'-1' }}" class="layui-btn layui-btn-sm">
                {% endif %}
                    <i class="layui-icon layui-icon-left"></i> 上月
                </a>
                <span style="margin: 0 20px; font-size: 18px; font-weight: bold;">
                    {{ year }}年{{ month }}月
                </span>
                {% if month == 12 %}
                    <a href="?year={{ year|add:'1' }}&month=1" class="layui-btn layui-btn-sm">
                {% else %}
                    <a href="?year={{ year }}&month={{ month|add:'1' }}" class="layui-btn layui-btn-sm">
                {% endif %}
                    下月 <i class="layui-icon layui-icon-right"></i>
                </a>
            </div>
        </div>
        
        <!-- 日历视图 -->
        <div class="layui-row">
            <div class="layui-col-md12">
                <div id="calendar-container" style="background: white; border-radius: 4px; overflow: hidden;">
                    <table class="layui-table" style="margin: 0; border-collapse: collapse;">
                        <thead>
                            <tr style="background-color: #f8f9fa;">
                                <th style="text-align: center; padding: 15px; color: #666; font-weight: bold; width: 14.28%;">周日</th>
                                <th style="text-align: center; padding: 15px; color: #666; font-weight: bold; width: 14.28%;">周一</th>
                                <th style="text-align: center; padding: 15px; color: #666; font-weight: bold; width: 14.28%;">周二</th>
                                <th style="text-align: center; padding: 15px; color: #666; font-weight: bold; width: 14.28%;">周三</th>
                                <th style="text-align: center; padding: 15px; color: #666; font-weight: bold; width: 14.28%;">周四</th>
                                <th style="text-align: center; padding: 15px; color: #666; font-weight: bold; width: 14.28%;">周五</th>
                                <th style="text-align: center; padding: 15px; color: #666; font-weight: bold; width: 14.28%;">周六</th>
                            </tr>
                        </thead>
                        <tbody id="calendar-body">
                            <!-- 日历内容将通过JavaScript生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 日程详情弹窗 -->
<div id="schedule-detail" style="display: none; padding: 20px;">
    <div id="schedule-content"></div>
</div>

<script>
// 日程数据
var scheduleData = {};
{% for schedule in schedules %}
var dateKey = '{{ schedule.start_time|date:"Y-m-d" }}';
if (!scheduleData[dateKey]) {
    scheduleData[dateKey] = [];
}
scheduleData[dateKey].push({
    id: {{ schedule.pk }},
    title: '{{ schedule.title|escapejs }}',
    start_time: '{{ schedule.start_time|date:"H:i" }}',
    end_time: '{{ schedule.end_time|date:"H:i" }}',
    location: '{{ schedule.location|default:""|escapejs }}',
    status: '{{ schedule.status }}',
    priority: {{ schedule.priority }}
});
{% endfor %}

// 生成日历
function generateCalendar(year, month) {
    var firstDay = new Date(year, month - 1, 1);
    var lastDay = new Date(year, month, 0);
    var startDate = new Date(firstDay);
    startDate.setDate(startDate.getDate() - firstDay.getDay());
    
    var calendarBody = document.getElementById('calendar-body');
    calendarBody.innerHTML = '';
    
    var currentDate = new Date(startDate);
    
    for (var week = 0; week < 6; week++) {
        var row = document.createElement('tr');
        
        for (var day = 0; day < 7; day++) {
            var cell = document.createElement('td');
            cell.style.height = '120px';
            cell.style.verticalAlign = 'top';
            cell.style.padding = '8px';
            cell.style.border = '1px solid #e6e6e6';
            cell.style.position = 'relative';
            
            var dateStr = currentDate.getFullYear() + '-' + 
                         String(currentDate.getMonth() + 1).padStart(2, '0') + '-' + 
                         String(currentDate.getDate()).padStart(2, '0');
            
            // 日期数字
            var dayDiv = document.createElement('div');
            dayDiv.style.fontWeight = 'bold';
            dayDiv.style.marginBottom = '5px';
            dayDiv.style.fontSize = '14px';
            
            if (currentDate.getMonth() + 1 === month) {
                dayDiv.textContent = currentDate.getDate();
                dayDiv.style.color = '#333';
                cell.style.backgroundColor = '#fff';
            } else {
                dayDiv.textContent = currentDate.getDate();
                dayDiv.style.color = '#ccc';
                cell.style.backgroundColor = '#f8f9fa';
            }
            
            // 今天高亮
            var today = new Date();
            if (currentDate.toDateString() === today.toDateString()) {
                dayDiv.style.color = '#1E9FFF';
                dayDiv.style.fontWeight = 'bold';
                cell.style.backgroundColor = '#f0f9ff';
            }
            
            cell.appendChild(dayDiv);
            
            // 添加日程
            if (scheduleData[dateStr]) {
                scheduleData[dateStr].forEach(function(schedule, index) {
                    if (index < 3) { // 最多显示3个日程
                        var scheduleDiv = document.createElement('div');
                        scheduleDiv.style.backgroundColor = getScheduleColor(schedule.priority, schedule.status);
                        scheduleDiv.style.color = 'white';
                        scheduleDiv.style.padding = '2px 6px';
                        scheduleDiv.style.marginBottom = '2px';
                        scheduleDiv.style.borderRadius = '3px';
                        scheduleDiv.style.fontSize = '11px';
                        scheduleDiv.style.cursor = 'pointer';
                        scheduleDiv.style.overflow = 'hidden';
                        scheduleDiv.style.textOverflow = 'ellipsis';
                        scheduleDiv.style.whiteSpace = 'nowrap';
                        scheduleDiv.textContent = schedule.start_time + ' ' + schedule.title;
                        scheduleDiv.onclick = function() {
                            showScheduleDetail(schedule);
                        };
                        cell.appendChild(scheduleDiv);
                    }
                });
                
                // 如果有更多日程，显示省略号
                if (scheduleData[dateStr].length > 3) {
                    var moreDiv = document.createElement('div');
                    moreDiv.style.color = '#999';
                    moreDiv.style.fontSize = '11px';
                    moreDiv.style.textAlign = 'center';
                    moreDiv.textContent = '还有' + (scheduleData[dateStr].length - 3) + '个...';
                    moreDiv.style.cursor = 'pointer';
                    moreDiv.onclick = function() {
                        showDaySchedules(dateStr, scheduleData[dateStr]);
                    };
                    cell.appendChild(moreDiv);
                }
            }
            
            // 双击添加日程
            cell.ondblclick = function(date) {
                return function() {
                    window.location.href = '{% url "personal:schedule_add" %}?date=' + date;
                };
            }(dateStr);
            
            row.appendChild(cell);
            currentDate.setDate(currentDate.getDate() + 1);
        }
        
        calendarBody.appendChild(row);
        
        // 如果已经显示了下个月的日期，就停止
        if (currentDate.getMonth() + 1 > month && week >= 4) {
            break;
        }
    }
}

// 获取日程颜色
function getScheduleColor(priority, status) {
    if (status === 'completed') return '#52c41a';
    if (status === 'cancelled') return '#ff4d4f';
    
    switch(priority) {
        case 4: return '#ff4d4f'; // 紧急 - 红色
        case 3: return '#fa8c16'; // 高 - 橙色
        case 2: return '#1890ff'; // 中 - 蓝色
        case 1: return '#52c41a'; // 低 - 绿色
        default: return '#1890ff';
    }
}

// 显示日程详情
function showScheduleDetail(schedule) {
    var statusText = '';
    switch(schedule.status) {
        case 'completed': statusText = '已完成'; break;
        case 'cancelled': statusText = '已取消'; break;
        case 'in_progress': statusText = '进行中'; break;
        default: statusText = '待处理';
    }
    
    var priorityText = '';
    switch(schedule.priority) {
        case 4: priorityText = '紧急'; break;
        case 3: priorityText = '高'; break;
        case 2: priorityText = '中'; break;
        case 1: priorityText = '低'; break;
        default: priorityText = '中';
    }
    
    var content = '<h3>' + schedule.title + '</h3>' +
                  '<p><strong>时间：</strong>' + schedule.start_time + ' - ' + schedule.end_time + '</p>' +
                  '<p><strong>地点：</strong>' + (schedule.location || '无') + '</p>' +
                  '<p><strong>优先级：</strong>' + priorityText + '</p>' +
                  '<p><strong>状态：</strong>' + statusText + '</p>' +
                  '<div style="margin-top: 15px;">' +
                  '<a href="{% url "personal:schedule_edit" 0 %}".replace("0", schedule.id) class="layui-btn layui-btn-sm">编辑</a>' +
                  '</div>';
    
    document.getElementById('schedule-content').innerHTML = content;
    
    layer.open({
        type: 1,
        title: '日程详情',
        content: $('#schedule-detail'),
        area: ['500px', '350px']
    });
}

// 显示某天的所有日程
function showDaySchedules(date, schedules) {
    var content = '<h3>' + date + ' 的日程安排</h3><div style="max-height: 300px; overflow-y: auto;">';
    schedules.forEach(function(schedule) {
        content += '<div style="padding: 8px; border-bottom: 1px solid #eee;">' +
                   '<div style="font-weight: bold;">' + schedule.title + '</div>' +
                   '<div style="color: #666; font-size: 12px;">' + schedule.start_time + ' - ' + schedule.end_time + '</div>' +
                   '</div>';
    });
    content += '</div>';
    
    layer.open({
        type: 1,
        title: '当日日程',
        content: content,
        area: ['400px', '400px']
    });
}

// 页面加载完成后生成日历
document.addEventListener('DOMContentLoaded', function() {
    generateCalendar({{ year }}, {{ month }});
});
</script>
{% endblock %}

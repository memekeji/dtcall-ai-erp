<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器错误 - 系统提示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        .icon {
            font-size: 80px;
            color: #f56c6c;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 32px;
            color: #303133;
            margin-bottom: 16px;
        }
        
        p {
            font-size: 16px;
            color: #606266;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }
        
        .info {
            margin-top: 24px;
            padding: 16px;
            background: #f0f5ff;
            border: 1px solid #d9ecff;
            border-radius: 6px;
            font-size: 14px;
            color: #409eff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💥</div>
        <h1>服务器错误</h1>
        <p>抱歉，服务器发生了内部错误。我们的技术团队已经收到通知，正在紧急处理中。请稍后再试或返回首页。</p>
        <a href="javascript:history.back()" class="btn">返回上一页</a>
        <div class="info">
            <strong>提示：</strong>若问题持续存在，请记录当前时间并联系系统管理员，我们将尽快为您处理。
        </div>
    </div>
</body>
</html>

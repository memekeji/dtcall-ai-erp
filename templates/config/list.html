<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>系统配置</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
</head>

<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">
                        <h3>系统配置管理</h3>
                    </div>
                    <div class="layui-card-body">
                        <!-- 搜索栏 -->
                        <div class="layui-form layui-form-pane" style="margin-bottom: 20px;">
                            <div class="layui-form-item">
                                <div class="layui-inline">
                                    <input type="text" name="search" placeholder="搜索配置键或描述" autocomplete="off"
                                        class="layui-input" value="{{ search }}">
                                </div>
                                <div class="layui-inline">
                                    <button class="layui-btn" onclick="searchConfig()">
                                        <i class="layui-icon layui-icon-search"></i> 搜索
                                    </button>
                                    <a href="{% url 'system:config_add' %}" class="layui-btn layui-btn-normal">
                                        <i class="layui-icon layui-icon-add-1"></i> 新增配置
                                    </a>
                                </div>
                            </div>
                        </div>

                        <!-- 数据表格 -->
                        <table class="layui-table">
                            <thead>
                                <tr>
                                    <th>配置键</th>
                                    <th>配置值</th>
                                    <th>描述</th>
                                    <th>状态</th>
                                    <th>更新时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for config in page_obj %}
                                <tr>
                                    <td>{{ config.key }}</td>
                                    <td>
                                        <div
                                            style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                            {{ config.value }}
                                        </div>
                                    </td>
                                    <td>{{ config.description }}</td>
                                    <td>
                                        {% if config.is_active %}
                                        <span class="layui-badge layui-bg-green">启用</span>
                                        {% else %}
                                        <span class="layui-badge">禁用</span>
                                        {% endif %}
                                    </td>
                                    <td>{{ config.updated_at|date:"Y-m-d H:i" }}</td>
                                    <td>
                                        <a href="{% url 'system:config_edit' config.pk %}"
                                            class="layui-btn layui-btn-xs">编辑</a>
                                    </td>
                                </tr>
                                {% empty %}
                                <tr>
                                    <td colspan="6" style="text-align: center; color: #999;">暂无数据</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>

                        <!-- 分页 -->
                        {% if page_obj.has_other_pages %}
                        <div id="pagination"></div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['laypage'], function () {
            var laypage = layui.laypage;

            {% if page_obj.has_other_pages %}
            laypage.render({
                elem: 'pagination',
                count: {{ page_obj.paginator.count }},
            curr: {{ page_obj.number }},
            limit: 20,
            layout: ['count', 'prev', 'page', 'next', 'limit', 'skip'],
            jump: function (obj, first) {
                if (!first) {
                    var url = new URL(window.location);
                    url.searchParams.set('page', obj.curr);
                    window.location.href = url.toString();
                }
            }
            });
        {% endif %}
        });

        function searchConfig() {
            var search = document.querySelector('input[name="search"]').value;
            var url = new URL(window.location);
            if (search) {
                url.searchParams.set('search', search);
            } else {
                url.searchParams.delete('search');
            }
            url.searchParams.delete('page');
            window.location.href = url.toString();
        }

        // 回车搜索
        document.querySelector('input[name="search"]').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchConfig();
            }
        });
    </script>
</body>

</html>

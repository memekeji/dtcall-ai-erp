{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础信息管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        .stats-card {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            color: white;
            margin-bottom: 10px;
        }
        .stats-card.procedure {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .stats-card.procedureset {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .stats-card.bom {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        .stats-card.equipment {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .stats-card.sop {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .quick-actions {
            margin-bottom: 20px;
        }
        .action-btn {
            margin: 5px;
        }
    </style>
</head>

<body>
    <div class="layui-fluid" style="padding: 20px;">
        <!-- 页面标题 -->
        <div class="layui-row">
            <div class="layui-col-md12">
                <h2 style="margin-bottom: 20px;">基础信息管理</h2>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md3">
                <div class="stats-card procedure">
                    <div class="stat-number">{{ procedure_count }}</div>
                    <div class="stat-label">基本工序</div>
                </div>
            </div>
            <div class="layui-col-md3">
                <div class="stats-card procedureset">
                    <div class="stat-number">{{ procedureset_count }}</div>
                    <div class="stat-label">工序集</div>
                </div>
            </div>
            <div class="layui-col-md3">
                <div class="stats-card bom">
                    <div class="stat-number">{{ bom_count }}</div>
                    <div class="stat-label">BOM管理</div>
                </div>
            </div>
            <div class="layui-col-md3">
                <div class="stats-card equipment">
                    <div class="stat-number">{{ equipment_count }}</div>
                    <div class="stat-label">设备管理</div>
                </div>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="layui-row layui-col-space15 quick-actions">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">快捷操作</div>
                    <div class="layui-card-body">
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:procedure_list' %}'">
                            <i class="layui-icon layui-icon-list"></i> 基本工序
                        </button>
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:procedureset_list' %}'">
                            <i class="layui-icon layui-icon-template-1"></i> 工序集
                        </button>
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:bom_list' %}'">
                            <i class="layui-icon layui-icon-component"></i> BOM管理
                        </button>
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:equipment_list' %}'">
                            <i class="layui-icon layui-icon-engine"></i> 设备管理
                        </button>
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:sop_list' %}'">
                            <i class="layui-icon layui-icon-file-b"></i> SOP管理
                        </button>
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:data_collection_list' %}'">
                            <i class="layui-icon layui-icon-chart"></i> 数据采集
                        </button>
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:performance_analysis' %}'">
                            <i class="layui-icon layui-icon-chart-screen"></i> 性能分析
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快速添加 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">快速添加</div>
                    <div class="layui-card-body">
                        <button class="layui-btn layui-btn-normal action-btn" onclick="location.href='{% url 'production:procedure_add' %}'">
                            <i class="layui-icon layui-icon-add-1"></i> 添加工序
                        </button>
                        <button class="layui-btn layui-btn-warm action-btn" onclick="location.href='{% url 'production:procedureset_add' %}'">
                            <i class="layui-icon layui-icon-add-1"></i> 添加工序集
                        </button>
                        <button class="layui-btn layui-btn-danger action-btn" onclick="location.href='{% url 'production:bom_add' %}'">
                            <i class="layui-icon layui-icon-add-1"></i> 添加BOM
                        </button>
                        <button class="layui-btn action-btn" onclick="location.href='{% url 'production:equipment_add' %}'">
                            <i class="layui-icon layui-icon-add-1"></i> 添加设备
                        </button>
                        <button class="layui-btn layui-btn-primary action-btn" onclick="location.href='{% url 'production:sop_add' %}'">
                            <i class="layui-icon layui-icon-add-1"></i> 添加SOP
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['layer'], function () {
            var layer = layui.layer;
        });
    </script>
</body>

</html>

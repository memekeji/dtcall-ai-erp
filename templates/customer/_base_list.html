{% extends "home/base.html" %}
{% load static %}

{% block content %}
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <div class="layui-row">
                        <div class="layui-col-sm6 layui-col-md4">
                            <h3>{{ page_title }}</h3>
                        </div>
                        <div class="layui-col-sm6 layui-col-md8" style="text-align: right;">
                            {% block toolbar %}
                            {% endblock %}
                        </div>
                    </div>
                </div>
                <div class="layui-card-body">
                    <!-- 搜索框 -->
                    <div class="layui-form-item" style="margin-bottom: 15px;">
                        <form class="layui-form" id="searchForm" lay-filter="searchForm">
                            {% csrf_token %}
                            {% block search_form %}
                            {% endblock %}
                            <div class="layui-input-inline">
                                <button type="submit" class="layui-btn layui-btn-sm" lay-submit lay-filter="doSearch">
                                    <i class="layui-icon layui-icon-search"></i> 搜索
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <!-- 数据表格 -->
                    <table id="dataTable" lay-filter="dataTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 操作按钮栏模板 -->
<script type="text/html" id="operationBar">
    <button class="layui-btn layui-btn-xs" lay-event="edit">编辑</button>
    <button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</button>
</script>

<script>
layui.use(['table', 'form', 'layer', 'jquery'], function() {
    var table = layui.table;
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.jquery;
    
    // API URLs配置
    var API_URLS = {
        list: "{% if list_url %}{{ list_url }}{% else %}{% endif %}".trim() || '/',
        add: "{% if add_url %}{{ add_url }}{% else %}{% endif %}".trim() || '',
        edit: "{% if edit_url %}{{ edit_url }}{% else %}{% endif %}".trim() || '',
        delete: "{% if delete_url %}{{ delete_url }}{% else %}{% endif %}".trim() || ''
    };
    
    {% block table_columns_config %}
    // 默认表格列配置
    var tableColumns = [
        {field: 'id', title: 'ID', width: 80},
        {field: 'name', title: '名称', width: 150},
        {field: 'code', title: '代码', width: 120},
        {field: 'right', title: '操作', width: 120, templet: '#operationBar'}
    ];
    {% endblock %}
    
    // 渲染表格
    table.render({
        elem: '#dataTable',
        url: API_URLS.list,
        page: true,
        limit: 10,
        limits: [10, 20, 50, 100],
        cols: [tableColumns]
    });
    
    // 搜索表单提交
    form.on('submit(doSearch)', function(data) {
        table.reload('dataTable', {
            where: data.field,
            page: { curr: 1 }
        });
        return false;
    });
    
    // 刷新表格
    window.refreshTable = function() {
        table.reload('dataTable');
    };
    
    // 添加按钮点击
    window.addItem = function() {
        layer.open({
            type: 2,
            title: '新增',
            shadeClose: false,
            shade: 0.3,
            maxmin: true,
            area: ['80%', '90%'],
            offset: 'r',
            anim: 2,
            content: API_URLS.add,
            success: function(layero, index) {
                if (layero && typeof layero.css === 'function') {
                    layero.css({
                        'right': '0',
                        'top': '0',
                        'height': '100%'
                    });
                }
            },
            end: function() {
                refreshTable();
            }
        });
    };
    
    // 编辑按钮点击
    window.editItem = function(id) {
        var editUrl = API_URLS.edit.replace('{id}', id);
        layer.open({
            type: 2,
            title: '编辑',
            shadeClose: false,
            shade: 0.3,
            maxmin: true,
            area: ['80%', '90%'],
            offset: 'r',
            anim: 2,
            content: editUrl,
            success: function(layero, index) {
                if (layero && typeof layero.css === 'function') {
                    layero.css({
                        'right': '0',
                        'top': '0',
                        'height': '100%'
                    });
                }
            },
            end: function() {
                refreshTable();
            }
        });
    };
    
    // 删除按钮点击
    window.deleteItem = function(id) {
        var deleteUrl = API_URLS.delete.replace('{id}', id);
        if (!deleteUrl || deleteUrl === '') {
            layer.msg('删除功能未配置');
            return;
        }
        
        layer.confirm('确认删除这条记录吗？', function(index) {
            var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
            
            $.ajax({
                url: deleteUrl,
                type: 'POST',
                data: {csrfmiddlewaretoken: csrfToken},
                success: function(res) {
                    if (res.success || res.code === 0) {
                        layer.msg('删除成功');
                        refreshTable();
                    } else {
                        layer.msg(res.message || res.msg || '删除失败');
                    }
                },
                error: function(xhr) {
                    layer.msg('网络错误或服务器异常');
                }
            });
            layer.close(index);
        });
    };
    
    // 监听表格工具事件
    table.on('tool(dataTable)', function(obj) {
        var data = obj.data;
        var layEvent = obj.event;
        
        if (layEvent === 'edit') {
            editItem(data.id);
        } else if (layEvent === 'delete') {
            deleteItem(data.id);
        }
    });
    
    {% block extra_js %}
    {% endblock %}
});
</script>
{% endblock %}

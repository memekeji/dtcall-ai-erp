{% extends 'customer/_base_list.html' %}

{% block title %}客户字段管理{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <h3>客户字段管理</h3>
    </div>
    <div class="layui-card-body">
        <!-- 工具栏和搜索表单 -->
        <div class="layui-row layui-col-space10" style="margin-bottom: 15px;">
            <!-- 左侧工具栏 -->
            <div class="layui-col-xs12 layui-col-sm6 layui-col-md4">
                <div class="toolbar-left">
                    <a href="{% url 'customer:customer_field_form' %}" class="layui-btn layui-btn-sm">
                        <i class="layui-icon layui-icon-add-1"></i> 添加字段
                    </a>
                </div>
            </div>
            <!-- 右侧搜索表单 -->
            <div class="layui-col-xs12 layui-col-sm6 layui-col-md8">
                <div class="toolbar-right">
                    <form class="layui-form search-form" id="searchForm">
                        {% csrf_token %}
                        <div class="layui-inline">
                            <input type="text" name="search" placeholder="字段名称" class="layui-input search-input">
                        </div>
                        <div class="layui-inline">
                            <button type="submit" class="layui-btn search-btn">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- 数据表格 -->
        <table class="layui-hide" id="fieldTable" lay-filter="fieldTable"></table>
    </div>
</div>

<!-- 行工具栏模板 -->
<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs" lay-event="toggle">切换状态</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>

<script src="/static/layui/layui.js"></script>
<script>
    layui.use(['table', 'form', 'layer'], function(){
        var table = layui.table;
        var form = layui.form;
        var layer = layui.layer;
        
        // 初始化表格
        table.render({
            elem: '#fieldTable',
            url: '{% url "customer:customer_field_list_data" %}',
            cols: [[
                {field: 'id', title: 'ID', width: 80},
                {field: 'name', title: '字段名称', width: 200},
                {field: 'field_name', title: '字段标识', width: 200},
                {field: 'field_type', title: '字段类型', width: 150},
                {field: 'sort', title: '排序', width: 100},
                {field: 'status', title: '状态', width: 100, templet: function(d) {
                    return d.status ? '<span style="color: #5FB878;">启用</span>' : '<span style="color: #FF5722;">禁用</span>';
                }},
                {field: 'create_time', title: '创建时间', width: 160},
                {title: '操作', width: 180, fixed: 'right', align: 'center', toolbar: '#barDemo'}
            ]],
            page: true,
            limits: [10, 20, 50],
            limit: 20,
            loading: true,
            text: {
                none: '暂无相关数据'
            },
            parseData: function(res) {
                return {
                    "code": res.code,
                    "msg": res.msg,
                    "count": res.count,
                    "data": res.data
                };
            }
        });
        
        // 搜索表单提交
        form.on('submit()', function(data) {
            table.reload('fieldTable', {
                where: data.field,
                page: {curr: 1}
            });
            return false;
        });
        
        // 行工具栏事件
        table.on('tool(fieldTable)', function(obj) {
            var data = obj.data;
            switch(obj.event) {
                case 'edit':
                    window.location.href = '{% url "customer:customer_field_form_edit" 0 %}'.replace('0', data.id);
                    break;
                case 'toggle':
                    toggleFieldStatus(data.id);
                    break;
                case 'del':
                    layer.confirm('确定删除该字段吗？', function(index) {
                        deleteField(data.id);
                        layer.close(index);
                    });
                    break;
            }
        });
        
        // 切换状态
        function toggleFieldStatus(id) {
            $.post('{% url "customer:customer_field_toggle" 0 %}'.replace('0', id), {
                csrfmiddlewaretoken: $('[name=csrfmiddlewaretoken]').val()
            }, function(res) {
                if (res.code === 0) {
                    layer.msg(res.msg);
                    table.reload('fieldTable');
                } else {
                    layer.msg(res.msg || '操作失败');
                }
            });
        }
        
        // 删除字段
        function deleteField(id) {
            $.post('{% url "customer:customer_field_delete" 0 %}'.replace('0', id), {
                csrfmiddlewaretoken: $('[name=csrfmiddlewaretoken]').val()
            }, function(res) {
                if (res.code === 0) {
                    layer.msg('删除成功');
                    table.reload('fieldTable');
                } else {
                    layer.msg(res.msg || '删除失败');
                }
            });
        }
    });
</script>
{% endblock %}

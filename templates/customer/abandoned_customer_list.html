<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>废弃客户列表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">
                        <h3>废弃客户列表</h3>
                    </div>
                    <div class="layui-card-body">
                        <!-- 搜索表单 -->
                        <form class="layui-form" id="searchForm" style="margin-bottom: 15px;">
                            {% csrf_token %}
                            <div class="layui-row layui-col-space10">
                                <div class="layui-col-md4">
                                    <input type="text" name="search" placeholder="客户名称" class="layui-input">
                                </div>
                                <div class="layui-col-md2">
                                    <button type="submit" class="layui-btn">
                                        <i class="layui-icon layui-icon-search"></i> 搜索
                                    </button>
                                </div>
                            </div>
                        </form>
                        
                        <!-- 数据表格 -->
                        <table class="layui-hide" id="customerTable" lay-filter="customerTable"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 行工具栏模板 -->
    <script type="text/html" id="barDemo">
        <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="restore">恢复</a>
        <a class="layui-btn layui-btn-xs" lay-event="detail">详情</a>
    </script>

    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['table', 'form', 'layer'], function(){
            var table = layui.table;
            var form = layui.form;
            var layer = layui.layer;
            
            // 初始化表格
            table.render({
                elem: '#customerTable',
                url: '{% url "customer:abandoned_customer_list_data" %}',
                cols: [[
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'name', title: '客户名称', width: 200},
                    {field: 'province', title: '省份', width: 100},
                    {field: 'city', title: '城市', width: 100},
                    {field: 'address', title: '地址', width: 200},
                    {field: 'discard_time', title: '废弃时间', width: 160},
                    {field: 'create_time', title: '创建时间', width: 160},
                    {title: '操作', width: 150, fixed: 'right', align: 'center', toolbar: '#barDemo'}
                ]],
                page: true,
                limits: [10, 20, 50],
                limit: 20,
                loading: true,
                text: {
                    none: '暂无相关数据'
                },
                parseData: function(res) {
                    return {
                        "code": res.code,
                        "msg": res.msg,
                        "count": res.count,
                        "data": res.data
                    };
                }
            });
            
            // 搜索表单提交
            form.on('submit()', function(data) {
                table.reload('customerTable', {
                    where: data.field,
                    page: {curr: 1}
                });
                return false;
            });
            
            // 行工具栏事件
            table.on('tool(customerTable)', function(obj) {
                var data = obj.data;
                switch(obj.event) {
                    case 'restore':
                        layer.confirm('确定将该客户恢复至公海吗？', function(index) {
                            // 发送AJAX请求恢复客户
                            var xhr = new XMLHttpRequest();
                            xhr.open('POST', '{% url "customer:restore_customer" 0 %}'.replace('0', data.id), true);
                            xhr.setRequestHeader('X-CSRFToken', document.getElementsByName('csrfmiddlewaretoken')[0].value);
                            xhr.onreadystatechange = function() {
                                if (xhr.readyState === 4) {
                                    if (xhr.status === 200) {
                                        var res = JSON.parse(xhr.responseText);
                                        if (res.status === 'success') {
                                            layer.msg(res.msg, {icon: 1});
                                            table.reload('customerTable');
                                        } else {
                                            layer.msg(res.msg, {icon: 2});
                                        }
                                    } else {
                                        layer.msg('恢复失败，服务器错误', {icon: 2});
                                    }
                                }
                            };
                            xhr.send();
                            layer.close(index);
                        });
                        break;
                    case 'detail':
                        window.location.href = '{% url "customer:customer_detail" 0 %}'.replace('0', data.id);
                        break;
                }
            });
        });
    </script>
</body>
</html>

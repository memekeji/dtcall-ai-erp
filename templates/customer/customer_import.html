<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>批量导入客户</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
    <style>
        .upload-area {
            border: 2px dashed #d2d2d2;
            border-radius: 6px;
            padding: 40px;
            text-align: center;
            background-color: #fafafa;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #5FB878;
            background-color: #f8fff8;
        }
        .upload-icon {
            font-size: 48px;
            color: #d2d2d2;
            margin-bottom: 15px;
        }
        .field-mapping {
            margin-top: 20px;
        }
        .mapping-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f8f8f8;
            border-radius: 4px;
        }
        .mapping-item label {
            width: 120px;
            font-weight: bold;
        }
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        .result-container {
            margin-top: 20px;
            display: none;
        }
        .error-list {
            max-height: 300px;
            overflow-y: auto;
            background-color: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 4px;
            padding: 10px;
        }
        .error-item {
            margin-bottom: 5px;
            color: #ff4d4f;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">
                        <h3>批量导入客户</h3>
                    </div>
                    <div class="layui-card-body">
                        <!-- 步骤条 -->
                        <div class="layui-timeline">
                            <div class="layui-timeline-item">
                                <i class="layui-icon layui-timeline-axis layui-icon-download-circle" id="step1-icon"></i>
                                <div class="layui-timeline-content layui-text">
                                    <h3 class="layui-timeline-title" id="step1-title">第一步：下载模板</h3>
                                    <p>
                                        请先下载导入模板，按照模板格式填写客户数据
                                        <a href="{% url 'customer:download_template' %}" class="layui-btn layui-btn-xs layui-btn-normal">
                                            <i class="layui-icon layui-icon-download-circle"></i> 下载模板
                                        </a>
                                    </p>
                                </div>
                            </div>
                            <div class="layui-timeline-item">
                                <i class="layui-icon layui-timeline-axis layui-icon-upload" id="step2-icon"></i>
                                <div class="layui-timeline-content layui-text">
                                    <h3 class="layui-timeline-title" id="step2-title">第二步：上传文件</h3>
                                    <div class="upload-area" id="uploadArea">
                                        <div class="upload-icon">
                                            <i class="layui-icon layui-icon-upload-drag"></i>
                                        </div>
                                        <p>点击或拖拽文件到此区域上传</p>
                                        <p style="color: #999; font-size: 12px;">支持 .xlsx, .xls 格式，文件大小不超过10MB</p>
                                    </div>
                                    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
                                </div>
                            </div>
                            <div class="layui-timeline-item">
                                <i class="layui-icon layui-timeline-axis layui-icon-set" id="step3-icon"></i>
                                <div class="layui-timeline-content layui-text">
                                    <h3 class="layui-timeline-title" id="step3-title">第三步：字段映射</h3>
                                    <div class="field-mapping" id="fieldMapping" style="display: none;">
                                        <p>请确认Excel列与系统字段的对应关系：</p>
                                        <div id="mappingContainer"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="layui-timeline-item">
                                <i class="layui-icon layui-timeline-axis layui-icon-ok" id="step4-icon"></i>
                                <div class="layui-timeline-content layui-text">
                                    <h3 class="layui-timeline-title" id="step4-title">第四步：开始导入</h3>
                                    <div class="progress-container" id="progressContainer">
                                        <div class="layui-progress layui-progress-big" lay-showpercent="yes">
                                            <div class="layui-progress-bar" lay-percent="0%" id="progressBar"></div>
                                        </div>
                                        <p id="progressText">准备导入...</p>
                                    </div>
                                    <div class="result-container" id="resultContainer">
                                        <div class="layui-row layui-col-space15">
                                            <div class="layui-col-md4">
                                                <div class="layui-card">
                                                    <div class="layui-card-header">导入统计</div>
                                                    <div class="layui-card-body">
                                                        <p>总记录数：<span id="totalCount">0</span></p>
                                                        <p>成功导入：<span id="successCount" style="color: #5FB878;">0</span></p>
                                                        <p>导入失败：<span id="errorCount" style="color: #FF5722;">0</span></p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="layui-col-md8">
                                                <div class="layui-card">
                                                    <div class="layui-card-header">错误详情</div>
                                                    <div class="layui-card-body">
                                                        <div class="error-list" id="errorList"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 操作按钮 -->
                        <div class="layui-form-item" style="margin-top: 30px;">
                            <div class="layui-input-block">
                                <button class="layui-btn" id="startImport" style="display: none;">开始导入</button>
                                <button class="layui-btn layui-btn-primary" onclick="parent.layer.closeAll()">关闭</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['upload', 'element', 'layer'], function(){
            var upload = layui.upload;
            var element = layui.element;
            var layer = layui.layer;
            
            var uploadedFile = null;
            var fieldMapping = {};
            
            // 文件上传
            var uploadInst = upload.render({
                elem: '#uploadArea',
                url: '{% url "customer:upload_import_file" %}',
                accept: 'file',
                exts: 'xlsx|xls',
                size: 10240, // 10MB
                before: function(obj) {
                    layer.load();
                },
                done: function(res) {
                    layer.closeAll('loading');
                    if (res.code === 0) {
                        uploadedFile = res.data;
                        showFieldMapping(res.data.headers);
                        updateStepStatus(2, 'success');
                        updateStepStatus(3, 'active');
                    } else {
                        layer.msg(res.msg || '文件上传失败');
                    }
                },
                error: function() {
                    layer.closeAll('loading');
                    layer.msg('文件上传失败，请稍后重试');
                }
            });
            
            // 点击上传区域触发文件选择
            $('#uploadArea').click(function() {
                $('#fileInput').click();
            });
            
            $('#fileInput').change(function() {
                if (this.files.length > 0) {
                    uploadInst.config.elem = this;
                    uploadInst.upload();
                }
            });
            
            // 显示字段映射
            function showFieldMapping(headers) {
                var systemFields = [
                    {key: 'name', label: '客户名称', required: true},
                    {key: 'contact_person', label: '联系人', required: true},
                    {key: 'phone', label: '联系电话', required: true},
                    {key: 'email', label: '邮箱', required: false},
                    {key: 'address', label: '地址', required: false},
                    {key: 'province', label: '省份', required: false},
                    {key: 'city', label: '城市', required: false},
                    {key: 'district', label: '区县', required: false},
                    {key: 'content', label: '客户描述', required: false},
                    {key: 'market', label: '主要经营业务', required: false},
                    {key: 'remark', label: '备注信息', required: false}
                ];
                
                var mappingHtml = '';
                systemFields.forEach(function(field) {
                    mappingHtml += `
                        <div class="mapping-item">
                            <label>${field.label}${field.required ? ' *' : ''}：</label>
                            <select name="mapping_${field.key}" class="layui-input" style="width: 200px;">
                                <option value="">请选择Excel列</option>
                    `;
                    
                    headers.forEach(function(header, index) {
                        var selected = '';
                        // 智能匹配
                        if (field.label.includes(header) || header.includes(field.label)) {
                            selected = 'selected';
                            fieldMapping[field.key] = index;
                        }
                        mappingHtml += `<option value="${index}" ${selected}>${header}</option>`;
                    });
                    
                    mappingHtml += `
                            </select>
                        </div>
                    `;
                });
                
                $('#mappingContainer').html(mappingHtml);
                $('#fieldMapping').show();
                $('#startImport').show();
                
                // 监听映射变化
                $('select[name^="mapping_"]').change(function() {
                    var fieldKey = $(this).attr('name').replace('mapping_', '');
                    var columnIndex = $(this).val();
                    if (columnIndex) {
                        fieldMapping[fieldKey] = parseInt(columnIndex);
                    } else {
                        delete fieldMapping[fieldKey];
                    }
                });
                
                layui.form.render();
            }
            
            // 开始导入
            $('#startImport').click(function() {
                // 验证必填字段映射
                var requiredFields = ['name', 'contact_person', 'phone'];
                var missingFields = [];
                
                requiredFields.forEach(function(field) {
                    if (!fieldMapping[field]) {
                        missingFields.push(field);
                    }
                });
                
                if (missingFields.length > 0) {
                    layer.msg('请完成必填字段的映射');
                    return;
                }
                
                updateStepStatus(3, 'success');
                updateStepStatus(4, 'active');
                $('#progressContainer').show();
                
                // 开始导入
                startImport();
            });
            
            // 执行导入
            function startImport() {
                $.ajax({
                    url: '{% url "customer:process_import" %}',
                    type: 'POST',
                    data: {
                        file_id: uploadedFile.file_id,
                        field_mapping: JSON.stringify(fieldMapping),
                        csrfmiddlewaretoken: $('[name=csrfmiddlewaretoken]').val()
                    },
                    success: function(res) {
                        if (res.code === 0) {
                            // 开始轮询导入进度
                            pollImportProgress(res.data.task_id);
                        } else {
                            layer.msg(res.msg || '导入失败');
                        }
                    },
                    error: function() {
                        layer.msg('网络错误，请稍后重试');
                    }
                });
            }
            
            // 轮询导入进度
            function pollImportProgress(taskId) {
                var timer = setInterval(function() {
                    $.get('{% url "customer:import_progress" %}', {task_id: taskId}, function(res) {
                        if (res.code === 0) {
                            var progress = res.data;
                            updateProgress(progress.percent, progress.message);
                            
                            if (progress.status === 'completed') {
                                clearInterval(timer);
                                showImportResult(progress.result);
                                updateStepStatus(4, 'success');
                            } else if (progress.status === 'failed') {
                                clearInterval(timer);
                                layer.msg('导入失败：' + progress.message);
                            }
                        }
                    });
                }, 1000);
            }
            
            // 更新进度条
            function updateProgress(percent, message) {
                element.progress('progressBar', percent + '%');
                $('#progressText').text(message);
            }
            
            // 显示导入结果
            function showImportResult(result) {
                $('#totalCount').text(result.total);
                $('#successCount').text(result.success);
                $('#errorCount').text(result.error);
                
                if (result.errors && result.errors.length > 0) {
                    var errorHtml = '';
                    result.errors.forEach(function(error) {
                        errorHtml += `<div class="error-item">第${error.row}行：${error.message}</div>`;
                    });
                    $('#errorList').html(errorHtml);
                } else {
                    $('#errorList').html('<p style="color: #5FB878;">没有错误</p>');
                }
                
                $('#resultContainer').show();
                
                if (result.success > 0) {
                    layer.msg(`导入完成！成功导入${result.success}条记录`);
                }
            }
            
            // 更新步骤状态
            function updateStepStatus(step, status) {
                var icon = $('#step' + step + '-icon');
                var title = $('#step' + step + '-title');
                
                icon.removeClass('layui-icon-download-circle layui-icon-upload layui-icon-set layui-icon-ok');
                
                if (status === 'active') {
                    icon.addClass('layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop');
                    title.css('color', '#1E9FFF');
                } else if (status === 'success') {
                    icon.removeClass('layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop');
                    icon.addClass('layui-icon-ok');
                    title.css('color', '#5FB878');
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>机会线索</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">
                        <h3>机会线索</h3>
                    </div>
                    <div class="layui-card-body">
                        <!-- 搜索表单 -->
                        <form class="layui-form" id="searchForm" style="margin-bottom: 15px;">
                            {% csrf_token %}
                            <div class="layui-row layui-col-space10">
                                <div class="layui-col-md4">
                                    <input type="text" name="search" placeholder="客户名称" class="layui-input">
                                </div>
                                <div class="layui-col-md2">
                                    <button type="submit" class="layui-btn">
                                        <i class="layui-icon layui-icon-search"></i> 搜索
                                    </button>
                                </div>
                            </div>
                        </form>
                        
                        <!-- 数据表格 -->
                        <table class="layui-hide" id="opportunityTable" lay-filter="opportunityTable"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script>
        // 检查layui是否加载
        if (typeof layui !== 'undefined') {
            layui.use(['table', 'form'], function(){
            var table = layui.table;
            var form = layui.form;
            
            // 初始化表格
            if (table && table.render) {
                table.render({
                elem: '#opportunityTable',
                url: '{% url "customer:opportunity_list_data" %}',
                cols: [[
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'name', title: '客户名称', width: 200},
                    {field: 'province', title: '省份', width: 100},
                    {field: 'city', title: '城市', width: 100},
                    {field: 'intent_status', title: '意向状态', width: 100},
                    {field: 'follow_time', title: '最新跟进', width: 160},
                    {field: 'next_time', title: '下次跟进', width: 160},
                    {field: 'create_time', title: '创建时间', width: 160}
                ]],
                page: true,
                limits: [10, 20, 50],
                limit: 20,
                loading: true,
                text: {
                    none: '暂无相关数据'
                },
                parseData: function(res) {
                    if (res) {
                        return {
                            "code": res.code,
                            "msg": res.msg,
                            "count": res.count,
                            "data": res.data
                        };
                    }
                    return {"code": 0, "msg": "", "count": 0, "data": []};
                }
            });
            } else {
                console.warn('table模块未正确加载');
            }
            
            // 搜索表单提交
            if (form && form.on) {
                form.on('submit()', function(data) {
                    if (table && table.reload && data && data.field) {
                        table.reload('opportunityTable', {
                            where: data.field,
                            page: {curr: 1}
                        });
                    } else {
                        console.warn('表格重载失败：table模块未加载或数据无效');
                    }
                    return false;
                });
            } else {
                console.warn('form模块未正确加载');
            }
        });
        } else {
            console.warn('layui框架未加载，部分功能可能无法使用');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>跟进记录</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">
                        <h3>跟进记录</h3>
                        <div style="float: right;">
                            <a href="{% url 'customer:follow_record_create' %}" class="layui-btn layui-btn-sm">
                                <i class="layui-icon layui-icon-add-1"></i> 添加跟进
                            </a>
                        </div>
                    </div>
                    <div class="layui-card-body">
                        <!-- 搜索表单 -->
                        <form class="layui-form" id="searchForm" style="margin-bottom: 15px;">
                            {% csrf_token %}
                            <div class="layui-row layui-col-space10">
                                <div class="layui-col-md4">
                                    <input type="text" name="search" placeholder="客户名称或跟进内容" class="layui-input">
                                </div>
                                <div class="layui-col-md2">
                                    <button type="submit" class="layui-btn">
                                        <i class="layui-icon layui-icon-search"></i> 搜索
                                    </button>
                                </div>
                            </div>
                        </form>
                        
                        <!-- 数据表格 -->
                        <table class="layui-hide" id="recordTable" lay-filter="recordTable"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 行工具栏模板 -->
    <script type="text/html" id="barDemo">
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
    </script>

    <script src="/static/layui/layui.js"></script>
    <script>
        // 检查layui是否加载
        if (typeof layui !== 'undefined') {
            layui.use(['table', 'form'], function(){
            var table = layui.table;
            var form = layui.form;
            
            // 初始化表格
            if (table && table.render) {
                table.render({
                elem: '#recordTable',
                url: '{% url "customer:follow_record_list_data" %}',
                cols: [[
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'customer_name', title: '客户名称', width: 150},
                    {field: 'follow_type_display', title: '跟进类型', width: 100},
                    {field: 'content', title: '跟进内容', width: 300},
                    {field: 'follow_user', title: '跟进人', width: 100},
                    {field: 'follow_time', title: '跟进时间', width: 160},
                    {field: 'next_follow_time', title: '下次跟进', width: 160},
                    {title: '操作', width: 100, fixed: 'right', align: 'center', toolbar: '#barDemo'}
                ]],
                page: true,
                limits: [10, 20, 50],
                limit: 20,
                loading: true,
                text: {
                    none: '暂无相关数据'
                },
                parseData: function(res) {
                    if (res) {
                        return {
                            "code": res.code,
                            "msg": res.msg,
                            "count": res.count,
                            "data": res.data
                        };
                    }
                    return {"code": 0, "msg": "", "count": 0, "data": []};
                }
            });
            } else {
                console.warn('table模块未正确加载');
            }
            
            // 搜索表单提交
            if (form && form.on) {
                form.on('submit()', function(data) {
                    if (table && table.reload && data && data.field) {
                        table.reload('recordTable', {
                            where: data.field,
                            page: {curr: 1}
                        });
                    } else {
                        console.warn('表格重载失败：table模块未加载或数据无效');
                    }
                    return false;
                });
            } else {
                console.warn('form模块未正确加载');
            }
            
            // 行工具栏事件
            if (table && table.on) {
                table.on('tool(recordTable)', function(obj) {
                    if (obj && obj.data && obj.event) {
                        var data = obj.data;
                        if(obj.event === 'edit' && data.id) {
                            var url = '{% url "customer:follow_record_edit" 0 %}'.replace('0', data.id);
                            if (url) {
                                window.location.href = url;
                            }
                        }
                    }
                });
            } else {
                console.warn('table模块未正确加载');
            }
        });
        } else {
            console.warn('layui框架未加载，部分功能可能无法使用');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% if object %}编辑客户意向{% else %}新增客户意向{% endif %}</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">
                        <h3>{% if object %}编辑客户意向{% else %}新增客户意向{% endif %}</h3>
                    </div>
                    <div class="layui-card-body">
                        <form class="layui-form" method="post">
                            {% csrf_token %}
                            {% if form.errors %}
                                <div class="layui-form-item">
                                    <div class="layui-input-block">
                                        <div class="layui-alert layui-bg-red" style="margin: 10px 0;">
                                            {% for field in form %}
                                                {% for error in field.errors %}
                                                    <div>{{ field.label }}: {{ error }}</div>
                                                {% endfor %}
                                            {% endfor %}
                                            {% for error in form.non_field_errors %}
                                                <div>{{ error }}</div>
                                            {% endfor %}
                                        </div>
                                    </div>
                                </div>
                            {% endif %}
                            <div class="layui-row layui-col-space15">
                                <div class="layui-col-md6">
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">意向名称 <span style="color: red;">*</span></label>
                                        <div class="layui-input-block">
                                            <input type="text" name="name" placeholder="请输入意向名称" class="layui-input" value="{% if object %}{{ object.name }}{% endif %}" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="layui-col-md6">
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">排序</label>
                                        <div class="layui-input-block">
                                            <input type="number" name="sort" placeholder="排序号" class="layui-input" value="{% if object %}{{ object.sort }}{% else %}0{% endif %}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="layui-form-item">
                                <label class="layui-form-label">状态</label>
                                <div class="layui-input-block">
                                    <input type="checkbox" name="status" {% if not object or object.status %}checked{% endif %} lay-skin="switch" lay-text="启用|禁用">
                                </div>
                            </div>
                            
                            <div class="layui-form-item">
                                <div class="layui-input-block">
                                    <button class="layui-btn" type="submit">保存</button>
                                    <a href="{% url 'customer:customer_intent_list' %}" class="layui-btn layui-btn-primary">返回</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['form'], function(){
            var form = layui.form;
            form.render();
        });
    </script>
</body>
</html>

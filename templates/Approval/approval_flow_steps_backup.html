<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script src="/static/layui/layui.js"></script>
<script>
// 全局变量和函数定义，确保在页面加载时就可用
// 初始化步骤计数器
window.stepCounter = 1;

// 确保addFlowStep函数在layui回调执行前就可用
window.addFlowStep = function(type) {
    var stepCounter = window.stepCounter || 1;
    var stepId = 'step_' + stepCounter;
    var stepHtml = createStepHtml(stepId, type, stepCounter);
    
    $('#flowSteps').append(stepHtml);
    window.stepCounter = stepCounter + 1;
    
    // 延迟初始化，等待layui加载完成
    setTimeout(function() {
        if (typeof window.updateBranchTargetOptions === 'function') {
            window.updateBranchTargetOptions();
        }
        if (typeof window.initConditionEvents === 'function') {
            window.initConditionEvents();
        }
        if (typeof window.form === 'object') {
            window.form.render();
        }
        
        // 添加连接线
        if (typeof drawConnectors === 'function') {
            drawConnectors();
        }
    }, 100);
};

// 确保createStepHtml函数在addFlowStep函数使用前可用
window.createStepHtml = function(stepId, type, stepNumber) {
    // 使用getTypeConfig等辅助函数前，先检查它们是否已定义
    var typeConfig = typeof getTypeConfig === 'function' ? getTypeConfig(type) : '';
    var stepTitle = typeof getStepTitle === 'function' ? getStepTitle(type) : '审批步骤';
    var typeColorClass = typeof getTypeColorClass === 'function' ? getTypeColorClass(type) : 'type-default';
    var typeIcon = typeof getTypeIcon === 'function' ? getTypeIcon(type) : 'layui-icon-circle';
    
    return `
    <div class="flow-step-container">
        <!-- 左侧分支连接点 -->
        <div class="branch-point left-point" onclick="addBranch('${stepId}', 'left')">
            <div class="branch-plus">+</div>
        </div>
        
        <div class="flow-step-wrapper">
            <div class="flow-step-title">
                <input type="text" name="step_name" class="step-name-input" placeholder="步骤名称" value="${stepTitle} (步骤${stepNumber})" />
            </div>
            
            <div class="flow-step approval-component ${typeColorClass}" id="${stepId}" onclick="selectStep('${stepId}')">
                <div class="approval-component-header">
                    <span class="approval-type">${stepTitle}</span>
                    <span class="step-number">${stepNumber}</span>
                </div>
                <div class="approval-component-body">
                    <div class="component-type-icon">
                        <i class="layui-icon ${typeIcon}"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>`;
};

// 获取步骤类型对应的颜色类
function getTypeColorClass(type) {
    const colors = {
        'department_head': 'type-manager',
        'specific_user': 'type-specific',
        'department': 'type-department',
        'role': 'type-role',
        'level': 'type-level'
    };
    return colors[type] || 'type-default';
}

// 获取步骤类型对应的图标
function getTypeIcon(type) {
    const icons = {
        'department_head': 'layui-icon-user',
        'specific_user': 'layui-icon-user-circle',
        'department': 'layui-icon-organization',
        'role': 'layui-icon-rank',
        'level': 'layui-icon-sitemap'
    };
    return icons[type] || 'layui-icon-circle';
}

// 获取步骤标题
function getStepTitle(type) {
    const titles = {
        'department_head': '部门负责人审批',
        'specific_user': '指定人员审批',
        'department': '部门审批',
        'role': '角色审批',
        'level': '职级审批'
    };
    return titles[type] || '审批步骤';
}

layui.use(['element', 'layer', 'form'], function() {
    var element = layui.element;
    var layer = layui.layer;
    window.form = layui.form;

    // 发起人类型切换逻辑
    $('#initiator_type').change(function() {
        var type = $(this).val();
        $('#specific_users_config').hide();
        $('#departments_config').hide();
        $('#roles_config').hide();
        
        if (type === 'specific_users') {
            $('#specific_users_config').show();
        } else if (type === 'departments') {
            $('#departments_config').show();
        } else if (type === 'roles') {
            $('#roles_config').show();
        }
    });

    // 初始化显示发起人配置区域
    $('#initiator_type').trigger('change');

    // 确保initDragAndDrop函数是全局可访问的
    window.initDragAndDrop = function() {
        // 组件拖拽功能
        $('.component-item').draggable({
            helper: 'clone',
            cursor: 'move',
            revert: 'invalid',
            zIndex: 1000
        });
        
        // 流程设计区放置功能
        $('.flow-steps').droppable({
            accept: '.component-item',
            activeClass: 'ui-droppable-active',
            hoverClass: 'ui-droppable-hover',
            drop: function(event, ui) {
                var type = ui.draggable.attr('onclick').match(/'([^']+)'/)[1];
                addFlowStep(type);
            }
        });
    }
    
    // 选择步骤，显示其属性
    window.selectStep = function(stepId) {
        // 移除其他步骤的选中状态
        $('.approval-component').removeClass('selected');
        
        // 添加当前步骤的选中状态
        $('#' + stepId).addClass('selected');
        
        // 显示属性面板
        $('#noSelectionMessage').hide();
        $('#selectedProperties').show();
        
        // 加载选中步骤的属性
        loadStepProperties(stepId);
    }
    
    // 加载步骤属性到右侧面板
    function loadStepProperties(stepId) {
        const step = $('#' + stepId);
        const propertiesPanel = $('#selectedProperties');
        const configData = step.find('.step-config-data');
        
        // 清空属性面板
        propertiesPanel.empty();
        
        // 添加步骤名称编辑
        const stepName = configData.closest('.flow-step-wrapper').find('.step-name-input').val();
        propertiesPanel.append(`
            <div class="property-group">
                <h4>基本信息</h4>
                <div class="property-row">
                    <label>步骤名称：</label>
                    <input type="text" id="prop_step_name" value="${stepName}" class="property-input" />
                </div>
            </div>
        `);
        
        // 添加处理时限
        const timeLimit = configData.find('input[name="time_limit"]').val();
        propertiesPanel.append(`
            <div class="property-row">
                <label>处理时限(小时)：</label>
                <input type="number" id="prop_time_limit" value="${timeLimit || ''}" class="property-input" placeholder="不填表示无限制" />
            </div>
        `);
        
        // 添加审批类型配置
        const stepType = configData.find('input[name="step_type"]').val();
        const typeConfigHtml = generatePropertyConfigHtml(configData, stepType);
        propertiesPanel.append(typeConfigHtml);
        
        // 添加条件分支配置
        const conditionField = configData.find('select[name="condition_field"]').val();
        const conditionOperator = configData.find('select[name="condition_operator"]').val();
        const conditionValue = configData.find('input[name="condition_value"]').val();
        
        propertiesPanel.append(`
            <div class="property-group">
                <h4>条件分支</h4>
                <div class="property-row">
                    <label>条件字段：</label>
                    <select id="prop_condition_field" class="property-select">
                        <option value="">无</option>
                        <option value="amount" {% if conditionField == 'amount' %}selected{% endif %}>金额</option>
                        <option value="department" {% if conditionField == 'department' %}selected{% endif %}>部门</option>
                        <option value="position" {% if conditionField == 'position' %}selected{% endif %}>职位</option>
                        <option value="custom_field" {% if conditionField == 'custom_field' %}selected{% endif %}>自定义字段</option>
                    </select>
                </div>
                <div id="prop_operator_row" class="property-row" {% if not conditionField %}style="display: none"{% endif %}>
                    <label>运算符：</label>
                    <select id="prop_condition_operator" class="property-select">
                        <option value="gt" {% if conditionOperator == 'gt' %}selected{% endif %}>大于</option>
                        <option value="lt" {% if conditionOperator == 'lt' %}selected{% endif %}>小于</option>
                        <option value="eq" {% if conditionOperator == 'eq' %}selected{% endif %}>等于</option>
                        <option value="neq" {% if conditionOperator == 'neq' %}selected{% endif %}>不等于</option>
                        <option value="contains" {% if conditionOperator == 'contains' %}selected{% endif %}>包含</option>
                        <option value="not_contains" {% if conditionOperator == 'not_contains' %}selected{% endif %}>不包含</option>
                    </select>
                </div>
                <div id="prop_value_row" class="property-row" {% if not conditionField %}style="display: none"{% endif %}>
                    <label>条件值：</label>
                    <input type="text" id="prop_condition_value" value="{{ conditionValue|default:'' }}" class="property-input" placeholder="条件值" />
                </div>
            </div>
        `);
        
        // 绑定保存按钮事件
        propertiesPanel.append(`
            <div class="property-actions">
                <button class="layui-btn layui-btn-normal" onclick="saveStepProperties('${stepId}')">
                    <i class="layui-icon layui-icon-save"></i> 保存属性
                </button>
                <button class="layui-btn layui-btn-danger" onclick="removeStep('${stepId}')">
                    <i class="layui-icon layui-icon-delete"></i> 删除步骤
                </button>
            </div>
        `);
        
        // 绑定条件字段变更事件
        $('#prop_condition_field').change(function() {
            const hasCondition = $(this).val() !== '';
            $('#prop_operator_row').toggle(hasCondition);
            $('#prop_value_row').toggle(hasCondition);
        });
    }
    
    // 根据步骤类型生成属性配置HTML
    function generatePropertyConfigHtml(configData, stepType) {
        let html = '<div class="property-group"><h4>审批配置</h4>';
        
        switch(stepType) {
            case 'department_head':
            case 'department':
                const deptId = configData.find('select[name="department_id"]').val();
                html += `
                    <div class="property-row">
                        <label>部门：</label>
                        <select id="prop_department_id" class="property-select">
                            <option value="">发起人部门负责人</option>
                            {% for dept in departments %}
                            <option value="{{ dept.id }}" {% if dept_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                `;
                break;
            case 'specific_user':
                const userId = configData.find('select[name="user_id"]').val();
                html += `
                    <div class="property-row">
                        <label>用户：</label>
                        <select id="prop_user_id" class="property-select">
                            <option value="">请选择用户</option>
                            {% for user in users %}
                            <option value="{{ user.id }}" {% if user_id == user.id %}selected{% endif %}>{{ user.get_full_name|default:user.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                `;
                break;
            case 'role':
                const roleId = configData.find('select[name="role_id"]').val();
                html += `
                    <div class="property-row">
                        <label>角色：</label>
                        <select id="prop_role_id" class="property-select">
                            <option value="">请选择角色</option>
                            {% for role in roles %}
                            <option value="{{ role.id }}" {% if role_id == role.id %}selected{% endif %}>{{ role.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                `;
                break;
            case 'level':
                const level = configData.find('select[name="level"]').val();
                html += `
                    <div class="property-row">
                        <label>审批级别：</label>
                        <select id="prop_level" class="property-select">
                            <option value="">请选择级别</option>
                            <option value="1" {% if level == 1 %}selected{% endif %}>一级</option>
                            <option value="2" {% if level == 2 %}selected{% endif %}>二级</option>
                            <option value="3" {% if level == 3 %}selected{% endif %}>三级</option>
                            <option value="4" {% if level == 4 %}selected{% endif %}>四级</option>
                            <option value="5" {% if level == 5 %}selected{% endif %}>五级</option>
                        </select>
                    </div>
                `;
                break;
        }
        
        html += '</div>';
        return html;
    }
    
    // 保存步骤属性
    window.saveStepProperties = function(stepId) {
        const step = $('#' + stepId);
        const configData = step.find('.step-config-data');
        
        // 保存步骤名称
        const stepName = $('#prop_step_name').val();
        configData.closest('.flow-step-wrapper').find('.step-name-input').val(stepName);
        
        // 保存处理时限
        const timeLimit = $('#prop_time_limit').val();
        configData.find('input[name="time_limit"]').val(timeLimit);
        
        // 保存审批类型配置
        const stepType = configData.find('input[name="step_type"]').val();
        
        switch(stepType) {
            case 'department_head':
            case 'department':
                const deptId = $('#prop_department_id').val();
                configData.find('select[name="department_id"]').val(deptId);
                break;
            case 'specific_user':
                const userId = $('#prop_user_id').val();
                configData.find('select[name="user_id"]').val(userId);
                break;
            case 'role':
                const roleId = $('#prop_role_id').val();
                configData.find('select[name="role_id"]').val(roleId);
                break;
            case 'level':
                const level = $('#prop_level').val();
                configData.find('select[name="level"]').val(level);
                break;
        }
        
        // 保存条件分支配置
        const conditionField = $('#prop_condition_field').val();
        const conditionOperator = $('#prop_condition_operator').val();
        const conditionValue = $('#prop_condition_value').val();
        
        configData.find('select[name="condition_field"]').val(conditionField);
        configData.find('select[name="condition_operator"]').val(conditionOperator);
        configData.find('input[name="condition_value"]').val(conditionValue);
        
        // 显示保存成功提示
        layer.msg('属性保存成功');
        
        // 更新分支目标选项
        if (typeof window.updateBranchTargetOptions === 'function') {
            window.updateBranchTargetOptions();
        }
        
        // 重绘连接线
        drawConnectors();
    }
    
    // 添加分支
    window.addBranch = function(sourceStepId, direction) {
        // 在实际应用中，这里应该根据方向添加分支步骤
        // 简化实现，直接添加一个新步骤
        layer.prompt({
            formType: 0,
            title: '请选择分支类型',
            btn: ['部门负责人', '指定用户', '部门审批', '角色审批', '级别审批'],
            btn1: function(index, layero) {
                addFlowStep('department_head');
                layer.close(index);
            },
            btn2: function(index, layero) {
                addFlowStep('specific_user');
                layer.close(index);
            },
            btn3: function(index, layero) {
                addFlowStep('department');
                layer.close(index);
            },
            btn4: function(index, layero) {
                addFlowStep('role');
                layer.close(index);
            },
            btn5: function(index, layero) {
                addFlowStep('level');
                layer.close(index);
            }
        });
    }
    
    // 获取步骤类型配置HTML

    // 复制步骤
    window.duplicateStep = function(stepId) {
        var originalStep = $('#' + stepId);
        var newStepId = 'step_' + stepCounter;
        var stepNumber = stepCounter;
        var stepType = originalStep.find('.step-type').text().trim();
        
        // 创建新步骤
        var newStepHtml = createStepHtml(newStepId, getTypeKey(stepType), stepNumber);
        
        // 插入新步骤
        originalStep.next('.step-arrow').after(newStepHtml);
        
        // 复制原步骤的配置
        var newStep = $('#' + newStepId);
        var newStepName = originalStep.find('input[name="step_name"]').val() + '(复制)';
        newStep.find('input[name="step_name"]').val(newStepName);
        
        // 复制其他配置
        originalStep.find('.step-config input, .step-config select').each(function() {
            var name = $(this).attr('name');
            var value = $(this).val();
            newStep.find('input[name="' + name + '"]').val(value);
            newStep.find('select[name="' + name + '"]').val(value);
        });
        
        stepCounter++;
        if (typeof window.updateBranchTargetOptions === 'function') {
            window.updateBranchTargetOptions();
        }
        if (typeof window.initConditionEvents === 'function') {
            window.initConditionEvents();
        }
        if (typeof window.form === 'object') {
            window.form.render();
        }
        
        // 重新绘制连接线
        drawConnectors();
    };
    
    // 通过标题获取类型key
    function getTypeKey(title) {
        const keys = {
            '部门负责人': 'department_head',
            '指定用户': 'specific_user',
            '部门审批': 'department',
            '角色审批': 'role',
            '级别审批': 'level'
        };
        return keys[title] || 'department_head';
    }
    
    // 移除步骤
    window.removeStep = function(stepId) {
        layer.confirm('确定要删除这个步骤吗？', {icon: 3, title:'确认删除'}, function(index) {
            $('#' + stepId).remove();
            var arrow = $('#' + stepId).next('.step-arrow');
            if (arrow) {
                arrow.remove();
            }
            updateStepNumbers();
            drawConnectors();
            layer.close(index);
        });
    };
    
    // 清空所有步骤
    window.clearAllSteps = function() {
        layer.confirm('确定要清空所有审批步骤吗？', {icon: 3, title:'确认清空'}, function(index) {
            $('#flowSteps').empty();
            stepCounter = 1;
            drawConnectors();
            layer.close(index);
        });
    };
    
    // 初始化条件字段变更事件 - 全局函数，确保在任何地方都能访问
    window.initConditionEvents = function() {
        $(document).on('change', 'select[name="condition_field"]', function() {
            var conditionField = $(this).val();
            var conditionOperator = $(this).closest('.condition-row').find('.condition-operator');
            var conditionValue = $(this).closest('.condition-row').find('.condition-value');
            
            if (conditionField) {
                conditionOperator.removeAttr('disabled').show();
                conditionValue.removeAttr('disabled').show();
            } else {
                conditionOperator.attr('disabled', 'disabled').hide();
                conditionValue.attr('disabled', 'disabled').hide();
            }
        });
        
        // 初始化现有条件字段的状态
        $('select[name="condition_field"]').each(function() {
            var event = new Event('change');
            this.dispatchEvent(event);
        });
    };
    
    // 更新步骤编号
    function updateStepNumbers() {
        $('#flowSteps .flow-step').each(function(index) {
            $(this).find('.step-number').text(index + 1);
        });
        stepCounter = $('#flowSteps .flow-step').length + 1;
        
        // 更新所有步骤的分支目标选项
        updateBranchTargetOptions();
    }
    
    // 更新分支目标选项
    window.updateBranchTargetOptions = function() {
        var flowSteps = $('#flowSteps .flow-step');
        
        // 为每个步骤的分支目标下拉框更新选项
        flowSteps.each(function() {
            var currentStepOrder = parseInt($(this).find('.step-number').text());
            var branchTrueSelect = $(this).find('select[name="branch_target_true"]');
            var branchFalseSelect = $(this).find('select[name="branch_target_false"]');
            
            // 清空现有选项并添加默认选项
            branchTrueSelect.empty().append('<option value="">下一步</option>');
            branchFalseSelect.empty().append('<option value="">下一步</option>');
            
            // 添加其他步骤作为选项
            flowSteps.each(function() {
                var stepOrder = parseInt($(this).find('.step-number').text());
                var stepName = $(this).find('input[name="step_name"]').val();
                
                // 不能选择自己作为目标
                if (stepOrder !== currentStepOrder) {
                    var optionText = stepOrder + '. ' + stepName;
                    branchTrueSelect.append('<option value="' + stepOrder + '">' + optionText + '</option>');
                    branchFalseSelect.append('<option value="' + stepOrder + '">' + optionText + '</option>');
                }
            });
            
            // 重新渲染表单
            if (typeof window.form === 'object') {
                window.form.render('select');
            }
        });
    }
    
    // 初始化条件字段变更事件
    function initConditionEvents() {
        $(document).on('change', 'select[name="condition_field"]', function() {
            var conditionField = $(this).val();
            var conditionOperator = $(this).closest('.condition-row').find('.condition-operator');
            var conditionValue = $(this).closest('.condition-row').find('.condition-value');
            
            if (conditionField) {
                conditionOperator.removeAttr('disabled').show();
                conditionValue.removeAttr('disabled').show();
            } else {
                conditionOperator.attr('disabled', 'disabled').hide();
                conditionValue.attr('disabled', 'disabled').hide();
            }
        });
        
        // 初始化现有条件字段的状态
        $('select[name="condition_field"]').each(function() {
            var event = new Event('change');
            this.dispatchEvent(event);
        });
    }
    
    // 清空流程
    window.clearFlow = function() {
        layer.confirm('确定要清空所有步骤吗？', {
            btn: ['确定', '取消']
        }, function(index) {
            $('#flowSteps').empty();
            stepCounter = 1;
            updateBranchTargetOptions();
            layer.close(index);
        });
    };
    
    // 保存流程
    window.saveFlow = function() {
        var steps = [];
        
        $('#flowSteps .flow-step').each(function(index) {
            var stepData = {
                step_order: index + 1,
                step_name: $(this).find('input[name="step_name"]').val(),
                step_type: $(this).data('type'),
                time_limit_hours: $(this).find('input[name="time_limit"]').val() || null
            };
            
            // 根据类型获取特定配置
            var type = $(this).data('type');
            switch(type) {
                case 'specific_user':
                    stepData.approver_user = $(this).find('select[name="approver_user"]').val();
                    break;
                case 'department':
                    stepData.approver_department = $(this).find('select[name="approver_department"]').val();
                    stepData.department_role = $(this).find('select[name="department_role"]').val();
                    break;
                case 'role':
                    stepData.approver_role = $(this).find('select[name="approver_role"]').val();
                    break;
                case 'level':
                    stepData.approver_level = $(this).find('select[name="approver_level"]').val();
                    break;
            }
            steps.push(stepData);
        });
    }
    
    // 绘制连接线
    function drawConnectors() {
        // 清除现有连接线
        $('.flow-connector').remove();
        
        // 获取所有审批组件和开始结束节点的位置
        var flowArea = $('.flow-design-area');
        var approvalComponents = $('.approval-component');
        var startNode = $('.flow-start');
        var endNode = $('.flow-end');
        
        if (approvalComponents.length === 0) return;
        
        // 计算开始节点到第一个审批组件的连接
        var startPos = startNode.position();
        var firstComponentPos = approvalComponents.first().position();
        var connectorStartToFirst = $('<div class="flow-connector"></div>');
        var startY = startPos.top + startNode.height() + 10;
        var firstY = firstComponentPos.top;
        var centerX = flowArea.width() / 2;
        
        connectorStartToFirst.css({
            left: centerX + 'px',
            top: startY + 'px',
            height: (firstY - startY) + 'px'
        });
        
        flowArea.append(connectorStartToFirst);
        
        // 计算审批组件之间的连接
        approvalComponents.each(function(index) {
            var currentComponent = $(this);
            var nextComponent = approvalComponents.eq(index + 1);
            
            if (nextComponent.length > 0) {
                var currentPos = currentComponent.position();
                var nextPos = nextComponent.position();
                
                var connector = $('<div class="flow-connector"></div>');
                var currentY = currentPos.top + currentComponent.height() + 30; // 30是箭头的高度
                var nextY = nextPos.top;
                
                connector.css({
                    left: centerX + 'px',
                    top: currentY + 'px',
                    height: (nextY - currentY) + 'px'
                });
                
                flowArea.append(connector);
            }
        });
        
        // 计算最后一个审批组件到结束节点的连接
        var lastComponentPos = approvalComponents.last().position();
        var endPos = endNode.position();
        var connectorLastToEnd = $('<div class="flow-connector"></div>');
        var lastY = lastComponentPos.top + approvalComponents.last().height() + 30;
        var endY = endPos.top;
        
        connectorLastToEnd.css({
            left: centerX + 'px',
            top: lastY + 'px',
            height: (endY - lastY) + 'px'
        });
        
        flowArea.append(connectorLastToEnd);
    }
    
    // 保存流程
    window.saveAllSteps = function() {
        var steps = [];
        
        // 遍历所有步骤收集数据
        $('#flowSteps .flow-step').each(function() {
            var stepData = {};
            var stepTypeText = $(this).find('.step-type').text().trim();
            stepData.step_type = getTypeKey(stepTypeText);
            stepData.step_name = $(this).find('input[name="step_name"]').val();
            stepData.time_limit_hours = $(this).find('input[name="time_limit"]').val() || null;
            
            // 根据步骤类型收集特定配置
            if (stepData.step_type === 'department_head' || stepData.step_type === 'department') {
                stepData.department_id = $(this).find('select[name="department_id"]').val() || null;
            } else if (stepData.step_type === 'specific_user') {
                stepData.user_id = $(this).find('select[name="user_id"]').val() || null;
            } else if (stepData.step_type === 'role') {
                stepData.role_id = $(this).find('select[name="role_id"]').val() || null;
            } else if (stepData.step_type === 'level') {
                stepData.level = $(this).find('select[name="level"]').val() || null;
            }
            
            // 获取条件分支配置
            stepData.condition_field = $(this).find('select[name="condition_field"]').val();
            stepData.condition_operator = $(this).find('select[name="condition_operator"]').val();
            stepData.condition_value = $(this).find('input[name="condition_value"]').val();
            stepData.branch_target_true = $(this).find('select[name="branch_target_true"]').val();
            stepData.branch_target_false = $(this).find('select[name="branch_target_false"]').val();
            
            steps.push(stepData);
        });
        
        if (steps.length === 0) {
            layer.msg('请至少添加一个审批步骤', {icon: 2});
            return;
        }
        
        // 收集发起人配置数据
        var initiatorConfig = {};
        initiatorConfig.initiator_type = $('#initiator_type').val();
        
        if (initiatorConfig.initiator_type === 'specific_users') {
            initiatorConfig.user_ids = $('#initiator_users').val() || [];
        } else if (initiatorConfig.initiator_type === 'departments') {
            initiatorConfig.department_ids = $('#initiator_departments').val() || [];
        } else if (initiatorConfig.initiator_type === 'roles') {
            initiatorConfig.role_ids = $('#initiator_roles').val() || [];
        }

        // 发送保存请求
        layer.load(2);
        
        fetch('{% url 'approval:batch_create_steps' flow.pk %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            },
            body: JSON.stringify({steps: steps, initiator_config: initiatorConfig})
        })
        .then(response => response.json())
        .then(data => {
            layer.closeAll('loading');
            if (data.success) {
                layer.msg('流程保存成功', {icon: 1}, function() {
                    location.reload();
                });
            } else {
                layer.msg('保存失败：' + data.message, {icon: 2});
            }
        })
        .catch(error => {
            layer.closeAll('loading');
            layer.msg('网络错误，请稍后重试', {icon: 2});
        });
    };
    
    // 加载现有步骤，确保它是全局可访问的
    window.loadExistingSteps = function() {
        // 尝试从服务器加载现有步骤
        $.ajax({
            url: '{% url 'approval:approval_flow_steps' flow.pk %}?format=json',
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                // 加载发起人配置
                if (data.initiator_config) {
                    var initiatorConfig = data.initiator_config;
                    $('#initiator_type').val(initiatorConfig.initiator_type || 'all');
                     
                    // 根据发起人类型显示对应的配置区域
                    if (initiatorConfig.initiator_type === 'specific_users') {
                        $('#specific_users_config').show();
                        if (initiatorConfig.user_ids && Array.isArray(initiatorConfig.user_ids)) {
                            $('#initiator_users').val(initiatorConfig.user_ids);
                        }
                    } else if (initiatorConfig.initiator_type === 'departments') {
                        $('#departments_config').show();
                        if (initiatorConfig.department_ids && Array.isArray(initiatorConfig.department_ids)) {
                            $('#initiator_departments').val(initiatorConfig.department_ids);
                        }
                    } else if (initiatorConfig.initiator_type === 'roles') {
                        $('#roles_config').show();
                        if (initiatorConfig.role_ids && Array.isArray(initiatorConfig.role_ids)) {
                            $('#initiator_roles').val(initiatorConfig.role_ids);
                        }
                    }
                }
                
                if (data.steps && data.steps.length > 0) {
                    $('#flowSteps').empty();
                    
                    $.each(data.steps, function(index, step) {
                        var stepId = 'step_' + (index + 1);
                        var stepHtml = createStepHtml(stepId, step.step_type, index + 1);
                        
                        $('#flowSteps').append(stepHtml);
                        
                        // 填充步骤数据
                        var $stepElement = $('#' + stepId);
                        $stepElement.find('input[name="step_name"]').val(step.step_name);
                        $stepElement.find('input[name="time_limit"]').val(step.time_limit_hours || '');
                        
                        // 填充条件分支数据
                        if (step.condition_field) {
                            $stepElement.find('select[name="condition_field"]').val(step.condition_field);
                            $stepElement.find('select[name="condition_operator"]').val(step.condition_operator);
                            $stepElement.find('input[name="condition_value"]').val(step.condition_value);
                        }
                    });
                    
                    stepCounter = data.steps.length + 1;
                    updateBranchTargetOptions();
                    // 确保调用的是全局的initConditionEvents函数
                    if (typeof window.initConditionEvents === 'function') {
                        window.initConditionEvents();
                    }
                    form.render();
                }
            },
            error: function() {
                // 加载现有步骤失败
            }
        });
    }; // 添加缺少的分号
    
    // 获取CSRF令牌
    function getCSRFToken() {
        var cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === 'csrftoken=') {
                    cookieValue = cookie.substring(10);
                    break;
                }
            }
        }
        return cookieValue;
    }
    // 初始化
    $(function() {
        // 初始化条件字段事件
        if (typeof window.initConditionEvents === 'function') {
            window.initConditionEvents();
        }
        
        // 加载现有步骤
        if (typeof window.loadExistingSteps === 'function') {
            window.loadExistingSteps();
        }
    });
});
</script>

    border-color: white;
    transform: scale(1.2);
}

.branch-connector-point i {
    color: #3b82f6;
    font-size: 12px;
}

.branch-connector-point:hover i {
    color: white;
}

/* 连接点位置 */
.left-connector {
    left: -12px;
    top: 50%;
    transform: translateY(-50%);
}

.right-connector {
    right: -12px;
    top: 50%;
    transform: translateY(-50%);
}

.bottom-connector {
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
}

/* 步骤名称显示 */
.step-name-display {
    text-align: center;
    margin-bottom: 12px;
    font-weight: 600;
    color: #1e293b;
    font-size: 16px;
}

/* 表单元素统一样式 - 现代化设计 */
.form-select,
.form-input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s ease;
    background: white;
    font-family: inherit;
}

.form-select:focus,
.form-input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.form-label {
    display: block;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
    font-size: 14px;
}

/* 拖拽时的样式 */
.ui-draggable-dragging {
    z-index: 9999;
    opacity: 0.95;
    transform: rotate(2deg) scale(1.02);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2) !important;
}

.ui-droppable-hover {
    background: #dbeafe !important;
    border-color: #3b82f6 !important;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}

/* 流程图连接线 - 现代化设计 */
.flow-connector {
    position: absolute;
    width: 5px;
    background: linear-gradient(to bottom, #3b82f6, #60a5fa);
    z-index: -1;
    border-radius: 3px;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

/* 条件分支连接线 - 现代化设计 */
.condition-branches {
    position: relative;
}

.branch-connector {
    position: absolute;
    width: 4px;
    background: linear-gradient(to bottom, #ef4444, #f87171);
    border-radius: 2px;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
}

/* 动画效果 */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5);
    }
    70% {
        box-shadow: 0 0 0 12px rgba(59, 130, 246, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
    }
}

/* 应用动画 */
.approval-component, .flow-start, .flow-end {
    animation: fadeIn 0.5s ease-out;
}

/* 响应式设计 */
@media (max-width: 1400px) {
    .flow-designer {
        flex-direction: column;
    }
    
    .component-panel {
        width: 100%;
        max-width: 100%;
    }
    
    .component-list {
        flex-direction: row;
        flex-wrap: wrap;
    }
    
    .component-item {
        flex: 1;
        min-width: 200px;
    }
    
    .flow-designer-container {
        flex-direction: column;
    }
    
    .properties-panel {
        width: 100%;
        max-height: 400px;
    }
}

@media (max-width: 768px) {
    .flow-design-area {
        padding: 20px;
        min-height: 500px;
    }
    
    .flow-start,
    .flow-end {
        min-width: 100%;
        padding: 12px 20px;
    }
    
    .approval-component {
        width: 160px;
        height: 80px;
    }
    
    .approval-content {
        font-size: 12px;
    }
    
    .step-name-display {
        font-size: 14px;
    }
}

/* 打印样式 */
@media print {
    .component-panel {
        display: none;
    }
    
    .flow-design-area {
        border: none;
        box-shadow: none;
        padding: 0;
    }
    
    button {
        display: none;
    }
    
    .properties-panel {
        display: none;
    }
}

/* 保存按钮样式 */
.save-properties-btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
}

.save-properties-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
}

/* 条件配置样式 */
.condition-property {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 2px solid #e2e8f0;
}

.condition-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
}

.condition-selectors {
    display: flex;
    gap: 12px;
    align-items: center;
}

.condition-operator {
    font-weight: 600;
    color: #334155;
    padding: 0 8px;
}

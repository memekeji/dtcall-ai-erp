{% extends "home/base.html" %}
{% load static %}

{% block content %}
<div class="flow-designer">
    <div class="designer-header">
        <div class="header-left">
            <h2><i class="layui-icon layui-icon-flow"></i> 审批流程设计器</h2>
            <span class="flow-tag">{{ flow.name }}</span>
        </div>
        <div class="header-right">
            <button class="layui-btn layui-btn-primary" onclick="FlowDesigner.preview()">
                <i class="layui-icon layui-icon-preview"></i> 预览
            </button>
            <button class="layui-btn layui-btn-danger" onclick="FlowDesigner.clearAll()">
                <i class="layui-icon layui-icon-delete"></i> 清空
            </button>
            <button class="layui-btn layui-btn-normal" onclick="FlowDesigner.save()">
                <i class="layui-icon layui-icon-ok"></i> 保存
            </button>
        </div>
    </div>
    
    <div class="designer-body">
        <div class="panel-left">
            <div class="panel-header">
                <i class="layui-icon layui-icon-component"></i> 流程组件
            </div>
            <div class="panel-content">
                <div class="group-title">审批节点</div>
                <div class="component-item" onclick="FlowDesigner.addNode('department_head')">
                    <div class="comp-icon" style="background: linear-gradient(135deg, #8b5cf6, #a78bfa);">
                        <i class="layui-icon layui-icon-user"></i>
                    </div>
                    <div class="comp-info">
                        <span class="comp-name">部门负责人</span>
                        <span class="comp-desc">部门负责人审批</span>
                    </div>
                </div>
                <div class="component-item" onclick="FlowDesigner.addNode('specific_user')">
                    <div class="comp-icon" style="background: linear-gradient(135deg, #ec4899, #f472b6);">
                        <i class="layui-icon layui-icon-user-circle"></i>
                    </div>
                    <div class="comp-info">
                        <span class="comp-name">指定人员</span>
                        <span class="comp-desc">指定人员审批</span>
                    </div>
                </div>
                <div class="component-item" onclick="FlowDesigner.addNode('department')">
                    <div class="comp-icon" style="background: linear-gradient(135deg, #10b981, #34d399);">
                        <i class="layui-icon layui-icon-organization"></i>
                    </div>
                    <div class="comp-info">
                        <span class="comp-name">部门审批</span>
                        <span class="comp-desc">按部门审批</span>
                    </div>
                </div>
                <div class="component-item" onclick="FlowDesigner.addNode('role')">
                    <div class="comp-icon" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);">
                        <i class="layui-icon layui-icon-rank"></i>
                    </div>
                    <div class="comp-info">
                        <span class="comp-name">角色审批</span>
                        <span class="comp-desc">按角色审批</span>
                    </div>
                </div>
                <div class="component-item" onclick="FlowDesigner.addNode('level')">
                    <div class="comp-icon" style="background: linear-gradient(135deg, #6366f1, #818cf8);">
                        <i class="layui-icon layui-icon-sitemap"></i>
                    </div>
                    <div class="comp-info">
                        <span class="comp-name">级别审批</span>
                        <span class="comp-desc">按级别审批</span>
                    </div>
                </div>
                <div class="group-title">抄送通知</div>
                <div class="component-item" onclick="FlowDesigner.addNode('cc')">
                    <div class="comp-icon" style="background: linear-gradient(135deg, #14b8a6, #2dd4bf);">
                        <i class="layui-icon layui-icon-notice"></i>
                    </div>
                    <div class="comp-info">
                        <span class="comp-name">抄送</span>
                        <span class="comp-desc">抄送知会</span>
                    </div>
                </div>
                <div class="component-item" onclick="FlowDesigner.addNode('notification')">
                    <div class="comp-icon" style="background: linear-gradient(135deg, #f97316, #fb923c);">
                        <i class="layui-icon layui-icon-email"></i>
                    </div>
                    <div class="comp-info">
                        <span class="comp-name">系统通知</span>
                        <span class="comp-desc">发送通知</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="panel-center">
            <div class="canvas-area" id="flowCanvas">
                <div class="node-start" id="startNode" onclick="FlowDesigner.selectStartNode()">
                    <div class="start-circle">
                        <i class="layui-icon layui-icon-start"></i>
                    </div>
                    <div class="start-text">开始</div>
                </div>
                
                <div class="connector-v" id="connStart"></div>
                
                <div class="nodes-area" id="nodesArea"></div>
                
                <div class="add-node-btn" onclick="FlowDesigner.showMenu()">
                    <i class="layui-icon layui-icon-add-1"></i> 添加节点
                </div>
                <div class="node-menu" id="nodeMenu" style="display:none;">
                    <div onclick="FlowDesigner.addNode('department_head')"><i class="layui-icon layui-icon-user"></i> 部门负责人</div>
                    <div onclick="FlowDesigner.addNode('specific_user')"><i class="layui-icon layui-icon-user-circle"></i> 指定人员</div>
                    <div onclick="FlowDesigner.addNode('department')"><i class="layui-icon layui-icon-organization"></i> 部门审批</div>
                    <div onclick="FlowDesigner.addNode('role')"><i class="layui-icon layui-icon-rank"></i> 角色审批</div>
                    <div onclick="FlowDesigner.addNode('level')"><i class="layui-icon layui-icon-sitemap"></i> 级别审批</div>
                    <div class="menu-div"></div>
                    <div onclick="FlowDesigner.addNode('cc')"><i class="layui-icon layui-icon-notice"></i> 抄送</div>
                    <div onclick="FlowDesigner.addNode('notification')"><i class="layui-icon layui-icon-email"></i> 系统通知</div>
                </div>
                
                <div class="connector-v" id="connEnd"></div>
                
                <div class="node-end">
                    <div class="end-circle">
                        <i class="layui-icon layui-icon-end"></i>
                    </div>
                    <div class="end-text">结束</div>
                </div>
            </div>
        </div>
        
        <div class="panel-right">
            <div class="panel-header">
                <i class="layui-icon layui-icon-set"></i> 属性配置
            </div>
            <div class="panel-content" id="configPanel">
                <div class="empty-tip">
                    <i class="layui-icon layui-icon-util"></i>
                    <p>请选择节点进行配置</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/layui/layui.js"></script>
<script>
var FlowDesigner = (function() {
    var layer, form;
    var nodesData = [];
    var nodeCounter = 0;
    var usersData = [];
    var deptsData = [];
    var initiatorData = {
        users: [],
        departments: [],
        roles: []
    };
    var startNodeConfig = {
        form_fields: []
    };
    
    var typeMap = {
        'department_head': {title: '部门负责人审批', icon: 'layui-icon-user', color: 'purple'},
        'specific_user': {title: '指定人员审批', icon: 'layui-icon-user-circle', color: 'pink'},
        'department': {title: '部门审批', icon: 'layui-icon-organization', color: 'green'},
        'role': {title: '角色审批', icon: 'layui-icon-rank', color: 'orange'},
        'level': {title: '级别审批', icon: 'layui-icon-sitemap', color: 'blue'},
        'cc': {title: '抄送', icon: 'layui-icon-notice', color: 'teal'},
        'notification': {title: '系统通知', icon: 'layui-icon-email', color: 'orange'}
    };
    
    function init() {
        layer = layui.layer;
        form = layui.form;
        
        try {
            usersData = {{ users_json|safe }};
            deptsData = {{ departments_json|safe }};
        } catch (e) {
            usersData = [];
            deptsData = [];
        }
        
        loadExisting();
        loadInitiatorConfig();
        updateConnectors();
        showStartNodeConfig();
        
        document.addEventListener('click', function(e) {
            var menu = document.getElementById('nodeMenu');
            var btn = document.querySelector('.add-node-btn');
            if (menu && menu.style.display === 'block' && 
                (!btn || !btn.contains(e.target)) && 
                !menu.contains(e.target)) {
                menu.style.display = 'none';
            }
        });
    }
    
    function loadStartNodeConfig() {
        var flowId = {{ flow.pk }};
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/approval/approvalflow/' + flowId + '/start-config/', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    startNodeConfig.form_fields = data.form_fields || [];
                    renderFormFields();
                } catch (e) {
                    console.error('加载开始节点配置失败', e);
                }
            }
        };
        xhr.send();
    }
    
    function renderFormFields() {
        var container = document.getElementById('formFieldsContainer');
        if (!container) return;
        
        var html = '';
        startNodeConfig.form_fields.forEach(function(field, index) {
            var fieldTypeLabels = {
                'text': '文本',
                'textarea': '多行文本',
                'number': '数字',
                'date': '日期',
                'select': '下拉选择',
                'user': '用户选择',
                'department': '部门选择'
            };
            
            html += '<div class="field-item" data-index="' + index + '">' +
                '<div class="field-header">' +
                '<span class="field-name">' + field.label + '</span>' +
                '<span class="field-type">' + (fieldTypeLabels[field.type] || field.type) + '</span>' +
                '</div>' +
                '<div class="field-actions">' +
                '<button type="button" class="layui-btn layui-btn-xs layui-btn-danger" onclick="FlowDesigner.deleteFormField(' + index + ')"><i class="layui-icon layui-icon-delete"></i></button>' +
                '</div>' +
                '</div>';
        });
        container.innerHTML = html || '<div class="empty-field-tip">暂未添加字段</div>';
    }
    
    function addFormField() {
        layer.open({
            type: 1,
            title: '添加表单字段',
            area: ['400px', '420px'],
            content: '<div class="add-field-form" style="padding: 20px;">' +
                '<div class="layui-form-item">' +
                '<label class="layui-form-label">字段标签</label>' +
                '<div class="layui-input-block"><input type="text" id="fieldLabel" class="layui-input" placeholder="请输入字段显示名称"></div>' +
                '</div>' +
                '<div class="layui-form-item">' +
                '<label class="layui-form-label">字段类型</label>' +
                '<div class="layui-input-block"><select id="fieldType" class="layui-input">' +
                '<option value="text">单行文本</option>' +
                '<option value="textarea">多行文本</option>' +
                '<option value="number">数字</option>' +
                '<option value="date">日期</option>' +
                '<option value="select">下拉选择</option>' +
                '<option value="user">用户选择</option>' +
                '<option value="department">部门选择</option>' +
                '</select></div>' +
                '</div>' +
                '<div class="layui-form-item">' +
                '<label class="layui-form-label">字段KEY</label>' +
                '<div class="layui-input-block"><input type="text" id="fieldKey" class="layui-input" placeholder="如: amount, date"></div>' +
                '</div>' +
                '<div class="layui-form-item">' +
                '<label class="layui-form-label">是否必填</label>' +
                '<div class="layui-input-block"><input type="checkbox" id="fieldRequired" lay-skin="switch" lay-text="是|否"></div>' +
                '</div>' +
                '<div class="layui-form-item">' +
                '<label class="layui-form-label">选项值</label>' +
                '<div class="layui-input-block"><input type="text" id="fieldOptions" class="layui-input" placeholder="下拉选项用逗号分隔"></div>' +
                '</div>' +
                '</div>',
            btn: ['确定', '取消'],
            yes: function(index) {
                var label = document.getElementById('fieldLabel').value.trim();
                var type = document.getElementById('fieldType').value;
                var key = document.getElementById('fieldKey').value.trim();
                var required = document.getElementById('fieldRequired').checked;
                var options = document.getElementById('fieldOptions').value.trim();
                
                if (!label || !key) {
                    layer.msg('请填写字段标签和KEY', {icon: 2});
                    return;
                }
                
                startNodeConfig.form_fields.push({
                    label: label,
                    type: type,
                    key: key,
                    required: required,
                    options: options ? options.split(',').map(function(o) { return o.trim(); }) : []
                });
                
                renderFormFields();
                layer.close(index);
            }
        });
    }
    
    function deleteFormField(index) {
        layer.confirm('确定删除该字段？', {icon: 3, title: '确认'}, function(idx) {
            startNodeConfig.form_fields.splice(index, 1);
            renderFormFields();
            layer.close(idx);
        });
    }
    
    function saveStartNodeConfig() {
        layer.load(2);
        
        var csrfToken = '';
        var csrfEl = document.querySelector('[name=csrfmiddlewaretoken]');
        if (csrfEl) csrfToken = csrfEl.value;
        
        var flowId = {{ flow.pk }};
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/approval/approvalflow/' + flowId + '/update-start-config/', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('X-CSRFToken', csrfToken);
        xhr.onreadystatechange = function() {
            layer.closeAll('loading');
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var res = JSON.parse(xhr.responseText);
                        if (res.success) {
                            layer.msg('开始节点配置保存成功', {icon: 1});
                        } else {
                            layer.msg(res.message || '保存失败', {icon: 2});
                        }
                    } catch (e) {
                        layer.msg('保存失败', {icon: 2});
                    }
                } else {
                    layer.msg('网络错误', {icon: 2});
                }
            }
        };
        xhr.send(JSON.stringify({
            form_fields: startNodeConfig.form_fields
        }));
    }
    
    function showStartNodeConfig() {
        loadStartNodeConfig();
        
        var userOpts = getAllUserOptions([]);
        var deptOpts = getAllDeptOptions([]);
        
        var html = '<div class="config-section">' +
            '<div class="section-label"><i class="layui-icon layui-icon-edit"></i> 开始节点配置</div>' +
            '<div class="section-desc">配置发起审批时需要填写的申请信息</div>' +
            '</div>' +
            '<div class="config-section">' +
            '<div class="section-label"><i class="layui-icon layui-icon-survey"></i> 自定义表单字段</div>' +
            '<div id="formFieldsContainer" class="form-fields-container"></div>' +
            '<button type="button" class="layui-btn layui-btn-fluid layui-btn-primary" onclick="FlowDesigner.addFormField()" style="margin-top: 12px;">' +
            '<i class="layui-icon layui-icon-add-1"></i> 添加字段' +
            '</button>' +
            '</div>' +
            '<div class="config-section">' +
            '<div class="section-label">操作</div>' +
            '<button class="layui-btn layui-btn-fluid layui-btn-normal" onclick="FlowDesigner.saveStartNodeConfig()">' +
            '<i class="layui-icon layui-icon-ok"></i> 保存配置' +
            '</button>' +
            '</div>';
        
        document.getElementById('configPanel').innerHTML = html;
        form.render();
    }
    
    function getAllUserOptions(selectedIds) {
        var html = '<option value="">请选择用户</option>';
        usersData.forEach(function(u) {
            var sel = selectedIds.indexOf(u.id) !== -1 ? 'selected' : '';
            html += '<option value="' + u.id + '" ' + sel + '>' + (u.full_name || u.username) + '</option>';
        });
        return html;
    }
    
    function getAllDeptOptions(selectedIds) {
        var html = '<option value="">请选择部门</option>';
        deptsData.forEach(function(d) {
            var sel = selectedIds.indexOf(d.id) !== -1 ? 'selected' : '';
            html += '<option value="' + d.id + '" ' + sel + '>' + d.name + '</option>';
        });
        return html;
    }
    
    function loadInitiatorConfig() {
        var flowId = {{ flow.pk }};
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/approval/approvalflow/' + flowId + '/initiator/', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    initiatorData.users = data.initiator_users || [];
                    initiatorData.departments = data.initiator_departments || [];
                    initiatorData.roles = data.initiator_roles || [];
                    renderInitiatorSelects();
                } catch (e) {
                    console.error('加载发起人配置失败', e);
                }
            }
        };
        xhr.send();
    }
    
    function renderInitiatorSelects() {
        var userSel = document.getElementById('initiator_users');
        var deptSel = document.getElementById('initiator_depts');
        if (userSel) {
            Array.from(userSel.options).forEach(function(opt) {
                opt.selected = initiatorData.users.indexOf(parseInt(opt.value)) !== -1;
            });
            form.render('select');
        }
        if (deptSel) {
            Array.from(deptSel.options).forEach(function(opt) {
                opt.selected = initiatorData.departments.indexOf(parseInt(opt.value)) !== -1;
            });
            form.render('select');
        }
    }
    
    function loadExisting() {
        var flowId = {{ flow.pk }};
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/approval/approvalflow/' + flowId + '/steps/?format=json', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    if (data.steps && data.steps.length > 0) {
                        document.getElementById('nodesArea').innerHTML = '';
                        nodesData = [];
                        nodeCounter = 0;
                        
                        data.steps.forEach(function(step) {
                            addNodeToCanvas(step.step_type, step.step_name, step);
                        });
                    }
                } catch (e) {
                    console.error('加载失败', e);
                }
            }
        };
        xhr.send();
    }
    
    function showInitiatorConfig() {
        var userOpts = getAllUserOptions(initiatorData.users);
        var deptOpts = getAllDeptOptions(initiatorData.departments);
        
        var html = '<div class="config-section">' +
            '<div class="section-label"><i class="layui-icon layui-icon-user"></i> 发起人配置</div>' +
            '<div class="section-desc">配置哪些人员可以发起此审批流程</div>' +
            '<div class="config-row"><label>可发起用户</label><select class="layui-input" multiple id="initiator_users">' + userOpts + '</select></div>' +
            '<div class="config-row"><label>可发起部门</label><select class="layui-input" multiple id="initiator_depts">' + deptOpts + '</select></div>' +
            '<div class="config-row"><label>可发起角色</label><input type="text" class="layui-input" id="initiator_roles" value="' + (initiatorData.roles.join(',') || '') + '" placeholder="多个角色用逗号分隔" /></div>' +
            '<div class="config-tip"><i class="layui-icon layui-icon-tips"></i> 留空表示所有用户均可发起</div>' +
            '</div>' +
            '<div class="config-section">' +
            '<div class="section-label">操作</div>' +
            '<button class="layui-btn layui-btn-fluid layui-btn-normal" onclick="FlowDesigner.saveInitiator()"><i class="layui-icon layui-icon-ok"></i> 保存发起人配置</button>' +
            '</div>';
        
        document.getElementById('configPanel').innerHTML = html;
        form.render('select');
        
        setTimeout(function() {
            bindInitiatorEvents();
        }, 50);
    }
    
    function bindInitiatorEvents() {
        var userSel = document.getElementById('initiator_users');
        if (userSel) {
            userSel.addEventListener('change', function() {
                var arr = [];
                Array.from(userSel.selectedOptions).forEach(function(opt) {
                    arr.push(parseInt(opt.value));
                });
                initiatorData.users = arr;
            });
        }
        
        var deptSel = document.getElementById('initiator_depts');
        if (deptSel) {
            deptSel.addEventListener('change', function() {
                var arr = [];
                Array.from(deptSel.selectedOptions).forEach(function(opt) {
                    arr.push(parseInt(opt.value));
                });
                initiatorData.departments = arr;
            });
        }
        
        var roleInput = document.getElementById('initiator_roles');
        if (roleInput) {
            roleInput.addEventListener('change', function() {
                initiatorData.roles = this.value.split(',').map(function(r) { return r.trim(); }).filter(function(r) { return r; });
            });
        }
    }
    
    function saveInitiator() {
        layer.load(2);
        
        var csrfToken = '';
        var csrfEl = document.querySelector('[name=csrfmiddlewaretoken]');
        if (csrfEl) csrfToken = csrfEl.value;
        
        var flowId = {{ flow.pk }};
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/approval/approvalflow/' + flowId + '/update-initiator/', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('X-CSRFToken', csrfToken);
        xhr.onreadystatechange = function() {
            layer.closeAll('loading');
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var res = JSON.parse(xhr.responseText);
                        if (res.success) {
                            layer.msg('发起人配置保存成功', {icon: 1});
                        } else {
                            layer.msg(res.message || '保存失败', {icon: 2});
                        }
                    } catch (e) {
                        layer.msg('保存失败', {icon: 2});
                    }
                } else {
                    layer.msg('网络错误', {icon: 2});
                }
            }
        };
        xhr.send(JSON.stringify({
            initiator_users: initiatorData.users,
            initiator_departments: initiatorData.departments,
            initiator_roles: initiatorData.roles
        }));
    }
    
    function getAllUserOptions(selectedIds) {
        var html = '<option value="">请选择用户</option>';
        usersData.forEach(function(u) {
            var sel = selectedIds.indexOf(u.id) !== -1 ? 'selected' : '';
            html += '<option value="' + u.id + '" ' + sel + '>' + (u.full_name || u.username) + '</option>';
        });
        return html;
    }
    
    function getAllDeptOptions(selectedIds) {
        var html = '<option value="">请选择部门</option>';
        deptsData.forEach(function(d) {
            var sel = selectedIds.indexOf(d.id) !== -1 ? 'selected' : '';
            html += '<option value="' + d.id + '" ' + sel + '>' + d.name + '</option>';
        });
        return html;
    }
    
    function addNode(type) {
        hideMenu();
        var info = typeMap[type] || {title: '节点', icon: 'layui-icon-circle', color: 'default'};
        addNodeToCanvas(type, info.title, null);
    }
    
    function addNodeToCanvas(type, name, existingData) {
        nodeCounter++;
        var nodeId = 'node_' + nodeCounter;
        
        var data = {
            id: nodeId,
            type: type,
            name: name,
            time_limit: existingData ? existingData.time_limit_hours : 24,
            approver_user: existingData ? (existingData.approver_user || '') : '',
            approver_dept: existingData ? (existingData.approver_department || '') : '',
            approver_level: existingData ? (existingData.approver_level || '') : '',
            cc_users: [],
            notify_users: [],
            desc: existingData ? (existingData.description || '') : '',
            require_comment: existingData ? (existingData.require_comment || false) : true,
            comment_hint: existingData ? (existingData.comment_hint || '请输入审批意见') : '请输入审批意见'
        };
        
        if (existingData) {
            data.cc_users = existingData.cc_users || [];
            data.notify_users = existingData.notification_users || [];
        }
        
        nodesData.push(data);
        
        var info = typeMap[type] || {title: '节点', icon: 'layui-icon-circle', color: 'default'};
        var html = '<div class="node-card ' + info.color + '" id="' + nodeId + '" data-type="' + type + '">' +
            '<div class="node-card-header ' + info.color + '">' +
            '<i class="layui-icon ' + info.icon + '"></i>' +
            '<span class="node-card-title">' + info.title + '</span>' +
            '<span class="node-card-num">#' + nodeCounter + '</span>' +
            '</div>' +
            '<div class="node-card-body">' +
            '<input type="text" class="node-name-input" id="name_' + nodeId + '" value="' + name + '" />' +
            '</div>' +
            '<div class="node-card-btns">' +
            '<button class="btn-del" onclick="FlowDesigner.deleteNode(\'' + nodeId + '\', event)"><i class="layui-icon layui-icon-delete"></i></button>' +
            '</div>' +
            '</div>';
        
        document.getElementById('nodesArea').insertAdjacentHTML('beforeend', html);
        
        document.getElementById('name_' + nodeId).addEventListener('change', function() {
            updateNodeData(nodeId, 'name', this.value);
        });
        
        document.getElementById(nodeId).addEventListener('click', function() {
            selectNode(nodeId);
        });
        
        updateConnectors();
        selectNode(nodeId);
    }
    
    function selectStartNode() {
        document.querySelectorAll('.node-card').forEach(function(el) {
            el.classList.remove('selected');
        });
        
        var el = document.getElementById('startNode');
        if (el) {
            el.classList.add('selected');
        }
        
        showStartNodeConfig();
    }
    
    function selectNode(nodeId) {
        document.querySelectorAll('.node-card').forEach(function(el) {
            el.classList.remove('selected');
        });
        
        var el = document.getElementById(nodeId);
        if (el) {
            el.classList.add('selected');
        }
        
        var data = null;
        for (var i = 0; i < nodesData.length; i++) {
            if (nodesData[i].id === nodeId) {
                data = nodesData[i];
                break;
            }
        }
        
        if (data) {
            showConfig(nodeId, data);
        }
    }
    
    function showConfig(nodeId, data) {
        var info = typeMap[data.type] || {title: '节点'};
        var isCC = data.type === 'cc';
        var isNotify = data.type === 'notification';
        
        var userOpts = getUserOptions(data.approver_user);
        var deptOpts = getDeptOptions(data.approver_dept);
        var levelOpts = getLevelOptions(data.approver_level);
        
        var approverHtml = '';
        if (!isCC && !isNotify) {
            approverHtml = '<div class="config-section">' +
                '<div class="section-label">审批人配置</div>';
            
            if (data.type === 'specific_user') {
                approverHtml += '<div class="config-row"><label>指定用户</label><select class="layui-input" id="cfg_user_' + nodeId + '">' + userOpts + '</select></div>';
            }
            if (data.type === 'department' || data.type === 'department_head') {
                approverHtml += '<div class="config-row"><label>审批部门</label><select class="layui-input" id="cfg_dept_' + nodeId + '">' + deptOpts + '</select></div>';
            }
            if (data.type === 'level') {
                approverHtml += '<div class="config-row"><label>审批级别</label><select class="layui-input" id="cfg_level_' + nodeId + '">' + levelOpts + '</select></div>';
            }
            approverHtml += '<div class="config-row"><label>处理时限(小时)</label><input type="number" class="layui-input" id="cfg_time_' + nodeId + '" value="' + (data.time_limit || '') + '" placeholder="不限制" /></div>' +
                '</div>' +
                '<div class="config-section">' +
                '<div class="section-label">审批意见配置</div>' +
                '<div class="config-row"><label><input type="checkbox" id="cfg_require_comment_' + nodeId + '" lay-skin="primary" ' + (data.require_comment ? 'checked' : '') + '> 需要审批意见</label></div>' +
                '<div class="config-row"><label>意见提示文字</label><input type="text" class="layui-input" id="cfg_comment_hint_' + nodeId + '" value="' + (data.comment_hint || '请输入审批意见') + '" placeholder="如：请输入审批意见" /></div>' +
                '</div>';
        } else if (isCC) {
            approverHtml = '<div class="config-section">' +
                '<div class="section-label">抄送配置</div>' +
                '<div class="config-row"><label>抄送用户</label><select class="layui-input" multiple id="cfg_cc_' + nodeId + '">' + userOpts + '</select></div></div>';
        } else if (isNotify) {
            approverHtml = '<div class="config-section">' +
                '<div class="section-label">通知配置</div>' +
                '<div class="config-row"><label>通知用户</label><select class="layui-input" multiple id="cfg_ntf_' + nodeId + '">' + userOpts + '</select></div></div>';
        }
        
        var html = '<div class="config-section">' +
            '<div class="section-label">基本信息</div>' +
            '<div class="config-row"><label>节点名称</label><input type="text" class="layui-input" id="cfg_name_' + nodeId + '" value="' + data.name + '" /></div>' +
            '<div class="config-row"><label>节点类型</label><input type="text" class="layui-input" value="' + info.title + '" disabled /></div>' +
            '<div class="config-row"><label>描述说明</label><textarea class="layui-textarea" id="cfg_desc_' + nodeId + '" placeholder="请输入描述">' + (data.desc || '') + '</textarea></div></div>' +
            approverHtml +
            '<div class="config-section">' +
            '<div class="section-label">操作</div>' +
            '<button class="layui-btn layui-btn-danger layui-btn-fluid" onclick="FlowDesigner.deleteNode(\'' + nodeId + '\', event)"><i class="layui-icon layui-icon-delete"></i> 删除节点</button>' +
            '</div>';
        
        document.getElementById('configPanel').innerHTML = html;
        form.render('select');
        
        setTimeout(function() {
            bindConfigEvents(nodeId, data);
        }, 50);
    }
    
    function bindConfigEvents(nodeId, data) {
        var nameInput = document.getElementById('cfg_name_' + nodeId);
        if (nameInput) {
            nameInput.addEventListener('change', function() {
                updateNodeData(nodeId, 'name', this.value);
                document.getElementById('name_' + nodeId).value = this.value;
            });
        }
        
        var descInput = document.getElementById('cfg_desc_' + nodeId);
        if (descInput) {
            descInput.addEventListener('change', function() {
                updateNodeData(nodeId, 'desc', this.value);
            });
        }
        
        var userSel = document.getElementById('cfg_user_' + nodeId);
        if (userSel) {
            userSel.addEventListener('change', function() {
                updateNodeData(nodeId, 'approver_user', this.value);
            });
        }
        
        var deptSel = document.getElementById('cfg_dept_' + nodeId);
        if (deptSel) {
            deptSel.addEventListener('change', function() {
                updateNodeData(nodeId, 'approver_dept', this.value);
            });
        }
        
        var levelSel = document.getElementById('cfg_level_' + nodeId);
        if (levelSel) {
            levelSel.addEventListener('change', function() {
                updateNodeData(nodeId, 'approver_level', this.value);
            });
        }
        
        var timeInput = document.getElementById('cfg_time_' + nodeId);
        if (timeInput) {
            timeInput.addEventListener('change', function() {
                updateNodeData(nodeId, 'time_limit', this.value);
            });
        }
        
        var requireComment = document.getElementById('cfg_require_comment_' + nodeId);
        if (requireComment) {
            requireComment.addEventListener('change', function() {
                updateNodeData(nodeId, 'require_comment', this.checked);
            });
        }
        
        var commentHint = document.getElementById('cfg_comment_hint_' + nodeId);
        if (commentHint) {
            commentHint.addEventListener('change', function() {
                updateNodeData(nodeId, 'comment_hint', this.value);
            });
        }
        
        var ccSel = document.getElementById('cfg_cc_' + nodeId);
        if (ccSel) {
            ccSel.addEventListener('change', function() {
                var arr = [];
                Array.from(ccSel.selectedOptions).forEach(function(opt) {
                    arr.push(opt.value);
                });
                updateNodeData(nodeId, 'cc_users', arr);
            });
            if (data.cc_users && data.cc_users.length > 0) {
                Array.from(ccSel.options).forEach(function(opt) {
                    opt.selected = data.cc_users.indexOf(opt.value) !== -1;
                });
                form.render('select');
            }
        }
        
        var ntfSel = document.getElementById('cfg_ntf_' + nodeId);
        if (ntfSel) {
            ntfSel.addEventListener('change', function() {
                var arr = [];
                Array.from(ntfSel.selectedOptions).forEach(function(opt) {
                    arr.push(opt.value);
                });
                updateNodeData(nodeId, 'notify_users', arr);
            });
            if (data.notify_users && data.notify_users.length > 0) {
                Array.from(ntfSel.options).forEach(function(opt) {
                    opt.selected = data.notify_users.indexOf(opt.value) !== -1;
                });
                form.render('select');
            }
        }
    }
    
    function updateNodeData(nodeId, field, value) {
        for (var i = 0; i < nodesData.length; i++) {
            if (nodesData[i].id === nodeId) {
                nodesData[i][field] = value;
                break;
            }
        }
    }
    
    function deleteNode(nodeId, evt) {
        if (evt) evt.stopPropagation();
        
        layer.confirm('确定删除此节点？', {icon: 3, title: '确认'}, function(idx) {
            var el = document.getElementById(nodeId);
            if (el) el.remove();
            
            nodesData = nodesData.filter(function(n) {
                return n.id !== nodeId;
            });
            
            document.getElementById('configPanel').innerHTML = '<div class="empty-tip"><i class="layui-icon layui-icon-util"></i><p>请选择节点进行配置</p></div>';
            updateConnectors();
            layer.close(idx);
        });
    }
    
    function clearAll() {
        layer.confirm('确定清空所有节点？', {icon: 3, title: '确认'}, function(idx) {
            document.getElementById('nodesArea').innerHTML = '';
            nodesData = [];
            nodeCounter = 0;
            document.getElementById('configPanel').innerHTML = '<div class="empty-tip"><i class="layui-icon layui-icon-util"></i><p>请选择节点进行配置</p></div>';
            updateConnectors();
            layer.close(idx);
        });
    }
    
    function save() {
        if (nodesData.length === 0) {
            layer.msg('请至少添加一个节点', {icon: 2});
            return;
        }
        
        layer.load(2);
        
        var steps = nodesData.map(function(n, i) {
            return {
                step_order: i + 1,
                step_name: n.name,
                step_type: n.type,
                time_limit_hours: n.time_limit,
                approver_user: n.approver_user,
                approver_department: n.approver_dept,
                approver_level: n.approver_level,
                cc_users: n.cc_users,
                notification_users: n.notify_users,
                description: n.desc,
                require_comment: n.require_comment,
                comment_hint: n.comment_hint
            };
        });
        
        var csrfToken = '';
        var csrfEl = document.querySelector('[name=csrfmiddlewaretoken]');
        if (csrfEl) csrfToken = csrfEl.value;
        
        var flowId = {{ flow.pk }};
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/approval/approvalflow/' + flowId + '/batch-create/', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('X-CSRFToken', csrfToken);
        xhr.onreadystatechange = function() {
            layer.closeAll('loading');
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var res = JSON.parse(xhr.responseText);
                        if (res.success) {
                            layer.msg('保存成功', {icon: 1});
                        } else {
                            layer.msg(res.message || '保存失败', {icon: 2});
                        }
                    } catch (e) {
                        layer.msg('保存失败', {icon: 2});
                    }
                } else {
                    layer.msg('网络错误', {icon: 2});
                }
            }
        };
        xhr.send(JSON.stringify({steps: steps}));
    }
    
    function preview() {
        layer.open({
            type: 2,
            title: '流程预览',
            content: '/approval/approvalflow/{{ flow.pk }}/preview/',
            area: ['85%', '90%'],
            maxmin: true
        });
    }
    
    function showMenu() {
        var menu = document.getElementById('nodeMenu');
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }
    
    function hideMenu() {
        document.getElementById('nodeMenu').style.display = 'none';
    }
    
    function updateConnectors() {
        var count = document.getElementById('nodesArea').children.length;
        var h = count > 0 ? '30px' : '40px';
        document.getElementById('connStart').style.height = h;
        document.getElementById('connEnd').style.height = h;
    }
    
    function getUserOptions(selectedId) {
        var html = '<option value="">请选择用户</option>';
        usersData.forEach(function(u) {
            var sel = u.id == selectedId ? 'selected' : '';
            html += '<option value="' + u.id + '" ' + sel + '>' + (u.full_name || u.username) + '</option>';
        });
        return html;
    }
    
    function getDeptOptions(selectedId) {
        var html = '<option value="">请选择部门</option>';
        deptsData.forEach(function(d) {
            var sel = d.id == selectedId ? 'selected' : '';
            html += '<option value="' + d.id + '" ' + sel + '>' + d.name + '</option>';
        });
        return html;
    }
    
    function getLevelOptions(selectedId) {
        var html = '<option value="">请选择级别</option>';
        for (var i = 1; i <= 10; i++) {
            var sel = i == selectedId ? 'selected' : '';
            html += '<option value="' + i + '" ' + sel + '>' + i + '级及以上</option>';
        }
        return html;
    }
    
    return {
        init: init,
        addNode: addNode,
        deleteNode: deleteNode,
        clearAll: clearAll,
        save: save,
        preview: preview,
        showMenu: showMenu,
        saveInitiator: saveInitiator,
        addFormField: addFormField,
        deleteFormField: deleteFormField,
        saveStartNodeConfig: saveStartNodeConfig,
        selectStartNode: selectStartNode
    };
})();

document.addEventListener('DOMContentLoaded', function() {
    FlowDesigner.init();
});
</script>

{% extends 'home/iframe_base.html' %}
{% load static %}

{% block title %}删除知识条目{% endblock %}

{% block content %}
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <h3><i class="layui-icon layui-icon-delete"></i> 删除知识条目</h3>
                </div>
                <div class="layui-card-body">
                    <div class="layui-elem-quote layui-text">
                        <p>您确定要删除知识条目 <strong>{{ object.title }}</strong> 吗？</p>
                        <p class="layui-text layui-font-red">警告：此操作将永久删除该知识条目，无法恢复！</p>
                    </div>
                    <form class="layui-form" action="" method="post">
                        {% csrf_token %}
                        <div class="layui-form-item">
                            <div class="layui-input-block">
                                <button type="submit" class="layui-btn layui-btn-danger">确认删除</button>
                                <a href="{% url 'ai:knowledge_item_list' %}" class="layui-btn layui-btn-primary">取消</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

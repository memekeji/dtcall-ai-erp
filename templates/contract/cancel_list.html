{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同作废管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <h3>合同作废管理</h3>
                
                <!-- 搜索区域 -->
                <div class="layui-row layui-col-space10" style="margin-top: 15px;">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportCancel()">
                            <i class="layui-icon layui-icon-export"></i> 导出作废
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <input type="text" id="searchCancelCode" placeholder="合同编号" class="layui-input" style="width: 120px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <input type="text" id="searchCancelDate" placeholder="作废日期" class="layui-input" style="width: 150px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchCancel()" style="position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetSearch()" style="margin-left: 5px; position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="cancelTable" class="layui-table" lay-filter="cancelTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'form', 'laydate'], function() {
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var laydate = layui.laydate;

            // 初始化日期选择器
            laydate.render({
                elem: '#searchCancelDate',
                range: true,
                format: 'yyyy-MM-dd'
            });

            // 初始化表格
            table.render({
                elem: '#cancelTable',
                url: '/adm/contract/cancel/datalist/',
                cols: [[
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'code', title: '合同编号', width: 150},
                    {field: 'name', title: '合同名称', width: 200},
                    {field: 'customer', title: '客户名称', width: 150},
                    {field: 'cost', title: '合同金额', width: 120},
                    {field: 'void_time', title: '作废时间', width: 150},
                    {field: 'void_uid', title: '作废人', width: 100},
                    {field: 'void_remark', title: '作废原因', width: 200},
                    {title: '操作', width: 150, toolbar: '#cancelToolBar'}
                ]],
                page: true,
                limit: 20,
                height: 'full-200'
            });

            // 监听工具条
            table.on('tool(cancelTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    layer.open({
                        type: 2,
                        title: '合同详情',
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '100%'],
                        offset: 'r',
                        anim: 2,
                        content: '/adm/contract/sales/view/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        }
                    });
                }
            });
        });

        // 导出作废
        function exportCancel() {
            layui.use(['layer'], function() {
                var layer = layui.layer;
                layer.msg('导出功能开发中...', {icon: 0});
            });
        }
        window.exportCancel = exportCancel;

        // 搜索作废
        function searchCancel() {
            layui.use(['table'], function() {
                var table = layui.table;
                var code = $('#searchCancelCode').val();
                var date = $('#searchCancelDate').val();
                var params = {};
                if(code) params.code = code;
                if(date) params.cancel_date = date;
                
                table.reload('cancelTable', {
                    where: params
                });
            });
        }
        window.searchCancel = searchCancel;

        // 重置搜索
        function resetSearch() {
            layui.use(['table'], function() {
                var table = layui.table;
                
                $('#searchCancelCode').val('');
                $('#searchCancelDate').val('');
                table.reload('cancelTable', {
                    where: {}
                });
            });
        }
        window.resetSearch = resetSearch;
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="cancelToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
    </script>
</body>
</html>

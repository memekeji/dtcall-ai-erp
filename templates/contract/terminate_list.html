{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同终止管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <h3>合同终止管理</h3>
                
                <!-- 搜索区域 -->
                <div class="layui-row layui-col-space10" style="margin-top: 15px;">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportTerminate()">
                            <i class="layui-icon layui-icon-export"></i> 导出终止
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <input type="text" id="searchTerminateCode" placeholder="合同编号" class="layui-input" style="width: 120px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <input type="text" id="searchTerminateDate" placeholder="终止日期" class="layui-input" style="width: 150px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchTerminate()" style="position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetSearch()" style="margin-left: 5px; position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="terminateTable" class="layui-table" lay-filter="terminateTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'form', 'laydate'], function() {
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var laydate = layui.laydate;

            // 初始化日期选择器
            laydate.render({
                elem: '#searchTerminateDate',
                range: true,
                format: 'yyyy-MM-dd'
            });

            // 初始化表格
            table.render({
                elem: '#terminateTable',
                url: '/adm/contract/terminate/datalist/',
                cols: [[
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'code', title: '合同编号', width: 150},
                    {field: 'name', title: '合同名称', width: 200},
                    {field: 'customer', title: '客户名称', width: 150},
                    {field: 'cost', title: '合同金额', width: 120},
                    {field: 'stop_time', title: '终止时间', width: 150},
                    {field: 'stop_uid', title: '终止人', width: 100},
                    {field: 'stop_remark', title: '终止原因', width: 200},
                    {title: '操作', width: 150, toolbar: '#terminateToolBar'}
                ]],
                page: true,
                limit: 20,
                height: 'full-200'
            });

            // 监听工具条
            table.on('tool(terminateTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    // 设置弹窗层级
                    layer.config({
                        zIndex: 2147483646
                    });
                    
                    layer.open({
                        type: 2,
                        title: '合同详情',
                        content: '/adm/contract/sales/view/' + data.id + '/',
                        area: ['900px', '700px'],
                        zIndex: 2147483646
                    });
                }
            });
        });

        // 导出终止
        function exportTerminate() {
            layui.use(['layer'], function() {
                var layer = layui.layer;
                layer.msg('导出功能开发中...', {icon: 0});
            });
        }
        window.exportTerminate = exportTerminate;

        // 搜索终止
        function searchTerminate() {
            layui.use(['table'], function() {
                var table = layui.table;
                var code = $('#searchTerminateCode').val();
                var date = $('#searchTerminateDate').val();
                var params = {};
                if(code) params.code = code;
                if(date) params.terminate_date = date;
                
                table.reload('terminateTable', {
                    where: params
                });
            });
        }
        window.searchTerminate = searchTerminate;

        // 重置搜索
        function resetSearch() {
            layui.use(['table'], function() {
                var table = layui.table;
                
                $('#searchTerminateCode').val('');
                $('#searchTerminateDate').val('');
                table.reload('terminateTable', {
                    where: {}
                });
            });
        }
        window.resetSearch = resetSearch;
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="terminateToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
    </script>
</body>
</html>

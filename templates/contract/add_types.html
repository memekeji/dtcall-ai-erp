<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>选择合同类型</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
    <style>
        .type-card {
            border: 1px solid #e6e6e6;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .type-card:hover {
            border-color: #1E9FFF;
            box-shadow: 0 2px 8px rgba(30, 159, 255, 0.2);
        }
        .type-card.selected {
            border-color: #1E9FFF;
            background-color: #f8fbff;
        }
        .type-icon {
            font-size: 48px;
            color: #1E9FFF;
            margin-bottom: 10px;
        }
        .type-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .type-desc {
            color: #666;
            font-size: 12px;
        }
        .customer-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">
                        <h3>选择合同类型</h3>
                    </div>
                    <div class="layui-card-body">
                        {% if customer %}
                        <!-- 客户信息 -->
                        <div class="customer-info">
                            <h4>客户信息</h4>
                            <p><strong>客户名称：</strong>{{ customer.name }}</p>
                            {% if customer.contacts.first %}
                            <p><strong>联系人：</strong>{{ customer.contacts.first.contact_person }}</p>
                            <p><strong>联系电话：</strong>{{ customer.contacts.first.phone }}</p>
                            {% endif %}
                        </div>
                        {% endif %}
                        
                        <!-- 合同分类选择 -->
                        <form class="layui-form">
                            <div class="layui-form-item">
                                <label class="layui-form-label">合同分类</label>
                                <div class="layui-input-block">
                                    <select name="category_id" lay-filter="categorySelect" lay-verify="required" lay-search="">
                                        <option value="">请选择合同分类</option>
                                        {% for category in contract_categories %}
                                            {% if not category.parent %}
                                                <option value="{{ category.id }}" data-name="{{ category.name }}" data-code="{{ category.code }}">{{ category.name }}</option>
                                                {% for sub_category in contract_categories %}
                                                    {% if sub_category.parent_id == category.id %}
                                                        <option value="{{ sub_category.id }}" data-name="{{ sub_category.name }}" data-code="{{ sub_category.code }}">　├─ {{ sub_category.name }}</option>
                                                        {% for sub_sub_category in contract_categories %}
                                                            {% if sub_sub_category.parent_id == sub_category.id %}
                                                                <option value="{{ sub_sub_category.id }}" data-name="{{ sub_sub_category.name }}" data-code="{{ sub_sub_category.code }}">　　　└─ {{ sub_sub_category.name }}</option>
                                                            {% endif %}
                                                        {% endfor %}
                                                    {% endif %}
                                                {% endfor %}
                                            {% endif %}
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </form>
                        
                        <!-- 选中的分类信息显示 -->
                        <div id="selectedCategoryInfo" style="display: none; margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 6px;">
                            <h4>已选择分类</h4>
                            <p><strong>分类名称：</strong><span id="selectedCategoryName"></span></p>
                            <p><strong>分类代码：</strong><span id="selectedCategoryCode"></span></p>
                        </div>
                        
                        <div class="layui-form-item" style="margin-top: 30px;">
                            <div class="layui-input-block">
                                <button class="layui-btn" id="confirmBtn" disabled>
                                    <i class="layui-icon layui-icon-ok"></i> 确认选择
                                </button>
                                <button type="button" class="layui-btn layui-btn-primary" onclick="parent.layer.closeAll()">
                                    <i class="layui-icon layui-icon-close"></i> 取消
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['layer', 'form'], function(){
            var layer = layui.layer;
            var form = layui.form;
            var selectedCategoryId = null;
            
            // 监听分类选择
            form.on('select(categorySelect)', function(data){
                selectedCategoryId = data.value;
                var selectedOption = data.elem.options[data.elem.selectedIndex];
                
                if (selectedCategoryId) {
                    // 显示选中的分类信息
                    document.getElementById('selectedCategoryName').textContent = selectedOption.getAttribute('data-name');
                    document.getElementById('selectedCategoryCode').textContent = selectedOption.getAttribute('data-code');
                    document.getElementById('selectedCategoryInfo').style.display = 'block';
                    document.getElementById('confirmBtn').disabled = false;
                } else {
                    // 隐藏分类信息
                    document.getElementById('selectedCategoryInfo').style.display = 'none';
                    document.getElementById('confirmBtn').disabled = true;
                }
            });
            
            // 确认选择
            document.getElementById('confirmBtn').addEventListener('click', function() {
                if (selectedCategoryId) {
                    var url = '/adm/contract/create/?category_id=' + selectedCategoryId;
                    {% if customer %}
                    url += '&customer_id={{ customer.id }}';
                    {% endif %}
                    // console.log('跳转URL:', url);
                    window.location.href = url;
                } else {
                    layer.msg('请先选择合同分类', {icon: 2});
                }
            });
        });
    </script>
</body>
</html>

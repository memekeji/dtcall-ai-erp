{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同归档管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <h3>合同归档管理</h3>
                
                <!-- 搜索区域 -->
                <div class="layui-row layui-col-space10" style="margin-top: 15px;">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportArchive()">
                            <i class="layui-icon layui-icon-export"></i> 导出归档
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <input type="text" id="searchArchiveCode" placeholder="合同编号" class="layui-input" style="width: 120px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <input type="text" id="searchArchiveDate" placeholder="归档日期" class="layui-input" style="width: 150px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchArchive()" style="position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetSearch()" style="margin-left: 5px; position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="archiveTable" class="layui-table" lay-filter="archiveTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'form', 'laydate'], function() {
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var laydate = layui.laydate;

            // 初始化日期选择器
            laydate.render({
                elem: '#searchArchiveDate',
                range: true,
                format: 'yyyy-MM-dd'
            });

            // 初始化表格
            table.render({
                elem: '#archiveTable',
                url: '/adm/contract/archive/datalist/',
                cols: [[
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'code', title: '合同编号', width: 150},
                    {field: 'name', title: '合同名称', width: 200},
                    {field: 'customer', title: '客户名称', width: 150},
                    {field: 'cost', title: '合同金额', width: 120},
                    {field: 'archive_time', title: '归档时间', width: 150},
                    {field: 'archive_uid', title: '归档人', width: 100},
                    {title: '操作', width: 200, toolbar: '#archiveToolBar'}
                ]],
                page: true,
                limit: 20,
                height: 'full-200'
            });

            // 监听工具条
            table.on('tool(archiveTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    layer.open({
                        type: 2,
                        title: '合同详情',
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '100%'],
                        offset: 'r',
                        anim: 2,
                        content: '/adm/contract/sales/view/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        }
                    });
                } else if (layEvent === 'unarchive') {
                    layer.confirm('确定取消归档这条合同吗？', function(index) {
                        $.ajax({
                            url: '/adm/contract/archive/unarchive/',
                            type: 'POST',
                            data: JSON.stringify({id: data.id}),
                            contentType: 'application/json',
                            success: function(response) {
                                if (response.code === 0) {
                                    layer.msg('取消归档成功', {icon: 1});
                                    table.reload('archiveTable');
                                } else {
                                    layer.msg(response.msg, {icon: 2});
                                }
                            }
                        });
                        layer.close(index);
                    });
                }
            });
        });

        // 导出归档
        function exportArchive() {
            layui.use(['layer'], function() {
                var layer = layui.layer;
                layer.msg('导出功能开发中...', {icon: 0});
            });
        }
        window.exportArchive = exportArchive;

        // 搜索归档
        function searchArchive() {
            layui.use(['table'], function() {
                var table = layui.table;
                var code = $('#searchArchiveCode').val();
                var date = $('#searchArchiveDate').val();
                var params = {};
                if(code) params.code = code;
                if(date) params.archive_date = date;
                
                table.reload('archiveTable', {
                    where: params
                });
            });
        }
        window.searchArchive = searchArchive;

        // 重置搜索
        function resetSearch() {
            layui.use(['table'], function() {
                var table = layui.table;
                
                $('#searchArchiveCode').val('');
                $('#searchArchiveDate').val('');
                table.reload('archiveTable', {
                    where: {}
                });
            });
        }
        window.resetSearch = resetSearch;
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="archiveToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
        <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="unarchive">取消归档</a>
    </script>
</body>
</html>

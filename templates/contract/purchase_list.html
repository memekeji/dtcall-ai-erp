{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购合同管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <!-- 选项卡区域 -->
                <div class="layui-tab layui-tab-brief" lay-filter="purchaseTabs">
                    <ul class="layui-tab-title">
                        <li class="layui-this" lay-id="all">全部采购</li>
                        <li lay-id="my">我创建的</li>
                        <li lay-id="pending">待我审核</li>
                        <li lay-id="reviewed">我已审核</li>
                        <li lay-id="copy">抄送给我</li>
                    </ul>
                </div>
                
                <!-- 按钮和搜索区域 -->
                <div class="layui-row layui-col-space10" style="margin-top: 15px;">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-normal layui-btn-sm" onclick="addPurchase()">
                            <i class="layui-icon layui-icon-add-1"></i> 新增采购
                        </button>
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportPurchase()" style="margin-left: 8px;">
                            <i class="layui-icon layui-icon-export"></i> 导出
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <input type="text" id="searchPurchaseCode" placeholder="采购编号" class="layui-input" style="width: 120px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <select id="searchPurchaseStatus" lay-filter="searchPurchaseStatus" style="position: relative; z-index: 1;">
                                <option value="">审核状态</option>
                                <option value="0">待审核</option>
                                <option value="1">审核中</option>
                                <option value="2">审核通过</option>
                                <option value="3">审核不通过</option>
                            </select>
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchPurchase()" style="position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetSearch()" style="margin-left: 5px; position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="purchaseTable" class="layui-table" lay-filter="purchaseTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'form'], function() {
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;

            // 初始化表格
            function initTable(tab = '0') {
                table.render({
                    elem: '#purchaseTable',
                    url: '/adm/contract/purchase/datalist/?tab=' + tab,
                    cols: [[
                        {field: 'id', title: 'ID', width: 80},
                        {field: 'code', title: '采购编号', width: 150},
                        {field: 'name', title: '采购名称', width: 200},
                        {field: 'amount', title: '采购金额', width: 120},
                        {field: 'check_status', title: '审核状态', width: 100, templet: function(d) {
                            var statusMap = {0: '待审核', 1: '审核中', 2: '审核通过', 3: '审核不通过', 4: '撤销审核'};
                            var colorMap = {0: 'orange', 1: 'blue', 2: 'green', 3: 'red', 4: 'gray'};
                            return '<span style="color: ' + colorMap[d.check_status] + '">' + statusMap[d.check_status] + '</span>';
                        }},
                        {field: 'sign_time', title: '签订时间', width: 120},
                        {field: 'create_time', title: '创建时间', width: 180},
                        {title: '操作', width: 250, toolbar: '#purchaseToolBar'}
                    ]],
                    page: true,
                    limit: 20,
                    height: 'full-200'
                });
            }

            // 初始化表格
            initTable();

            // 监听选项卡切换
            element.on('tab(purchaseTabs)', function(data) {
                var layId = $(this).attr('lay-id');
                var tabMap = {
                    'all': '0',
                    'my': '1',
                    'pending': '2',
                    'reviewed': '3',
                    'copy': '4'
                };
                initTable(tabMap[layId]);
            });

            // 监听工具条
            table.on('tool(purchaseTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    // 设置弹窗层级
                    layer.config({
                        zIndex: 2147483646
                    });
                    
                    layer.open({
                        type: 2,
                        title: '采购详情',
                        content: '/adm/contract/purchase/view/' + data.id + '/',
                        area: ['900px', '700px'],
                        zIndex: 2147483646
                    });
                } else if (layEvent === 'edit') {
                    // 设置弹窗层级
                    layer.config({
                        zIndex: 2147483646
                    });
                    
                    layer.open({
                        type: 2,
                        title: '编辑采购',
                        content: '/adm/contract/purchase/edit/' + data.id + '/',
                        area: ['900px', '700px'],
                        zIndex: 2147483646,
                        end: function() {
                            table.reload('purchaseTable');
                        }
                    });
                } else if (layEvent === 'delete') {
                    layer.confirm('确定删除这条采购记录吗？', function(index) {
                        // 获取CSRF token
                        var csrfToken = $('input[name="csrfmiddlewaretoken"]').val();
                        
                        $.ajax({
                            url: '/adm/contract/purchase/del/',
                            type: 'POST',
                            data: JSON.stringify({id: data.id}),
                            contentType: 'application/json',
                            headers: {
                                'X-CSRFToken': csrfToken
                            },
                            success: function(response) {
                                if (response.code === 0) {
                                    layer.msg('删除成功', {icon: 1});
                                    table.reload('purchaseTable');
                                } else {
                                    layer.msg(response.msg, {icon: 2});
                                }
                            }
                        });
                        layer.close(index);
                    });
                }
            });
        });

        // 新增采购
        function addPurchase() {
            // console.log('addPurchase function called');
            layui.use(['layer', 'table'], function() {
                var layer = layui.layer;
                var table = layui.table;
                
                // 设置弹窗层级
                layer.config({
                    zIndex: 2147483646
                });
                
                layer.open({
                    type: 2,
                    title: '新增采购合同',
                    content: '/adm/contract/purchase/add/',
                    area: ['900px', '700px'],
                    zIndex: 2147483646,
                    success: function() {
                        // console.log('采购弹窗打开成功');
                    },
                    end: function() {
                        table.reload('purchaseTable');
                    }
                });
            });
        }
        window.addPurchase = addPurchase;

        // 导出采购
        function exportPurchase() {
            layui.use(['layer'], function() {
                var layer = layui.layer;
                layer.msg('导出功能开发中...', {icon: 0});
            });
        }
        window.exportPurchase = exportPurchase;

        // 搜索采购
        function searchPurchase() {
            if (typeof layui !== 'undefined') {
                layui.use(['table'], function() {
                    var table = layui.table;
                    var code = $('#searchPurchaseCode').val();
                    var status = $('#searchPurchaseStatus').val();
                    var params = {};
                    if(code) params.code = code;
                    if(status) params.status = status;
                    
                    if (table && table.reload) {
                        table.reload('purchaseTable', {
                            where: params
                        });
                    }
                });
            } else {
                console.warn('LayUI is not loaded');
            }
        }
        window.searchPurchase = searchPurchase;

        // 重置搜索
        function resetSearch() {
            if (typeof layui !== 'undefined') {
                layui.use(['table', 'form'], function() {
                    var table = layui.table;
                    var form = layui.form;
                    
                    $('#searchPurchaseCode').val('');
                    $('#searchPurchaseStatus').val('');
                    if (form && form.render) {
                        form.render('select');
                    }
                    if (table && table.reload) {
                        table.reload('purchaseTable', {
                            where: {}
                        });
                    }
                });
            } else {
                console.warn('LayUI is not loaded');
            }
        }
        window.resetSearch = resetSearch;
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="purchaseToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
    </script>
</body>
</html>

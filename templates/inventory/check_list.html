<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>库存盘点</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="/static/layui/css/layui.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <style>
        .status-tag { padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .status-1 { background: #FFB800; color: #fff; }
        .status-2 { background: #1E9FFF; color: #fff; }
        .status-3 { background: #009688; color: #fff; }
        .status-4 { background: #999; color: #fff; }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header layui-elem-quote">
                盘点单列表
                <button class="layui-btn layui-btn-sm layui-btn-primary" id="addBtn" style="float: right;">
                    <i class="layui-icon">&#xe654;</i> 新增盘点
                </button>
            </div>
            <div class="layui-card-body">
                <div class="layui-form layui-inline">
                    <div class="layui-input-inline">
                        <select id="searchStatus">
                            <option value="">全部状态</option>
                            <option value="1">待盘点</option>
                            <option value="2">盘点中</option>
                            <option value="3">已完成</option>
                            <option value="4">已取消</option>
                        </select>
                    </div>
                    <div class="layui-input-inline">
                        <select id="searchType">
                            <option value="">全部类型</option>
                            <option value="partial">部分盘点</option>
                            <option value="full">全仓盘点</option>
                            <option value="cycle">循环盘点</option>
                        </select>
                    </div>
                    <button class="layui-btn" id="searchBtn">
                        <i class="layui-icon">&#xe615;</i> 查询
                    </button>
                </div>
                <table id="checkTable" lay-filter="checkTable"></table>
            </div>
        </div>
    </div>

    <script src="/static/js/lib/jquery.min.js"></script>
    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['table', 'layer', 'form'], function(){
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            
            table.render({
                elem: '#checkTable',
                url: '/api/inventory/check/',
                page: true,
                cols: [[
                    {field: 'id', title: 'ID', width: 80, sort: true},
                    {field: 'code', title: '盘点单号', width: 160},
                    {field: 'check_type_display', title: '盘点类型', width: 100},
                    {field: 'warehouse_name', title: '盘点仓库', width: 120},
                    {field: 'total_items', title: '盘点项数', width: 90},
                    {field: 'checked_items', title: '已盘点', width: 90},
                    {field: 'status_display', title: '状态', width: 90, templet: function(d){
                        return '<span class="status-tag status-' + d.status + '">' + d.status_display + '</span>';
                    }},
                    {field: 'profit_amount', title: '盘盈金额', width: 100},
                    {field: 'loss_amount', title: '盘亏金额', width: 100},
                    {field: 'checker_name', title: '盘点人', width: 90},
                    {field: 'create_time', title: '创建时间', width: 160},
                    {title: '操作', width: 200, templet: function(d){
                        var html = '<button class="layui-btn layui-btn-xs" lay-event="view">查看</button>';
                        if(d.status == 1 || d.status == 2){
                            html += '<button class="layui-btn layui-btn-xs layui-btn-warm" lay-event="execute">执行盘点</button>';
                        }
                        return html;
                    }}
                ]]
            });
            
            $('#searchBtn').click(function(){
                table.reload('checkTable', {
                    where: {
                        status: $('#searchStatus').val(),
                        check_type: $('#searchType').val()
                    }
                });
            });
            
            $('#addBtn').click(function(){
                openForm();
            });
            
            function openForm(id){
                var title = id ? '盘点单详情' : '新增盘点单';
                var url = id ? '/inventory/check/' + id + '/' : '/inventory/check/add/';
                layer.open({
                    type: 2,
                    title: title,
                    area: ['80%', '100%'],
                    content: url,
                    end: function(){
                        table.reload('checkTable');
                    }
                });
            }
            
            table.on('tool(checkTable)', function(obj){
                if(obj.event === 'view'){
                    openForm(obj.data.id);
                } else if(obj.event === 'execute'){
                    layer.open({
                        type: 2,
                        title: '执行盘点 - ' + obj.data.code,
                        area: ['80%', '100%'],
                        content: '/inventory/check/' + obj.data.id + '/?action=execute',
                        end: function(){
                            table.reload('checkTable');
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>库位表单</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="/static/layui/css/layui.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header layui-elem-quote" id="cardTitle">新增库位</div>
            <div class="layui-card-body">
                <form class="layui-form" id="locationForm">
                    <input type="hidden" name="id" id="id">
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">仓库</label>
                        <div class="layui-input-block">
                            <select name="warehouse_id" id="warehouse_id" lay-verify="required">
                                <option value="">请选择仓库</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">上级库位</label>
                        <div class="layui-input-block">
                            <select name="parent_id" id="parent_id">
                                <option value="">无</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">库位编码</label>
                        <div class="layui-input-block">
                            <input type="text" name="code" id="code" required lay-verify="required" placeholder="请输入库位编码" class="layui-input">
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">库位名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="name" id="name" required lay-verify="required" placeholder="请输入库位名称" class="layui-input">
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">库位类型</label>
                        <div class="layui-input-block">
                            <select name="location_type" id="location_type">
                                <option value="area">区域</option>
                                <option value="shelf">货架</option>
                                <option value="layer">层</option>
                                <option value="bin">货位</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">容量</label>
                        <div class="layui-input-block">
                            <input type="number" name="capacity" id="capacity" placeholder="请输入容量" class="layui-input">
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">排序</label>
                        <div class="layui-input-block">
                            <input type="number" name="sort" id="sort" value="0" class="layui-input">
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">状态</label>
                        <div class="layui-input-block">
                            <select name="status" id="status">
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button type="submit" class="layui-btn" lay-submit lay-filter="submitBtn">保存</button>
                            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/lib/jquery.min.js"></script>
    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['form', 'layer'], function(){
            var form = layui.form;
            var layer = layui.layer;
            
            var id = getQueryParam('id');
            var warehouseId = getQueryParam('warehouse_id');
            
            if(id){
                $('#cardTitle').text('编辑库位');
                loadData(id);
            } else {
                if(warehouseId){
                    $('#warehouse_id').val(warehouseId);
                }
                loadWarehouses(warehouseId);
            }
            
            function getQueryParam(name) {
                var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
                var r = window.location.search.substr(1).match(reg);
                if(r != null) return unescape(r[2]);
                return null;
            }
            
            function loadWarehouses(selectedId){
                $.ajax({
                    url: '/api/inventory/warehouse/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var html = '<option value="">请选择仓库</option>';
                            res.data.forEach(function(item){
                                html += '<option value="' + item.id + '">' + item.name + '</option>';
                            });
                            $('#warehouse_id').html(html);
                            if(selectedId){
                                $('#warehouse_id').val(selectedId);
                            }
                            loadParentLocations();
                            form.render();
                        }
                    }
                });
            }
            
            function loadParentLocations(){
                var warehouseId = $('#warehouse_id').val();
                if(warehouseId){
                    $.ajax({
                        url: '/api/inventory/location/',
                        type: 'GET',
                        data: {warehouse_id: warehouseId},
                        success: function(res){
                            if(res.code === 0){
                                var html = '<option value="">无</option>';
                                res.data.forEach(function(item){
                                    html += '<option value="' + item.id + '">' + item.code + ' ' + item.name + '</option>';
                                });
                                $('#parent_id').html(html);
                                form.render();
                            }
                        }
                    });
                }
            }
            
            function loadData(id){
                $.ajax({
                    url: '/api/inventory/location/' + id + '/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var data = res.data;
                            $('#id').val(data.id);
                            $('#code').val(data.code);
                            $('#name').val(data.name);
                            $('#location_type').val(data.location_type);
                            $('#capacity').val(data.capacity);
                            $('#status').val(data.status);
                            $('#sort').val(data.sort);
                            
                            loadWarehouses(data.warehouse_id);
                            
                            setTimeout(function(){
                                $('#warehouse_id').val(data.warehouse_id);
                                $('#parent_id').val(data.parent_id || '');
                                loadParentLocations();
                                form.render();
                            }, 500);
                        }
                    }
                });
            }
            
            $('#warehouse_id').change(function(){
                loadParentLocations();
            });
            
            form.on('submit(submitBtn)', function(data){
                var url = id ? '/api/inventory/location/' + id + '/' : '/api/inventory/location/';
                var type = id ? 'PUT' : 'POST';
                
                $.ajax({
                    url: url,
                    type: type,
                    contentType: 'application/json',
                    data: JSON.stringify(data.field),
                    success: function(res){
                        if(res.code === 0){
                            layer.msg('保存成功', {icon: 1});
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                            parent.table.reload('locationTable');
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    }
                });
                return false;
            });
        });
    </script>
</body>
</html>

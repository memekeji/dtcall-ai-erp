<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>调拨单表单</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="/static/layui/css/layui.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header layui-elem-quote" id="cardTitle">新增调拨单</div>
            <div class="layui-card-body">
                <form class="layui-form" id="transferForm">
                    <input type="hidden" name="id" id="id">
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">调拨单号</label>
                                <div class="layui-input-block">
                                    <input type="text" name="code" id="code" placeholder="系统自动生成" class="layui-input" readonly>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">申请人</label>
                                <div class="layui-input-block">
                                    <select name="requester_id" id="requester_id">
                                        <option value="">请选择申请人</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">调出仓库</label>
                                <div class="layui-input-block">
                                    <select name="from_warehouse_id" id="from_warehouse_id" lay-verify="required">
                                        <option value="">请选择调出仓库</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">调入仓库</label>
                                <div class="layui-input-block">
                                    <select name="to_warehouse_id" id="to_warehouse_id" lay-verify="required">
                                        <option value="">请选择调入仓库</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <fieldset class="layui-elem-field">
                        <legend>调拨明细</legend>
                        <div class="layui-field-box">
                            <table class="layui-table">
                                <thead>
                                    <tr>
                                        <th style="width: 25%;">物料</th>
                                        <th style="width: 15%;">调出库位</th>
                                        <th style="width: 15%;">调入库位</th>
                                        <th style="width: 15%;">批次号</th>
                                        <th style="width: 15%;">调拨数量</th>
                                        <th style="width: 15%;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="itemsBody"></tbody>
                            </table>
                            <button type="button" class="layui-btn layui-btn-sm" id="addItemBtn">
                                <i class="layui-icon">&#xe654;</i> 添加物料
                            </button>
                        </div>
                    </fieldset>
                    
                    <div class="layui-row layui-col-space15" style="margin-top: 15px;">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">总数量</label>
                                <div class="layui-input-block">
                                    <input type="text" name="total_quantity" id="total_quantity" readonly class="layui-input" style="background: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">总金额</label>
                                <div class="layui-input-block">
                                    <input type="text" name="total_amount" id="total_amount" readonly class="layui-input" style="background: #f5f5f5;">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">备注</label>
                        <div class="layui-input-block">
                            <textarea name="remark" id="remark" placeholder="请输入备注" class="layui-textarea"></textarea>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button type="submit" class="layui-btn" lay-submit lay-filter="submitBtn">保存</button>
                            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="/static/js/lib/jquery.min.js"></script>
    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['form', 'layer'], function(){
            var form = layui.form;
            var layer = layui.layer;
            
            var id = getQueryParam('id');
            var items = [];
            
            if(id){
                $('#cardTitle').text('调拨单详情');
                loadData(id);
            } else {
                initForm();
            }
            
            function getQueryParam(name) {
                var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
                var r = window.location.search.substr(1).match(reg);
                if(r != null) return unescape(r[2]);
                return null;
            }
            
            function initForm(){
                $('#code').val('TR' + new Date().getTime());
                loadWarehouses();
                loadRequesters();
                form.render();
            }
            
            function loadWarehouses(){
                $.ajax({
                    url: '/api/inventory/warehouse/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var html = '<option value="">请选择仓库</option>';
                            res.data.forEach(function(item){
                                html += '<option value="' + item.id + '">' + item.name + '</option>';
                            });
                            $('#from_warehouse_id').html(html);
                            $('#to_warehouse_id').html(html);
                            form.render('select');
                        }
                    }
                });
            }
            
            function loadRequesters(){
                $.ajax({
                    url: '/api/user/employee/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var html = '<option value="">请选择申请人</option>';
                            res.data.forEach(function(item){
                                html += '<option value="' + item.id + '">' + item.name + '</option>';
                            });
                            $('#requester_id').html(html);
                            form.render('select');
                        }
                    }
                });
            }
            
            function loadData(id){
                $.ajax({
                    url: '/api/inventory/transfer/' + id + '/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var data = res.data;
                            $('#id').val(data.id);
                            $('#code').val(data.code);
                            $('#from_warehouse_id').val(data.from_warehouse_id);
                            $('#to_warehouse_id').val(data.to_warehouse_id);
                            $('#total_quantity').val(data.total_quantity);
                            $('#total_amount').val(data.total_amount);
                            $('#remark').val(data.remark || '');
                            
                            items = data.items || [];
                            renderItems();
                            
                            loadWarehouses();
                            loadRequesters();
                            form.render();
                        }
                    }
                });
            }
            
            $('#addItemBtn').click(function(){
                layer.open({
                    type: 2,
                    title: '选择物料',
                    area: ['80%', '100%'],
                    content: '/inventory/item/',
                    btn: ['确定', '取消'],
                    yes: function(index, layero){
                        var iframeWin = layero.find('iframe')[0].contentWindow;
                        var selectedData = iframeWin.getSelectedData();
                        if(selectedData && selectedData.length > 0){
                            selectedData.forEach(function(item){
                                var exists = items.find(function(i){ return i.item_id === item.id; });
                                if(!exists){
                                    items.push({
                                        item_id: item.id,
                                        item_code: item.code,
                                        item_name: item.name,
                                        from_location_id: '',
                                        from_location_name: '',
                                        to_location_id: '',
                                        to_location_name: '',
                                        batch_number: '',
                                        quantity: 0,
                                        unit_cost: item.standard_cost || 0,
                                        amount: 0
                                    });
                                }
                            });
                            renderItems();
                        }
                        layer.close(index);
                    }
                });
            });
            
            function renderItems(){
                var html = '';
                items.forEach(function(item, index){
                    html += '<tr>';
                    html += '<td>' + item.item_code + ' ' + item.item_name + '</td>';
                    html += '<td><input type="text" class="layui-input" value="' + (item.from_location_name || '') + '" data-index="' + index + '" data-field="from_location_name"></td>';
                    html += '<td><input type="text" class="layui-input" value="' + (item.to_location_name || '') + '" data-index="' + index + '" data-field="to_location_name"></td>';
                    html += '<td><input type="text" class="layui-input" value="' + (item.batch_number || '') + '" data-index="' + index + '" data-field="batch_number"></td>';
                    html += '<td><input type="number" class="layui-input" value="' + item.quantity + '" data-index="' + index + '" data-field="quantity"></td>';
                    html += '<td><button type="button" class="layui-btn layui-btn-xs layui-btn-danger" onclick="removeItem(' + index + ')">删除</button></td>';
                    html += '</tr>';
                });
                $('#itemsBody').html(html);
                calculateTotals();
            }
            
            window.removeItem = function(index){
                items.splice(index, 1);
                renderItems();
            };
            
            $('#itemsBody').on('change', 'input', function(){
                var index = $(this).data('index');
                var field = $(this).data('field');
                var value = $(this).val();
                
                if(field === 'quantity'){
                    value = parseFloat(value) || 0;
                }
                
                items[index][field] = value;
                items[index].amount = items[index].quantity * items[index].unit_cost;
                
                renderItems();
            });
            
            function calculateTotals(){
                var totalQty = 0;
                var totalAmt = 0;
                items.forEach(function(item){
                    totalQty += item.quantity;
                    totalAmt += item.amount;
                });
                $('#total_quantity').val(totalQty.toFixed(4));
                $('#total_amount').val(totalAmt.toFixed(2));
            }
            
            form.on('submit(submitBtn)', function(data){
                var submitData = data.field;
                submitData.items = items.map(function(item){
                    return {
                        item_id: item.item_id,
                        from_location_id: item.from_location_id || null,
                        to_location_id: item.to_location_id || null,
                        batch_number: item.batch_number || '',
                        quantity: item.quantity,
                        unit_cost: item.unit_cost,
                        amount: item.amount
                    };
                });
                
                $.ajax({
                    url: '/api/inventory/transfer/',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(submitData),
                    success: function(res){
                        if(res.code === 0){
                            layer.msg('保存成功', {icon: 1});
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                            parent.table.reload('transferTable');
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    }
                });
                return false;
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>库存物料管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="/static/layui/css/layui.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header layui-elem-quote">
                库存物料列表
                <button class="layui-btn layui-btn-sm layui-btn-primary" id="addBtn" style="float: right;">
                    <i class="layui-icon">&#xe654;</i> 新增物料
                </button>
            </div>
            <div class="layui-card-body">
                <div class="layui-form layui-inline">
                    <div class="layui-input-inline">
                        <input type="text" id="searchCode" placeholder="物料编码" class="layui-input">
                    </div>
                    <div class="layui-input-inline">
                        <input type="text" id="searchName" placeholder="物料名称" class="layui-input">
                    </div>
                    <div class="layui-input-inline">
                        <select id="searchCategory">
                            <option value="">全部分类</option>
                        </select>
                    </div>
                    <button class="layui-btn" id="searchBtn">
                        <i class="layui-icon">&#xe615;</i> 查询
                    </button>
                </div>
                <table id="itemTable" lay-filter="itemTable"></table>
            </div>
        </div>
    </div>

    <script src="/static/js/lib/jquery.min.js"></script>
    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['table', 'layer', 'form'], function(){
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            
            loadCategories();
            
            table.render({
                elem: '#itemTable',
                url: '/api/inventory/item/',
                page: true,
                cols: [[
                    {field: 'id', title: 'ID', width: 80, sort: true},
                    {field: 'code', title: '物料编码', width: 120},
                    {field: 'name', title: '物料名称', width: 200},
                    {field: 'category_name', title: '分类', width: 100},
                    {field: 'specification', title: '规格型号', width: 150},
                    {field: 'unit', title: '单位', width: 60},
                    {field: 'standard_cost', title: '标准成本', width: 100, templet: function(d){
                        return parseFloat(d.standard_cost).toFixed(2);
                    }},
                    {field: 'retail_price', title: '零售价格', width: 100, templet: function(d){
                        return parseFloat(d.retail_price).toFixed(2);
                    }},
                    {field: 'min_stock', title: '最低库存', width: 90},
                    {field: 'max_stock', title: '最高库存', width: 90},
                    {field: 'status_display', title: '状态', width: 80},
                    {title: '操作', width: 200, templet: function(d){
                        var html = '<button class="layui-btn layui-btn-xs" lay-event="edit">编辑</button>';
                        html += '<button class="layui-btn layui-btn-xs layui-btn-warm" lay-event="inventory">库存</button>';
                        html += '<button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</button>';
                        return html;
                    }}
                ]]
            });
            
            function loadCategories(){
                $.ajax({
                    url: '/api/inventory/category/',
                    type: 'GET',
                    success: function(res){
                        if(res.code === 0){
                            var html = '<option value="">全部分类</option>';
                            res.data.forEach(function(item){
                                html += '<option value="' + item.id + '">' + item.name + '</option>';
                            });
                            $('#searchCategory').html(html);
                            form.render('select');
                        }
                    }
                });
            }
            
            $('#searchBtn').click(function(){
                table.reload('itemTable', {
                    where: {
                        code: $('#searchCode').val(),
                        name: $('#searchName').val(),
                        category_id: $('#searchCategory').val()
                    }
                });
            });
            
            table.on('tool(itemTable)', function(obj){
                if(obj.event === 'edit'){
                    openForm(obj.data.id);
                } else if(obj.event === 'inventory'){
                    layer.open({
                        type: 2,
                        title: '库存查询 - ' + obj.data.name,
                        area: ['80%', '100%'],
                        content: '/inventory/inventory/?item_id=' + obj.data.id
                    });
                } else if(obj.event === 'delete'){
                    layer.confirm('确定要删除该物料吗？', function(index){
                        $.ajax({
                            url: '/api/inventory/item/' + obj.data.id + '/',
                            type: 'DELETE',
                            success: function(res){
                                if(res.code === 0){
                                    layer.msg('删除成功');
                                    table.reload('itemTable');
                                } else {
                                    layer.msg(res.msg);
                                }
                            }
                        });
                    });
                }
            });
            
            $('#addBtn').click(function(){
                openForm();
            });
            
            function openForm(id){
                var title = id ? '编辑物料' : '新增物料';
                var url = id ? '/inventory/item/' + id + '/' : '/inventory/item/add/';
                layer.open({
                    type: 2,
                    title: title,
                    area: ['80%', '100%'],
                    content: url,
                    end: function(){
                        table.reload('itemTable');
                    }
                });
            }
        });
    </script>
</body>
</html>

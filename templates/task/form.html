{% extends "home/base.html" %}
{% load static %}

{% block title %}
{% if task %}编辑定时任务{% else %}新建定时任务{% endif %}
{% endblock %}

{% block content %}
<div class="layui-card">
    <div class="layui-card-header">
        <h3>{% if task %}编辑定时任务{% else %}新建定时任务{% endif %}</h3>
    </div>
    <div class="layui-card-body">
        <form class="layui-form" method="post">
            {% csrf_token %}
            <div class="layui-form-item">
                <label class="layui-form-label">任务名称</label>
                <div class="layui-input-block">
                    <input type="text" name="name" value="{{ form.name.value|default:'' }}" 
                           placeholder="请输入任务名称" class="layui-input" required>
                </div>
            </div>
            
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">执行命令</label>
                <div class="layui-input-block">
                    <textarea name="command" placeholder="请输入执行命令" 
                              class="layui-textarea" required>{{ form.command.value|default:'' }}</textarea>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">Cron表达式</label>
                <div class="layui-input-block">
                    <input type="text" name="cron_expression" value="{{ form.cron_expression.value|default:'' }}" 
                           placeholder="请输入Cron表达式，如：0 0 * * *" class="layui-input" required>
                    <div class="layui-form-mid layui-word-aux">
                        格式：分 时 日 月 周，例如：0 0 * * * 表示每天0点执行
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">任务状态</label>
                <div class="layui-input-block">
                    <select name="status">
                        {% for status_key, status_name in form.status.field.choices %}
                        <option value="{{ status_key }}" 
                                {% if form.status.value == status_key %}selected{% endif %}>
                            {{ status_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">任务描述</label>
                <div class="layui-input-block">
                    <textarea name="description" placeholder="请输入任务描述" 
                              class="layui-textarea">{{ form.description.value|default:'' }}</textarea>
                </div>
            </div>
            
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit>保存</button>
                    <button type="button" class="layui-btn layui-btn-primary" onclick="history.back()">返回</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
layui.use('form', function(){
    var form = layui.form;
    
    // 表单提交
    form.on('submit()', function(data){
        return true;
    });
});
</script>
{% endblock %}

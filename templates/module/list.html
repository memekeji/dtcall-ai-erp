<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>功能模块管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="/static/layui/css/layui.css" media="all">
</head>
<body>
    <div class="layui-fluid" style="position: relative;">
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md12" id="module-list-container">
                    <div class="layui-card">
                        <div class="layui-card-body">
                            <!-- 搜索栏 -->
                            <div class="layui-form layui-form-pane" style="margin-bottom: 20px;">
                                <div class="layui-form-item">
                                    <div class="layui-inline">
                                        <input type="text" name="search" placeholder="搜索模块名称" autocomplete="off" class="layui-input" value="{{ search }}">
                                    </div>
                                    <div class="layui-inline">
                                        <button class="layui-btn" onclick="searchModule()">
                                            <i class="layui-icon layui-icon-search"></i> 搜索
                                        </button>
                                        <button class="layui-btn layui-btn-normal" onclick="openModuleForm()">
                                            <i class="layui-icon layui-icon-add-1"></i> 新增模块
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- 模块树形结构 -->
                            <div class="layui-row">
                                {% for module in modules %}
                                <div class="layui-col-md6" style="margin-bottom: 15px;">
                                    <div class="layui-card">
                                        <div class="layui-card-header">
                                            <div class="layui-row">
                                                <div class="layui-col-xs8">
                                                    <i class="{{ module.icon|default:'layui-icon-component' }}"></i>
                                                    {{ module.name }}
                                                    {% if not module.is_active %}
                                                        <span class="layui-badge">禁用</span>
                                                    {% endif %}
                                                </div>
                                                <div class="layui-col-xs4" style="text-align: right;">
                                                    <button class="layui-btn layui-btn-xs" onclick="openModuleForm({{ module.pk }})">编辑</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="layui-card-body">
                                            <p style="color: #666; margin: 0;">{{ module.description|default:"暂无描述" }}</p>
                                            <div style="margin-top: 10px;">
                                            <span class="layui-badge layui-badge-rim">{{ module.code }}</span>
                                            <span style="float: right; color: #999; font-size: 12px;">排序: {{ module.sort_order }}</span>
                                        </div>
                                        </div>
                                    </div>
                                </div>
                                {% empty %}
                                <div class="layui-col-md12">
                                    <div style="text-align: center; color: #999; padding: 50px;">暂无模块数据</div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧弹出层 -->
        <div id="module-form-panel" style="position: fixed; top: 0; right: -75%; width: 75%; height: 100%; background: white; z-index: 10000; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease; overflow-y: auto;">
            <div class="layui-card">
                <div class="layui-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 id="form-title">编辑功能模块</h3>
                    <div>
                        <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="minimizeForm()">
                            <i class="layui-icon layui-icon-shrink-right"></i> 最小化
                        </button>
                        <button class="layui-btn layui-btn-sm layui-btn-primary" onclick="maximizeForm()">
                            <i class="layui-icon layui-icon-spread-left"></i> 最大化
                        </button>
                        <button class="layui-btn layui-btn-sm layui-btn-danger" onclick="closeForm()">
                            <i class="layui-icon layui-icon-close"></i> 关闭
                        </button>
                    </div>
                </div>
                <div class="layui-card-body" id="form-content">
                    <!-- 表单内容将通过AJAX加载 -->
                    <div style="text-align: center; padding: 50px; color: #999;">
                        <i class="layui-icon layui-icon-loading layui-icon layui-anim layui-anim-rotate layui-anim-loop" style="font-size: 32px;"></i>
                        <p style="margin-top: 10px;">加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 遮罩层 -->
        <div id="module-form-mask" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 9999; display: none;"></div>

    <script src="/static/layui/layui.js"></script>
    <script>
        layui.use(['form', 'jquery'], function() {
            var form = layui.form;
            var $ = layui.jquery;
            
            var formPanel = $('#module-form-panel');
            var formMask = $('#module-form-mask');
            var isMaximized = false;
            var originalWidth = '75%';
            
            // 搜索功能
            window.searchModule = function() {
                var search = document.querySelector('input[name="search"]').value;
                var url = new URL(window.location);
                if (search) {
                    url.searchParams.set('search', search);
                } else {
                    url.searchParams.delete('search');
                }
                window.location.href = url.toString();
            };

            // 回车搜索
            document.querySelector('input[name="search"]').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchModule();
                }
            });
            
            // 打开模块表单
            window.openModuleForm = function(moduleId) {
                var url = "{% url 'system:module_add' %}";
                var title = '新增功能模块';
                
                if (moduleId) {
                    url = "{% url 'system:module_edit' 0 %}".replace('0', moduleId);
                    title = '编辑功能模块';
                }
                
                $('#form-title').text(title);
                
                // 加载表单内容
                $.get(url, function(data) {
                    $('#form-content').html(data);
                    form.render(); // 重新渲染表单组件
                });
                
                // 显示表单
                formPanel.css('right', '0');
                formMask.show();
            };
            
            // 关闭表单
            window.closeForm = function() {
                formPanel.css('right', '-75%');
                formMask.hide();
                // 重置表单状态
                isMaximized = false;
                formPanel.css('width', originalWidth);
            };
            
            // 最小化表单
            window.minimizeForm = function() {
                formPanel.css('right', '-75%');
            };
            
            // 最大化表单
            window.maximizeForm = function() {
                if (isMaximized) {
                    // 恢复原始大小
                    formPanel.css('width', originalWidth);
                    isMaximized = false;
                } else {
                    // 最大化
                    formPanel.css('width', '100%');
                    isMaximized = true;
                }
            };
            
            // 点击遮罩层关闭表单
            formMask.click(function() {
                closeForm();
            });
            
            // 表单提交处理
            $(document).on('submit', '#module-form', function(e) {
                e.preventDefault();
                
                var formData = $(this).serialize();
                var url = $(this).attr('action');
                
                $.post(url, formData, function(data) {
                    if (data.success) {
                        // 刷新模块列表
                        window.location.reload();
                    } else {
                        // 显示错误信息
                        $('#form-content').html(data);
                        form.render();
                    }
                });
            });
        });
    </script>
</body>
</html>

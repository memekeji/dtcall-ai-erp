{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DTCall{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/ai-dynamic-theme.css' %}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #fff;
        }
    </style>
    {% block css %}{% endblock %}
    {% block js %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <script src="{% static 'layui/layui.js' %}"></script>
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/ai-agent-sdk.js' %}"></script>
    {% block script %}{% endblock %}
</body>
</html>

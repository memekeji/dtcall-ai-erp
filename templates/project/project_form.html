{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_edit %}编辑项目{% else %}新建项目{% endif %}</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>

<body>
    <div class="layui-fluid" style="padding: 20px;">
        <form class="layui-form" lay-filter="projectForm">
            {% csrf_token %}
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">项目名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="name" value="{% if project %}{{ project.name }}{% endif %}" 
                                   placeholder="请输入项目名称" class="layui-input" lay-verify="required">
                        </div>
                    </div>
                </div>
                
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">项目编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="code" 
                                   value="{% if project %}{{ project.code }}{% else %}{{ generated_code }}{% endif %}" 
                                   placeholder="项目编号" class="layui-input" lay-verify="required">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">关联客户</label>
                        <div class="layui-input-block">
                            <input type="text" name="customer_name" 
                                   value="{% if customer %}{{ customer.name }}{% elif project.customer_id %}{{ project.customer.name }}{% endif %}" 
                                   placeholder="请选择关联客户" class="layui-input" readonly
                                   lay-verify="required" required>
                            <input type="hidden" name="customer_id" value="{% if customer %}{{ customer.id }}{% elif project.customer_id %}{{ project.customer_id }}{% endif %}">
                            {% if not is_edit %}
                            <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" onclick="selectCustomer()" style="margin-top: 5px;">
                                <i class="layui-icon"></i> 选择客户
                            </button>
                            {% endif %}
                        </div>
                    </div>
                </div>
                
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">项目分类</label>
                        <div class="layui-input-block">
                            <select name="category_id" lay-filter="category">
                                <option value="">请选择项目分类</option>
                                {% for category in categories %}
                                <option value="{{ category.id }}" 
                                        {% if project and project.category_id == category.id %}selected{% endif %}>
                                    {{ category.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">项目经理</label>
                        <div class="layui-input-block">
                            <select name="manager_id" lay-filter="manager">
                                <option value="">请选择项目经理</option>
                                {% for user in users %}
                                <option value="{{ user.id }}" 
                                        {% if project and project.manager_id == user.id %}selected{% endif %}>
                                    {{ user.username }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">开始日期</label>
                        <div class="layui-input-block">
                            <input type="text" name="start_date" 
                                   value="{% if project %}{{ project.start_date|date:'Y-m-d' }}{% endif %}" 
                                   placeholder="请选择开始日期" class="layui-input" id="startDate" lay-verify="required">
                        </div>
                    </div>
                </div>
                
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">结束日期</label>
                        <div class="layui-input-block">
                            <input type="text" name="end_date" 
                                   value="{% if project %}{{ project.end_date|date:'Y-m-d' }}{% endif %}" 
                                   placeholder="请选择结束日期" class="layui-input" id="endDate" lay-verify="required">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md4">
                    <div class="layui-form-item">
                        <label class="layui-form-label">项目预算</label>
                        <div class="layui-input-block">
                            <input type="number" name="budget" 
                                   value="{% if project %}{{ project.budget }}{% else %}0{% endif %}" 
                                   placeholder="请输入项目预算" class="layui-input" step="0.01">
                        </div>
                    </div>
                </div>
                
                <div class="layui-col-md4">
                    <div class="layui-form-item">
                        <label class="layui-form-label">优先级</label>
                        <div class="layui-input-block">
                            <select name="priority">
                                <option value="1" {% if project and project.priority == 1 %}selected{% endif %}>低</option>
                                <option value="2" {% if not project or project.priority == 2 %}selected{% endif %}>中</option>
                                <option value="3" {% if project and project.priority == 3 %}selected{% endif %}>高</option>
                                <option value="4" {% if project and project.priority == 4 %}selected{% endif %}>紧急</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="layui-col-md4">
                    <div class="layui-form-item">
                        <label class="layui-form-label">项目进度</label>
                        <div class="layui-input-block">
                            <input type="number" name="progress" min="0" max="100" 
                                   value="{% if project %}{{ project.progress }}{% else %}0{% endif %}" 
                                   placeholder="0-100" class="layui-input">
                        </div>
                    </div>
                </div>
            </div>
            
            {% if is_edit %}
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">项目状态</label>
                        <div class="layui-input-block">
                            <select name="status">
                                <option value="1" {% if project.status == 1 %}selected{% endif %}>未开始</option>
                                <option value="2" {% if project.status == 2 %}selected{% endif %}>进行中</option>
                                <option value="3" {% if project.status == 3 %}selected{% endif %}>已完成</option>
                                <option value="4" {% if project.status == 4 %}selected{% endif %}>已关闭</option>
                                <option value="5" {% if project.status == 5 %}selected{% endif %}>已暂停</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">实际成本</label>
                        <div class="layui-input-block">
                            <input type="number" name="actual_cost" 
                                   value="{% if project %}{{ project.actual_cost }}{% else %}0{% endif %}" 
                                   placeholder="请输入实际成本" class="layui-input" step="0.01">
                        </div>
                    </div>
                </div>
            </div>
            {% endif %}
            
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">项目描述</label>
                <div class="layui-input-block">
                    <textarea name="description" placeholder="请输入项目描述" 
                              class="layui-textarea">{% if project %}{{ project.description }}{% endif %}</textarea>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">项目成员</label>
                <div class="layui-input-block">
                    {% include 'common/employee_selector.html' with selected_users=project.members.all %}
                </div>
            </div>
            
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit lay-filter="submitForm">提交</button>
                    <button type="button" class="layui-btn layui-btn-primary" onclick="closeWindow()">取消</button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['form', 'layer', 'laydate'], function () {
            var form = layui.form;
            var layer = layui.layer;
            var laydate = layui.laydate;

            // 日期选择器
            laydate.render({
                elem: '#startDate',
                type: 'date'
            });
            
            laydate.render({
                elem: '#endDate',
                type: 'date'
            });

            // 监听提交
            form.on('submit(submitForm)', function (data) {
                var url = '{% if is_edit %}/adm/project/edit/{{ project.id }}/{% else %}/adm/project/add/{% endif %}';
                
                // 添加CSRF token
                var formData = data.field;
                formData.csrfmiddlewaretoken = $('[name=csrfmiddlewaretoken]').val();
                
                console.log('Submitting project to:', url);
                console.log('Project data:', formData);
                
                $.ajax({
                    url: url,
                    type: 'POST',
                    data: formData,
                    dataType: 'json',
                    success: function (res) {
                        console.log('Project response:', res);
                        if (res.code === 0) {
                            layer.msg(res.msg, { icon: 1 });
                            setTimeout(function () {
                                var index = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(index);
                                // 重定向到项目详情页
                                if (res.data && res.data.id) {
                                    try {
                                        parent.location.href = '/adm/project/detail/' + res.data.id + '/';
                                    } catch (redirectError) {
                                        console.error('重定向失败:', redirectError);
                                        // 重定向失败时显示提示并刷新列表
                                        parent.layer.msg('项目创建成功，但重定向失败，已刷新项目列表', { icon: 1, time: 3000 });
                                        parent.layui.table.reload('projectTable');
                                    }
                                } else {
                                    // 如果没有项目ID，则刷新项目列表
                                    parent.layer.msg('项目创建成功，但未获取到项目ID，已刷新项目列表', { icon: 1, time: 3000 });
                                    parent.layui.table.reload('projectTable');
                                }
                            }, 1000);
                        } else {
                            layer.msg(res.msg, { icon: 2 });
                        }
                    },
                    error: function (xhr, status, error) {
                        console.log('Project error:', xhr.responseText);
                        var errorMsg = '提交失败';
                        
                        // 尝试解析服务器返回的错误信息
                        if (xhr.responseText) {
                            try {
                                var response = JSON.parse(xhr.responseText);
                                if (response.msg) {
                                    errorMsg = response.msg;
                                }
                            } catch (e) {
                                // 如果不是JSON格式，使用默认错误信息
                                if (xhr.status === 403) {
                                    errorMsg = '没有权限执行此操作';
                                } else if (xhr.status === 404) {
                                    errorMsg = '请求的资源不存在';
                                } else if (xhr.status >= 500) {
                                    errorMsg = '服务器内部错误，请稍后重试';
                                }
                            }
                        }
                        
                        layer.msg(errorMsg, { icon: 2, time: 5000 });
                    }
                });
                
                return false;
            });
        });

        function closeWindow() {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        }
        
        // 选择客户功能
        function selectCustomer() {
            if (!layer || typeof layer.open !== 'function') {
                console.warn('Layui layer module not properly loaded');
                return;
            }
            
            layer.open({
                type: 2,
                title: '选择客户',
                shadeClose: false,
                shade: 0.3,
                maxmin: true,
                area: ['80%', '90%'],
                offset: 'r',
                anim: 2,
                content: '/customer/select/',
                success: function(layero, index) {
                    if (layero && layero.css) {
                        layero.css({
                            'right': '0',
                            'top': '0',
                            'height': '100%'
                        });
                    }
                },
                end: function() {
                    // 客户选择完成后刷新表单验证
                    if (typeof layui !== 'undefined' && layui.form) {
                        layui.form.render();
                    }
                }
            });
        }
        
        // 设置选中的客户（由客户选择页面调用）
        function setSelectedCustomer(customerId, customerName) {
            if (customerId && customerName) {
                $('input[name="customer_id"]').val(customerId);
                $('input[name="customer_name"]').val(customerName);
                
                // 关闭客户选择窗口
                var index = parent.layer.getFrameIndex(window.name);
                parent.layer.close(index);
                
                // 刷新表单验证
                if (typeof layui !== 'undefined' && layui.form) {
                    layui.form.render();
                }
            }
        }
    </script>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目甘特图</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <style>
        .gantt-container {
            padding: 20px;
        }
        
        .gantt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .time-range-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .gantt-chart {
            width: 100%;
            height: 600px;
            margin-top: 20px;
        }
        
        .task-info {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            background: #f9f9f9;
        }
        
        .loading {
            text-align: center;
            padding: 100px;
            color: #999;
        }
        
        .error {
            text-align: center;
            padding: 100px;
            color: #ff4d4f;
        }
        
        .task-form {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            background: #f9f9f9;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .form-item {
            flex: 1;
        }
        
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #e6e6e6;
            border-radius: 4px;
        }
        
        .form-textarea {
            width: 100%;
            min-height: 100px;
            padding: 8px;
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            resize: vertical;
        }
        
        .form-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <h2>项目甘特图</h2>
                <div class="layui-btn-group">
                    <button class="layui-btn layui-btn-sm" onclick="refreshGantt()">
                        <i class="layui-icon layui-icon-refresh"></i> 刷新
                    </button>
                    <button class="layui-btn layui-btn-sm" onclick="exportGantt()">
                        <i class="layui-icon layui-icon-export"></i> 导出
                    </button>
                    <button class="layui-btn layui-btn-sm" onclick="closeWindow()">
                        <i class="layui-icon layui-icon-close"></i> 关闭
                    </button>
                </div>
            </div>
            <div class="layui-card-body">
                <div id="app">
                    <!-- 时间范围选择器 -->
                    <div class="time-range-selector">
                        <div class="layui-inline">
                            <label class="layui-form-label">开始日期</label>
                            <div class="layui-input-inline">
                                <input type="date" v-model="timeRange.start" class="form-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">结束日期</label>
                            <div class="layui-input-inline">
                                <input type="date" v-model="timeRange.end" class="form-input">
                            </div>
                        </div>
                        <button class="layui-btn layui-btn-normal" @click="updateTimeRange">
                            <i class="layui-icon layui-icon-search"></i> 应用
                        </button>
                    </div>
                    
                    <!-- 甘特图容器 -->
                    <div v-if="loading" class="loading">
                        <i class="layui-icon layui-icon-loading layui-icon layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...
                    </div>
                    <div v-else-if="error" class="error">
                        {{ error }}
                    </div>
                    <div v-else>
                        <div ref="ganttChart" class="gantt-chart"></div>
                        
                        <!-- 任务信息面板 -->
                        <div v-if="selectedTask" class="task-info">
                            <h3>任务详情</h3>
                            <div class="form-row">
                                <div class="form-item">
                                    <label class="form-label">任务名称</label>
                                    <input type="text" v-model="selectedTask.title" class="form-input">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">状态</label>
                                    <select v-model="selectedTask.status" class="form-input">
                                        <option value="1">未开始</option>
                                        <option value="2">进行中</option>
                                        <option value="3">已完成</option>
                                        <option value="4">已取消</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-item">
                                    <label class="form-label">开始日期</label>
                                    <input type="date" v-model="selectedTask.start_date" class="form-input">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">结束日期</label>
                                    <input type="date" v-model="selectedTask.end_date" class="form-input">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-item">
                                    <label class="form-label">优先级</label>
                                    <select v-model="selectedTask.priority" class="form-input">
                                        <option value="1">低</option>
                                        <option value="2">中</option>
                                        <option value="3">高</option>
                                        <option value="4">紧急</option>
                                    </select>
                                </div>
                                <div class="form-item">
                                    <label class="form-label">进度</label>
                                    <input type="number" v-model="selectedTask.progress" min="0" max="100" class="form-input">
                                </div>
                            </div>
                            <div class="form-item">
                                <label class="form-label">描述</label>
                                <textarea v-model="selectedTask.description" class="form-textarea"></textarea>
                            </div>
                            <div class="form-actions">
                                <button class="layui-btn layui-btn-primary" @click="cancelEdit">取消</button>
                                <button class="layui-btn layui-btn-normal" @click="saveTask">保存修改</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script src="{% static 'js/lib/vue.global.prod.js' %}"></script>
    <script src="{% static 'js/lib/axios.min.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        layui.use(['layer'], function() {
            window.layer = layui.layer;
        });
        
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    ganttChart: null,
                    loading: true,
                    error: null,
                    tasks: [],
                    selectedTask: null,
                    timeRange: {
                        start: '{{ start_date }}',
                        end: '{{ end_date }}'
                    },
                    projectId: {{ project_id }}
                };
            },
            mounted() {
                this.initGanttChart();
                this.loadTasks();
            },
            methods: {
                // 初始化甘特图
                initGanttChart() {
                    this.ganttChart = echarts.init(this.$refs.ganttChart);
                    
                    // 监听窗口大小变化
                    window.addEventListener('resize', () => {
                        this.ganttChart.resize();
                    });
                },
                
                // 加载任务数据
                async loadTasks() {
                    this.loading = true;
                    this.error = null;
                    try {
                        const response = await axios.get(`/project/api/projects/${this.projectId}/tasks/`);
                        this.tasks = response.data;
                        this.renderGanttChart();
                    } catch (error) {
                        console.error('加载任务失败:', error);
                        this.error = '加载任务失败，请刷新页面重试';
                    } finally {
                        this.loading = false;
                    }
                },
                
                // 渲染甘特图
                renderGanttChart() {
                    if (!this.ganttChart || this.tasks.length === 0) return;
                    
                    // 准备甘特图数据
                    const categories = this.tasks.map(task => task.title);
                    const seriesData = this.tasks.map((task, index) => {
                        return {
                            name: task.title,
                            value: [
                                new Date(task.start_date).getTime(),
                                new Date(task.end_date).getTime(),
                                task.progress
                            ],
                            itemStyle: {
                                color: this.getTaskColor(task.status)
                            },
                            taskId: task.id,
                            status: task.status
                        };
                    });
                    
                    // 甘特图配置
                    const option = {
                        tooltip: {
                            formatter: (params) => {
                                const task = this.tasks.find(t => t.id === params.data.taskId);
                                return `
                                    <div><strong>${task.title}</strong></div>
                                    <div>开始日期: ${task.start_date}</div>
                                    <div>结束日期: ${task.end_date}</div>
                                    <div>进度: ${task.progress}%</div>
                                    <div>状态: ${this.getStatusText(task.status)}</div>
                                    <div>优先级: ${this.getPriorityText(task.priority)}</div>
                                `;
                            }
                        },
                        grid: {
                            left: '15%',
                            right: '8%',
                            bottom: '10%'
                        },
                        xAxis: {
                            type: 'time',
                            axisLabel: {
                                formatter: '{MM}-{dd}'
                            }
                        },
                        yAxis: {
                            type: 'category',
                            data: categories,
                            axisLabel: {
                                interval: 0,
                                rotate: 30
                            }
                        },
                        series: [{
                            type: 'custom',
                            renderItem: this.renderGanttItem,
                            itemStyle: {
                                opacity: 0.8
                            },
                            encode: {
                                x: [0, 1],
                                y: 2
                            },
                            data: seriesData
                        }]
                    };
                    
                    this.ganttChart.setOption(option);
                    
                    // 绑定点击事件
                    this.ganttChart.off('click');
                    this.ganttChart.on('click', (params) => {
                        const taskId = params.data.taskId;
                        this.selectTask(taskId);
                    });
                },
                
                // 渲染甘特图项
                renderGanttItem(params, api) {
                    const categoryIndex = api.value(2);
                    const start = api.coord([api.value(0), categoryIndex]);
                    const end = api.coord([api.value(1), categoryIndex]);
                    const height = api.size([0, 1])[1] * 0.6;
                    
                    const rectShape = echarts.graphic.clipRectByRect({
                        x: start[0],
                        y: start[1] - height / 2,
                        width: end[0] - start[0],
                        height: height
                    }, {
                        x: params.coordSys.x,
                        y: params.coordSys.y,
                        width: params.coordSys.width,
                        height: params.coordSys.height
                    });
                    
                    if (!rectShape) return;
                    
                    // 计算进度条宽度
                    const progressWidth = rectShape.width * (api.value(2) / 100);
                    
                    return [
                        // 任务条
                        echarts.graphic.Rect({
                            shape: rectShape,
                            style: api.style()
                        }),
                        // 进度条
                        echarts.graphic.Rect({
                            shape: {
                                x: rectShape.x,
                                y: rectShape.y,
                                width: progressWidth,
                                height: rectShape.height
                            },
                            style: {
                                fill: '#1890ff',
                                opacity: 0.6
                            }
                        })
                    ];
                },
                
                // 获取任务颜色
                getTaskColor(status) {
                    const colorMap = {
                        1: '#ffd666', // 未开始
                        2: '#91d5ff', // 进行中
                        3: '#73d13d', // 已完成
                        4: '#ff7875'  // 已取消
                    };
                    return colorMap[status] || '#d9d9d9';
                },
                
                // 获取状态文本
                getStatusText(status) {
                    const statusMap = {
                        1: '未开始',
                        2: '进行中',
                        3: '已完成',
                        4: '已取消'
                    };
                    return statusMap[status] || '未知';
                },
                
                // 获取优先级文本
                getPriorityText(priority) {
                    const priorityMap = {
                        1: '低',
                        2: '中',
                        3: '高',
                        4: '紧急'
                    };
                    return priorityMap[priority] || '未知';
                },
                
                // 选择任务
                selectTask(taskId) {
                    const task = this.tasks.find(t => t.id === taskId);
                    if (task) {
                        this.selectedTask = JSON.parse(JSON.stringify(task));
                    }
                },
                
                // 保存任务修改
                async saveTask() {
                    if (!this.selectedTask) return;
                    
                    try {
                        const response = await axios.put(`/project/api/tasks/${this.selectedTask.id}/`, this.selectedTask);
                        
                        // 更新本地任务数据
                        const index = this.tasks.findIndex(t => t.id === this.selectedTask.id);
                        if (index !== -1) {
                            this.tasks[index] = response.data;
                        }
                        
                        // 重新渲染甘特图
                        this.renderGanttChart();
                        
                        layer.msg('任务保存成功', { icon: 6 });
                        this.selectedTask = null;
                    } catch (error) {
                        console.error('保存任务失败:', error);
                        layer.msg('保存任务失败，请重试', { icon: 5 });
                    }
                },
                
                // 取消编辑
                cancelEdit() {
                    this.selectedTask = null;
                },
                
                // 更新时间范围
                updateTimeRange() {
                    // 这里可以根据时间范围过滤任务
                    layer.msg('时间范围更新功能开发中...', { icon: 0 });
                },
                
                // 刷新甘特图
                refreshGantt() {
                    this.loadTasks();
                },
                
                // 导出甘特图
                exportGantt() {
                    if (this.ganttChart) {
                        const url = this.ganttChart.getDataURL({
                            type: 'png',
                            pixelRatio: 2,
                            backgroundColor: '#fff'
                        });
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `甘特图_${new Date().toISOString().split('T')[0]}.png`;
                        link.click();
                        layer.msg('甘特图导出成功', { icon: 6 });
                    }
                }
            }
        }).mount('#app');
        
        function closeWindow() {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        }
        
        function refreshGantt() {
            window.app.refreshGantt();
        }
        
        function exportGantt() {
            window.app.exportGantt();
        }
    </script>
</body>
</html>

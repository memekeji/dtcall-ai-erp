{% extends 'home/iframe_base.html' %}
{% load static %}

{% block title %}工时统计分析 - DTCALL管理后台{% endblock %}

{% block css %}
<style>
    .stats-container {
        padding: 20px;
    }
    
    .stats-overview {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 25px;
    }
    
    .stat-card {
        background: #fff;
        border-radius: 8px;
        padding: 25px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        text-align: center;
    }
    
    .stat-card .icon-wrapper {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        font-size: 28px;
    }
    
    .stat-card.hours .icon-wrapper { background: #e6f7ff; color: #1890ff; }
    .stat-card.records .icon-wrapper { background: #fff1f0; color: #ff4d4f; }
    .stat-card.users .icon-wrapper { background: #fffbe6; color: #faad14; }
    .stat-card.tasks .icon-wrapper { background: #f6ffed; color: #52c41a; }
    
    .stat-card .stat-value {
        font-size: 36px;
        font-weight: bold;
        color: #333;
        margin-bottom: 5px;
    }
    
    .stat-card .stat-label {
        font-size: 14px;
        color: #999;
    }
    
    .stats-section {
        background: #fff;
        border-radius: 8px;
        padding: 25px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }
    
    .section-title {
        font-size: 16px;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .filter-bar {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    
    .filter-bar .layui-form-item {
        margin-bottom: 0;
    }
    
    .layui-table-cell {
        height: auto !important;
        white-space: normal !important;
    }
    
    .chart-container {
        height: 350px;
        margin-top: 20px;
    }
    
    .chart-bar {
        display: flex;
        align-items: flex-end;
        justify-content: space-around;
        height: 300px;
        padding: 20px 0;
        border-bottom: 2px solid #eee;
    }
    
    .chart-bar-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        max-width: 80px;
    }
    
    .chart-bar-fill {
        width: 40px;
        background: linear-gradient(to top, #1890ff, #40a9ff);
        border-radius: 4px 4px 0 0;
        transition: height 0.3s ease;
        min-height: 4px;
    }
    
    .chart-bar-label {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
        text-align: center;
        max-width: 60px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    
    .chart-bar-value {
        font-size: 12px;
        font-weight: bold;
        color: #333;
        margin-bottom: 5px;
    }
    
    .tab-container {
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="stats-container">
    <!-- 筛选条件 -->
    <div class="filter-bar">
        <div class="layui-inline">
            <label class="layui-form-label">开始日期:</label>
            <div class="layui-input-inline">
                <input type="text" class="layui-input" id="startDate" placeholder="开始日期">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">结束日期:</label>
            <div class="layui-input-inline">
                <input type="text" class="layui-input" id="endDate" placeholder="结束日期">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">人员:</label>
            <div class="layui-input-inline">
                <select id="userFilter" lay-filter="userFilter">
                    <option value="">全部人员</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="layui-inline">
            <button type="button" class="layui-btn" id="searchBtn">
                <i class="layui-icon layui-icon-search"></i> 查询
            </button>
        </div>
    </div>
    
    <!-- 概览统计 -->
    <div class="stats-overview">
        <div class="stat-card hours">
            <div class="icon-wrapper">
                <i class="layui-icon layui-icon-time"></i>
            </div>
            <div class="stat-value" id="totalHours">0</div>
            <div class="stat-label">总工时(小时)</div>
        </div>
        <div class="stat-card records">
            <div class="icon-wrapper">
                <i class="layui-icon layui-icon-form"></i>
            </div>
            <div class="stat-value" id="totalRecords">0</div>
            <div class="stat-label">总记录数</div>
        </div>
        <div class="stat-card users">
            <div class="icon-wrapper">
                <i class="layui-icon layui-icon-user"></i>
            </div>
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">参与人数</div>
        </div>
        <div class="stat-card tasks">
            <div class="icon-wrapper">
                <i class="layui-icon layui-icon-tasks"></i>
            </div>
            <div class="stat-value" id="totalTasks">0</div>
            <div class="stat-label">涉及任务</div>
        </div>
    </div>
    
    <!-- Tab切换 -->
    <div class="layui-tab layui-tab-brief" lay-filter="statsTab">
        <ul class="layui-tab-title">
            <li class="layui-this" lay-id="byUser">按人员统计</li>
            <li lay-id="byProject">按项目统计</li>
            <li lay-id="byTask">按任务统计</li>
            <li lay-id="byMonth">按月份统计</li>
        </ul>
        <div class="layui-tab-content">
            <div class="layui-tab-item layui-show">
                <div class="stats-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-user"></i>
                        按人员统计工时
                    </div>
                    <table class="layui-table" id="userStatsTable" lay-filter="userStatsTable"></table>
                </div>
            </div>
            <div class="layui-tab-item">
                <div class="stats-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-project"></i>
                        按项目统计工时
                    </div>
                    <table class="layui-table" id="projectStatsTable" lay-filter="projectStatsTable"></table>
                </div>
            </div>
            <div class="layui-tab-item">
                <div class="stats-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-tasks"></i>
                        按任务统计工时
                    </div>
                    <table class="layui-table" id="taskStatsTable" lay-filter="taskStatsTable"></table>
                </div>
            </div>
            <div class="layui-tab-item">
                <div class="stats-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-calendar"></i>
                        按月份统计工时
                    </div>
                    <div id="monthlyChart" class="chart-container"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/html" id="userStatsBar">
    <div class="chart-bar" id="userChartBar"></div>
</script>

<script type="text/javascript" src="{% static 'layui/layui.js' %}"></script>
<script>
layui.use(['element', 'table', 'laydate', 'layer'], function() {
    var element = layui.element;
    var table = layui.table;
    var laydate = layui.laydate;
    var layer = layui.layer;
    
    // 日期选择器
    laydate.render({
        elem: '#startDate',
        type: 'date'
    });
    
    laydate.render({
        elem: '#endDate',
        type: 'date'
    });
    
    // 获取筛选参数
    function getFilterParams() {
        return {
            start_date: $('#startDate').val(),
            end_date: $('#endDate').val(),
            user_id: $('#userFilter').val()
        };
    }
    
    // 加载概览数据
    function loadOverview() {
        var params = getFilterParams();
        params.type = 'overview';
        
        $.get('/task/workhour/stats/', params, function(res) {
            if(res.code === 0) {
                $('#totalHours').text(res.data.total_hours.toFixed(1));
                $('#totalRecords').text(res.data.total_records);
                $('#totalUsers').text(res.data.total_users);
                $('#totalTasks').text(res.data.total_tasks);
            }
        });
    }
    
    // 加载按人员统计
    function loadUserStats() {
        var params = getFilterParams();
        params.type = 'by_user';
        
        table.render({
            elem: '#userStatsTable',
            url: '/task/workhour/stats/',
            where: params,
            method: 'get',
            request: {
                pageName: 'page',
                limitName: 'limit'
            },
            response: {
                statusCode: 0
            },
            cols: [[
                {field: 'user_name', title: '人员', width: 150},
                {field: 'total_hours', title: '总工时(小时)', width: 150, templet: function(d) {
                    return d.total_hours.toFixed(1);
                }},
                {field: 'task_count', title: '任务数', width: 100},
                {field: 'record_count', title: '记录数', width: 100}
            ]],
            page: true,
            limit: 20
        });
    }
    
    // 加载按项目统计
    function loadProjectStats() {
        var params = getFilterParams();
        params.type = 'by_project';
        
        table.render({
            elem: '#projectStatsTable',
            url: '/task/workhour/stats/',
            where: params,
            method: 'get',
            request: {
                pageName: 'page',
                limitName: 'limit'
            },
            response: {
                statusCode: 0
            },
            cols: [[
                {field: 'project_name', title: '项目名称'},
                {field: 'total_hours', title: '总工时(小时)', width: 150, templet: function(d) {
                    return d.total_hours.toFixed(1);
                }},
                {field: 'task_count', title: '任务数', width: 100},
                {field: 'user_count', title: '参与人数', width: 100},
                {field: 'record_count', title: '记录数', width: 100}
            ]],
            page: true,
            limit: 20
        });
    }
    
    // 加载按任务统计
    function loadTaskStats() {
        var params = getFilterParams();
        params.type = 'by_task';
        
        table.render({
            elem: '#taskStatsTable',
            url: '/task/workhour/stats/',
            where: params,
            method: 'get',
            request: {
                pageName: 'page',
                limitName: 'limit'
            },
            response: {
                statusCode: 0
            },
            cols: [[
                {field: 'task_title', title: '任务标题'},
                {field: 'total_hours', title: '总工时(小时)', width: 150, templet: function(d) {
                    return d.total_hours.toFixed(1);
                }},
                {field: 'user_count', title: '参与人数', width: 100},
                {field: 'record_count', title: '记录数', width: 100}
            ]],
            page: true,
            limit: 20
        });
    }
    
    // 加载按月份统计
    function loadMonthStats() {
        var params = getFilterParams();
        params.type = 'by_month';
        
        $.get('/task/workhour/stats/', params, function(res) {
            if(res.code === 0) {
                renderMonthlyChart(res.data);
            }
        });
    }
    
    // 渲染月度图表
    function renderMonthlyChart(data) {
        var container = $('#monthlyChart');
        if(data.length === 0) {
            container.html('<p style="text-align: center; color: #999; padding: 50px;">暂无数据</p>');
            return;
        }
        
        var maxHours = Math.max(...data.map(function(item) { return item.total_hours; }));
        
        var html = '<div class="chart-bar">';
        data.forEach(function(item) {
            var height = maxHours > 0 ? (item.total_hours / maxHours * 250) : 0;
            html += '<div class="chart-bar-item">';
            html += '<div class="chart-bar-value">' + item.total_hours.toFixed(1) + '</div>';
            html += '<div class="chart-bar-fill" style="height: ' + height + 'px;"></div>';
            html += '<div class="chart-bar-label">' + item.month + '</div>';
            html += '</div>';
        });
        html += '</div>';
        
        container.html(html);
    }
    
    // Tab切换事件
    element.on('tab(statsTab)', function(data) {
        var layId = $(this).attr('lay-id');
        if(layId === 'byUser') {
            loadUserStats();
        } else if(layId === 'byProject') {
            loadProjectStats();
        } else if(layId === 'byTask') {
            loadTaskStats();
        } else if(layId === 'byMonth') {
            loadMonthStats();
        }
    });
    
    // 搜索按钮点击事件
    $('#searchBtn').on('click', function() {
        loadOverview();
        
        var currentTab = $('.layui-tab-title li.layui-this').attr('lay-id');
        if(currentTab === 'byUser') {
            loadUserStats();
        } else if(currentTab === 'byProject') {
            loadProjectStats();
        } else if(currentTab === 'byTask') {
            loadTaskStats();
        } else if(currentTab === 'byMonth') {
            loadMonthStats();
        }
    });
    
    // 初始化加载
    loadOverview();
    loadUserStats();
});
</script>
{% endblock %}

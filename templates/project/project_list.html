{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        /* 确保页面铺满整个屏幕 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        .project-stats {
            margin-bottom: 20px;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 10px;
        }

        .stat-card.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-card.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card.info {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-1 {
            background: #f0f0f0;
            color: #666;
        }

        .status-2 {
            background: #e6f7ff;
            color: #1890ff;
        }

        .status-3 {
            background: #f6ffed;
            color: #52c41a;
        }

        .status-4 {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .status-5 {
            background: #fff2e8;
            color: #fa8c16;
        }

        .priority-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .priority-1 {
            background: #f0f0f0;
            color: #666;
        }

        .priority-2 {
            background: #e6f7ff;
            color: #1890ff;
        }

        .priority-3 {
            background: #fff2e8;
            color: #fa8c16;
        }

        .priority-4 {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .progress-bar {
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin: 2px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1890ff, #52c41a);
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="layui-fluid">
        <!-- 统计卡片 -->
        <div class="layui-row layui-col-space15 project-stats">
            <div class="layui-col-md3">
                <div class="stat-card">
                    <div class="stat-number" id="totalProjects">0</div>
                    <div class="stat-label">总项目数</div>
                </div>
            </div>
            <div class="layui-col-md3">
                <div class="stat-card success">
                    <div class="stat-number" id="inProgressProjects">0</div>
                    <div class="stat-label">进行中项目</div>
                </div>
            </div>
            <div class="layui-col-md3">
                <div class="stat-card info">
                    <div class="stat-number" id="completedProjects">0</div>
                    <div class="stat-label">已完成项目</div>
                </div>
            </div>
            <div class="layui-col-md3">
                <div class="stat-card warning">
                    <div class="stat-number" id="overdueProjects">0</div>
                    <div class="stat-label">逾期项目</div>
                </div>
            </div>
        </div>

        <div class="layui-card">
            <div class="layui-card-header">
                <!-- 按钮和搜索区域 -->
                <div class="layui-row layui-col-space10">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-normal layui-btn-sm" onclick="addProject()">
                            <i class="layui-icon layui-icon-add-1"></i> 新建项目
                        </button>
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportProject()"
                            style="margin-left: 8px;">
                            <i class="layui-icon layui-icon-export"></i> 导出
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <select id="searchStatus" lay-filter="searchStatus">
                                <option value="">项目状态</option>
                                <option value="1">未开始</option>
                                <option value="2">进行中</option>
                                <option value="3">已完成</option>
                                <option value="4">已关闭</option>
                                <option value="5">已暂停</option>
                            </select>
                        </div>
                        <div class="layui-inline">
                            <select id="searchCategory" lay-filter="searchCategory">
                                <option value="">项目分类</option>
                                {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="layui-inline">
                            <input type="text" id="searchKeywords" placeholder="项目名称" class="layui-input"
                                style="width: 120px;">
                        </div>
                        <div class="layui-inline">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchProject()">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary"
                                onclick="resetSearch()">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="projectTable" class="layui-table" lay-filter="projectTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'form'], function () {
            if (typeof layui === 'undefined') {
                console.warn('LayUI is not loaded properly');
                return;
            }
            
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;

            // 初始化表格
            function initTable() {
                if (table && table.render) {
                    table.render({
                    elem: '#projectTable',
                    url: '/project/datalist/',
                    cols: [[
                        { field: 'id', title: 'ID', width: 80, align: 'center' },
                        { field: 'name', title: '项目名称', width: 200 },
                        { field: 'code', title: '项目编号', width: 150 },
                        { field: 'customer_name', title: '关联客户', width: 150 },
                        { field: 'status_display', title: '状态', width: 100, align: 'center', templet: function (d) {
                                var statusClass = 'status-' + d.status;
                                return '<span class="status-badge ' + statusClass + '">' + d.status_display + '</span>';
                            }
                        },
                        { field: 'priority_display', title: '优先级', width: 80, align: 'center', templet: function (d) {
                                var priorityClass = 'priority-' + d.priority;
                                return '<span class="priority-badge ' + priorityClass + '">' + d.priority_display + '</span>';
                            }
                        },
                        { field: 'progress', title: '进度', width: 120, align: 'center', templet: function (d) {
                                return '<div class="progress-bar"><div class="progress-fill" style="width: ' + d.progress + '%"></div></div>' + d.progress + '%';
                            }
                        },
                        { field: 'category_name', title: '项目分类', width: 120 },
                        { field: 'manager_name', title: '项目经理', width: 100, align: 'center' },
                        { field: 'creator_name', title: '创建人', width: 100, align: 'center' },
                        { field: 'start_date', title: '开始日期', width: 110, align: 'center' },
                        { field: 'end_date', title: '结束日期', width: 110, align: 'center' },
                        { field: 'budget', title: '项目预算', width: 120, align: 'center', templet: function (d) {
                                return '¥' + parseFloat(d.budget).toLocaleString();
                            }
                        },
                        { field: 'actual_cost', title: '实际成本', width: 120, align: 'center', templet: function (d) {
                                return '¥' + parseFloat(d.actual_cost).toLocaleString();
                            }
                        },
                        { field: 'is_overdue', title: '状态', width: 80, align: 'center', templet: function (d) {
                                if (d.is_overdue) {
                                    return '<span style="color: #ff4d4f;">已逾期</span>';
                                } else {
                                    return '<span style="color: #52c41a;">正常</span>';
                                }
                            }
                        },
                        { field: 'create_time', title: '创建时间', width: 150, align: 'center' },
                        { title: '操作', width: 200, toolbar: '#projectToolBar', fixed: 'right' }
                    ]],
                    page: true,
                    limit: 20,
                    height: 'full-200',
                    done: function (res) {
                        updateStats(res.data);
                    }
                });
                }
            }

            // 更新统计数据
            function updateStats(data) {
                if (!data || !Array.isArray(data)) {
                    console.warn('Invalid data for stats update');
                    return;
                }
                var total = data.length;
                var inProgress = data.filter(item => item && item.status == 2).length;
                var completed = data.filter(item => item && item.status == 3).length;
                var overdue = data.filter(item => item && item.is_overdue).length;

                $('#totalProjects').text(total);
                $('#inProgressProjects').text(inProgress);
                $('#completedProjects').text(completed);
                $('#overdueProjects').text(overdue);
            }

            // 初始化表格
            initTable();

            // 监听工具条
            if (table && table.on) {
                table.on('tool(projectTable)', function (obj) {
                    if (!obj || !obj.data || !obj.event) {
                        console.warn('Invalid table tool event object');
                        return;
                    }
                    var data = obj.data;
                    var layEvent = obj.event;

                    if (layEvent === 'view' && layer && layer.open) {
                        layer.open({
                            type: 2,
                            title: '项目详情',
                            shadeClose: true,
                            shade: 0.3,
                            area: ['75%', '100%'],
                            offset: 'r',
                            content: '/adm/project/detail/' + data.id + '/'
                        });
                    } else if (layEvent === 'edit' && layer && layer.open) {
                        layer.open({
                            type: 2,
                            title: '编辑项目',
                            shadeClose: true,
                            shade: 0.3,
                            area: ['75%', '90%'],
                            offset: 'r',
                            content: '/adm/project/edit/' + data.id + '/',
                            end: function () {
                                if (table && table.reload) {
                                    table.reload('projectTable');
                                }
                            }
                        });
                    } else if (layEvent === 'delete' && layer && layer.confirm) {
                        layer.confirm('确定删除这个项目吗？', function (index) {
                            // 这里添加删除逻辑
                            if (layer && layer.msg) {
                                layer.msg('删除功能开发中...', { icon: 0 });
                            }
                            if (layer && layer.close) {
                                layer.close(index);
                            }
                        });
                    }
                });
            }
        });

        // 新建项目
        function addProject() {
            layui.use(['layer', 'table'], function () {
                if (typeof layui === 'undefined') {
                    console.warn('LayUI is not loaded properly');
                    return;
                }
                var layer = layui.layer;
                var table = layui.table;

                if (layer && layer.open) {
                    layer.open({
                        type: 2,
                        title: '新建项目',
                        content: '/adm/project/add/',
                        area: ['75%', '90%'],
                        anim: 2,
                        maxmin: true,
                        end: function () {
                            if (table && table.reload) {
                                table.reload('projectTable');
                            }
                        }
                    });
                }
            });
        }

        // 导出项目
        function exportProject() {
            layui.use(['layer'], function () {
                if (typeof layui === 'undefined') {
                    console.warn('LayUI is not loaded properly');
                    return;
                }
                var layer = layui.layer;
                if (layer && layer.msg) {
                    layer.msg('导出功能开发中...', { icon: 0 });
                }
            });
        }

        // 搜索项目
        function searchProject() {
            layui.use(['table'], function () {
                if (typeof layui === 'undefined') {
                    console.warn('LayUI is not loaded properly');
                    return;
                }
                var table = layui.table;
                var status = $('#searchStatus').val();
                var category = $('#searchCategory').val();
                var keywords = $('#searchKeywords').val();
                var params = {};

                if (status) params.status = status;
                if (category) params.category_id = category;
                if (keywords) params.keywords = keywords;

                if (table && table.reload) {
                    table.reload('projectTable', {
                        where: params
                    });
                }
            });
        }

        // 重置搜索
        function resetSearch() {
            layui.use(['table', 'form'], function () {
                if (typeof layui === 'undefined') {
                    console.warn('LayUI is not loaded properly');
                    return;
                }
                var table = layui.table;
                var form = layui.form;

                $('#searchStatus').val('');
                $('#searchCategory').val('');
                $('#searchKeywords').val('');
                if (form && form.render) {
                    form.render('select');
                }

                if (table && table.reload) {
                    table.reload('projectTable', {
                        where: {}
                    });
                }
            });
        }
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="projectToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">详情</a>
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
    </script>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报销管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <!-- 选项卡区域 -->
                <div class="layui-tab layui-tab-brief" lay-filter="expenseTabs">
                    <ul class="layui-tab-title">
                        <li class="layui-this" lay-id="all">全部报销</li>
                        <li lay-id="my">我创建的</li>
                        <li lay-id="pending">待我审核</li>
                        <li lay-id="reviewed">我已审核</li>
                        <li lay-id="copy">抄送给我</li>
                    </ul>
                </div>
                
                <!-- 按钮和搜索区域 -->
                <div class="layui-row layui-col-space10" style="margin-top: 15px;">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-normal layui-btn-sm" onclick="addExpense()" style="position: relative; z-index: 100;">
                            <i class="layui-icon layui-icon-add-1"></i> 新增报销
                        </button>
                        <button class="layui-btn layui-btn-warm layui-btn-sm" onclick="batchApproval()" style="margin-left: 8px; position: relative; z-index: 100;">
                            <i class="layui-icon layui-icon-ok"></i> 批量审批
                        </button>
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportExpense()" style="margin-left: 8px; position: relative; z-index: 100;">
                            <i class="layui-icon layui-icon-export"></i> 导出
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <input type="text" id="searchCode" placeholder="报销编码" class="layui-input" style="width: 120px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <input type="text" id="searchDateRange" placeholder="选择日期范围" class="layui-input" style="width: 180px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchExpense()" style="position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetSearch()" style="margin-left: 5px; position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="expenseTable" class="layui-table" lay-filter="expenseTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'laydate', 'form'], function() {
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var laydate = layui.laydate;
            var form = layui.form;

            // 初始化日期选择器
            laydate.render({
                elem: '#searchDateRange',
                range: true,
                format: 'yyyy-MM-dd'
            });

            // 初始化表格
            function initTable(tab = '0') {
                table.render({
                    elem: '#expenseTable',
                    id: 'expenseTable',
                    url: '/finance/reimbursement/datalist/?tab=' + tab,
                    cols: [[
                        {type: 'checkbox', width: 50},
                        {field: 'id', title: 'ID', width: 80},
                        {field: 'code', title: '报销编码', width: 150},
                        {field: 'cost', title: '报销金额', width: 120},
                        {field: 'income_month', title: '入账月份', width: 100},
                        {field: 'check_status', title: '审核状态', width: 100},
                        {field: 'pay_status', title: '打款状态', width: 100},
                        {field: 'create_time', title: '创建时间', width: 180},
                        {title: '操作', width: 200, toolbar: '#expenseToolBar'}
                    ]],
                    page: true,
                    limit: 20,
                    height: 'full-200'
                });
            }

            // 初始化表格
            initTable();

            // 监听选项卡切换
            element.on('tab(expenseTabs)', function(data) {
                var layId = $(this).attr('lay-id');
                var tabMap = {
                    'all': '0',
                    'my': '1',
                    'pending': '2',
                    'reviewed': '3',
                    'copy': '4'
                };
                initTable(tabMap[layId]);
            });

            // 监听工具条
            table.on('tool(expenseTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    layer.open({
                        type: 2,
                        title: '报销详情',
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '100%'],
                        offset: 'r',
                        anim: 2,
                        content: '/finance/reimbursement/view/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        }
                    });
                } else if (layEvent === 'edit') {
                    layer.open({
                        type: 2,
                        title: '编辑报销',
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '100%'],
                        offset: 'r',
                        anim: 2,
                        content: '/finance/reimbursement/edit/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        },
                        end: function() {
                            table.reload('expenseTable');
                        }
                    });
                } else if (layEvent === 'delete') {
                    layer.confirm('确定删除这条报销记录吗？', function(index) {
                        $.ajax({
                            url: '/finance/reimbursement/del/',
                            type: 'POST',
                            data: JSON.stringify({id: data.id}),
                            contentType: 'application/json',
                            success: function(response) {
                                if (response.code === 0) {
                                    layer.msg('删除成功', {icon: 1});
                                    table.reload('expenseTable');
                                } else {
                                    layer.msg(response.msg, {icon: 2});
                                }
                            }
                        });
                        layer.close(index);
                    });
                }
            });

            // 新增报销
            window.addExpense = function() {
                layer.open({
                    type: 2,
                    title: '新增报销',
                    shadeClose: false,
                    shade: 0.3,
                    maxmin: true,
                    area: ['80%', '100%'],
                    offset: 'r',
                    anim: 2,
                    content: '/finance/reimbursement/add/',
                    success: function(layero, index) {
                        if (layero && typeof layero.css === 'function') {
                            layero.css({
                                'right': '0',
                                'top': '0',
                                'height': '100%'
                            });
                        }
                    },
                    end: function() {
                        table.reload('expenseTable');
                    }
                });
            };

            // 批量审批
            window.batchApproval = function() {
                var checkStatus = table.checkStatus('expenseTable');
                var data = checkStatus.data;
                if (data.length === 0) {
                    layer.msg('请选择要审批的报销记录', {icon: 2});
                    return;
                }
                layer.msg('批量审批功能开发中...', {icon: 0});
            };

            // 导出报销
            window.exportExpense = function() {
                layer.msg('导出功能开发中...', {icon: 0});
            };

            // 搜索报销
            window.searchExpense = function() {
                var code = $('#searchCode').val();
                var dateRange = $('#searchDateRange').val();
                var params = {};
                if(code) params.code = code;
                if(dateRange) params.date_range = dateRange;
                
                table.reload('expenseTable', {
                    where: params
                });
            };

            // 重置搜索
            window.resetSearch = function() {
                $('#searchCode').val('');
                $('#searchDateRange').val('');
                table.reload('expenseTable', {
                    where: {}
                });
            };

            // 刷新表格
            window.refreshTable = function() {
                table.reload('expenseTable');
                layer.msg('刷新成功', {icon: 1});
            };
        });
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="expenseToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
    </script>
</body>
</html>

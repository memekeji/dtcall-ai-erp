{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if object %}编辑报销{% else %}新增报销{% endif %}</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .form-container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            position: relative;
        }
        .form-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }
        .form-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }
        .form-header .subtitle {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        .form-body {
            padding: 30px;
        }
        .layui-form-item {
            margin-bottom: 25px;
        }
        .layui-form-label {
            width: 120px;
            font-weight: 500;
            color: #333;
            background: #f8f9fa;
            border-radius: 4px 0 0 4px;
        }
        .layui-input-block {
            margin-left: 120px;
        }
        .layui-input, .layui-textarea, .layui-select {
            border: 1px solid #e1e5e9;
            border-radius: 0 4px 4px 0;
            transition: all 0.3s ease;
        }
        .layui-input:focus, .layui-textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        .required-field::after {
            content: '*';
            color: #ff5722;
            margin-left: 4px;
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .section-title i {
            margin-right: 8px;
            color: #667eea;
        }
        .form-actions {
            text-align: center;
            padding: 20px 0;
            border-top: 1px solid #e1e5e9;
            background: #f8f9fa;
            margin: 30px -30px -30px -30px;
        }
        .layui-btn {
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .layui-btn-normal {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .layui-btn-normal:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .layui-btn-primary {
            background: #fff;
            border: 1px solid #d9d9d9;
            color: #666;
        }
        .layui-btn-primary:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .upload-area {
            border: 2px dashed #d9d9d9;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        .upload-icon {
            font-size: 48px;
            color: #d9d9d9;
            margin-bottom: 10px;
        }
        .amount-input {
            position: relative;
        }
        .amount-input::before {
            content: '¥';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-weight: 500;
            z-index: 10;
        }
        .amount-input .layui-input {
            padding-left: 30px;
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2>
                <i class="layui-icon layui-icon-dollar" style="margin-right: 10px;"></i>
                {% if object %}编辑报销申请{% else %}新增报销申请{% endif %}
            </h2>
            <p class="subtitle">请填写完整的报销信息，确保数据准确无误</p>
        </div>
        
        <div class="form-body">
            <form class="layui-form" method="post" lay-filter="expenseForm">
                {% csrf_token %}
                
                <!-- 基本信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-form"></i>
                        基本信息
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">报销编码</label>
                                <div class="layui-input-block">
                                    <input type="text" name="code" value="{{ form.code.value|default:'' }}" 
                                           placeholder="系统自动生成或手动输入" class="layui-input" required>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">企业主体</label>
                                <div class="layui-input-block">
                                    <select name="subject_id" class="layui-select" required>
                                        <option value="">请选择企业主体</option>
                                        <option value="1" {% if form.subject_id.value == "1" %}selected{% endif %}>主体公司A</option>
                                        <option value="2" {% if form.subject_id.value == "2" %}selected{% endif %}>主体公司B</option>
                                        <option value="3" {% if form.subject_id.value == "3" %}selected{% endif %}>主体公司C</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 金额信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-rmb"></i>
                        金额信息
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">报销金额</label>
                                <div class="layui-input-block amount-input">
                                    <input type="number" step="0.01" name="cost" value="{{ form.cost.value|default:'' }}" 
                                           placeholder="0.00" class="layui-input" required>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">入账月份</label>
                                <div class="layui-input-block">
                                    <input type="month" name="income_month" value="{{ form.income_month.value|default:'' }}" 
                                           class="layui-input" required>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 时间信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-date"></i>
                        时间信息
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label required-field">单据日期</label>
                        <div class="layui-input-block">
                            <input type="datetime-local" name="expense_time" value="{{ form.expense_time.value|default:'' }}" 
                                   class="layui-input" required>
                        </div>
                    </div>
                </div>

                <!-- 附件上传 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-upload"></i>
                        附件上传
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">相关附件</label>
                        <div class="layui-input-block">
                            <div class="upload-area" id="uploadArea">
                                <div class="upload-icon">
                                    <i class="layui-icon layui-icon-upload-drag"></i>
                                </div>
                                <p>点击或拖拽文件到此处上传</p>
                                <p style="color: #999; font-size: 12px;">支持 jpg, png, pdf, doc, xls 格式，单个文件不超过 10MB</p>
                            </div>
                            <input type="hidden" name="file_ids" value="{{ form.file_ids.value|default:'' }}">
                        </div>
                    </div>
                </div>

                <!-- 备注信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-edit"></i>
                        备注信息
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">备注说明</label>
                        <div class="layui-input-block">
                            <textarea name="remark" placeholder="请输入备注信息（选填）" 
                                      class="layui-textarea" rows="4">{{ form.remark.value|default:'' }}</textarea>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="form-actions">
                    <button class="layui-btn layui-btn-normal layui-btn-lg" lay-submit lay-filter="submit">
                        <i class="layui-icon layui-icon-ok"></i>
                        {% if object %}更新报销{% else %}提交报销{% endif %}
                    </button>
                    <button type="button" class="layui-btn layui-btn-primary layui-btn-lg" onclick="parent.layer.closeAll()" style="margin-left: 15px;">
                        <i class="layui-icon layui-icon-close"></i>
                        取消
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['form', 'layer', 'upload'], function() {
            var form = layui.form;
            var layer = layui.layer;
            var upload = layui.upload;
            
            // 文件上传
            upload.render({
                elem: '#uploadArea',
                url: '/upload/', // 上传接口
                multiple: true,
                drag: true,
                accept: 'file',
                acceptMime: 'image/*,application/pdf,.doc,.docx,.xls,.xlsx',
                before: function(obj) {
                    layer.load();
                },
                done: function(res) {
                    layer.closeAll('loading');
                    if(res.code === 0) {
                        layer.msg('上传成功');
                        // 更新文件ID
                        var currentIds = $('input[name="file_ids"]').val();
                        var newIds = currentIds ? currentIds + ',' + res.data.id : res.data.id;
                        $('input[name="file_ids"]').val(newIds);
                    } else {
                        layer.msg('上传失败：' + res.msg);
                    }
                },
                error: function() {
                    layer.closeAll('loading');
                    layer.msg('上传异常');
                }
            });
            
            // 表单验证
            form.verify({
                cost: function(value) {
                    if(!/^\d+(\.\d{1,2})?$/.test(value)) {
                        return '金额格式不正确，最多保留两位小数';
                    }
                    if(parseFloat(value) <= 0) {
                        return '报销金额必须大于0';
                    }
                    if(parseFloat(value) > 100000) {
                        return '单次报销金额不能超过10万元';
                    }
                }
            });
            
            // 监听提交
            form.on('submit(submit)', function(data) {
                var loadIndex = layer.load(2, {shade: [0.3, '#000']});
                
                // 这里可以添加额外的验证逻辑
                setTimeout(function() {
                    layer.close(loadIndex);
                    layer.msg('提交成功', {icon: 1}, function() {
                        parent.layer.closeAll();
                        if(parent.layui && parent.layui.table) {
                            parent.layui.table.reload('expenseTable');
                        }
                    });
                }, 1000);
                
                return true;
            });
            
            // 金额输入格式化
            $('input[name="cost"]').on('blur', function() {
                var value = $(this).val();
                if(value && !isNaN(value)) {
                    $(this).val(parseFloat(value).toFixed(2));
                }
            });
        });
    </script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发票管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <!-- 选项卡区域 -->
                <div class="layui-tab layui-tab-brief" lay-filter="invoiceTabs">
                    <ul class="layui-tab-title">
                        <li class="layui-this" lay-id="all">全部发票</li>
                        <li lay-id="my">我创建的</li>
                        <li lay-id="pending">待我审核</li>
                        <li lay-id="reviewed">我已审核</li>
                        <li lay-id="copy">抄送给我</li>
                    </ul>
                </div>
                
                <!-- 按钮和搜索区域 -->
                <div class="layui-row layui-col-space10" style="margin-top: 15px;">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-normal layui-btn-sm" onclick="addInvoice()">
                            <i class="layui-icon layui-icon-add-1"></i> 新增发票
                        </button>
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportInvoice()" style="margin-left: 8px;">
                            <i class="layui-icon layui-icon-export"></i> 导出
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <input type="text" id="searchInvoiceCode" placeholder="发票号码" class="layui-input" style="width: 120px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <select id="searchInvoiceStatus" lay-filter="searchInvoiceStatus" style="position: relative; z-index: 1;">
                                <option value="">开票状态</option>
                                <option value="0">未开票</option>
                                <option value="1">已开票</option>
                                <option value="2">已作废</option>
                            </select>
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchInvoice()" style="position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetSearch()" style="margin-left: 5px; position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="invoiceTable" class="layui-table" lay-filter="invoiceTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'form'], function() {
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;

            // 初始化表格
            function initTable(tab = '0') {
                table.render({
                    elem: '#invoiceTable',
                    url: '/adm/finance/invoice/datalist/?tab=' + tab,
                    cols: [[
                        {field: 'id', title: 'ID', width: 80},
                        {field: 'code', title: '发票号码', width: 150},
                        {field: 'amount', title: '发票金额', width: 120},
                        {field: 'invoice_title', title: '开票抬头', width: 200},
                        {field: 'open_status', title: '开票状态', width: 100},
                        {field: 'enter_status', title: '回款状态', width: 100},
                        {field: 'create_time', title: '创建时间', width: 180},
                        {title: '操作', width: 250, toolbar: '#invoiceToolBar'}
                    ]],
                    page: true,
                    limit: 20,
                    height: 'full-200'
                });
            }

            // 初始化表格
            initTable();

            // 监听选项卡切换
            element.on('tab(invoiceTabs)', function(data) {
                var layId = $(this).attr('lay-id');
                var tabMap = {
                    'all': '0',
                    'my': '1',
                    'pending': '2',
                    'reviewed': '3',
                    'copy': '4'
                };
                initTable(tabMap[layId]);
            });

            // 监听工具条
            table.on('tool(invoiceTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    layer.open({
                        type: 2,
                        title: '发票详情',
                        content: '/adm/finance/invoice/view/' + data.id + '/',
                        area: ['800px', '600px']
                    });
                } else if (layEvent === 'edit') {
                    layer.open({
                        type: 2,
                        title: '编辑发票',
                        content: '/adm/finance/invoice/edit/' + data.id + '/',
                        area: ['700px', '500px'],
                        end: function() {
                            table.reload('invoiceTable');
                        }
                    });
                } else if (layEvent === 'download') {
                    // 下载发票
                    window.open('/adm/finance/invoice/download/' + data.id + '/', '_blank');
                } else if (layEvent === 'delete') {
                    layer.confirm('确定删除这条发票记录吗？', function(index) {
                        $.ajax({
                            url: '/adm/finance/invoice/del/',
                            type: 'POST',
                            data: JSON.stringify({id: data.id}),
                            contentType: 'application/json',
                            success: function(response) {
                                if (response.code === 0) {
                                    layer.msg('删除成功', {icon: 1});
                                    table.reload('invoiceTable');
                                } else {
                                    layer.msg(response.msg, {icon: 2});
                                }
                            }
                        });
                        layer.close(index);
                    });
                }
            });
        });

        // 新增发票
        function addInvoice() {
            console.log('addInvoice function called');
            layui.use(['layer', 'table'], function() {
                var layer = layui.layer;
                var table = layui.table;
                
                layer.open({
                    type: 2,
                    title: '新增发票',
                    content: '/adm/finance/invoice/add/',
                    area: ['900px', '700px'],
                    success: function() {
                        console.log('发票弹窗打开成功');
                    },
                    end: function() {
                        table.reload('invoiceTable');
                    }
                });
            });
        }
        
        // 确保函数在全局作用域可用
        window.addInvoice = addInvoice;

        // 导出发票
        function exportInvoice() {
            layui.use(['layer'], function() {
                var layer = layui.layer;
                layer.msg('导出功能开发中...', {icon: 0});
            });
        }
        window.exportInvoice = exportInvoice;

        // 搜索发票
        function searchInvoice() {
            layui.use(['table'], function() {
                var table = layui.table;
                var code = $('#searchInvoiceCode').val();
                var status = $('#searchInvoiceStatus').val();
                var params = {};
                if(code) params.code = code;
                if(status) params.status = status;
                
                table.reload('invoiceTable', {
                    where: params
                });
            });
        }
        window.searchInvoice = searchInvoice;

        // 重置搜索
        function resetSearch() {
            layui.use(['table', 'form'], function() {
                var table = layui.table;
                var form = layui.form;
                
                $('#searchInvoiceCode').val('');
                $('#searchInvoiceStatus').val('');
                form.render('select');
                table.reload('invoiceTable', {
                    where: {}
                });
            });
        }
        window.resetSearch = resetSearch;

        // 刷新表格
        function refreshTable() {
            layui.use(['table', 'layer'], function() {
                var table = layui.table;
                var layer = layui.layer;
                
                table.reload('invoiceTable');
                layer.msg('刷新成功', {icon: 1});
            });
        }
        window.refreshTable = refreshTable;
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="invoiceToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="download">下载</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">删除</a>
    </script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待回款管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <h2>待回款管理</h2>
                <p>管理未回款和部分回款的发票记录</p>
                
                <!-- 按钮和搜索区域 -->
                <div class="layui-row layui-col-space10" style="margin-top: 15px;">
                    <div class="layui-col-md6">
                        <!-- 操作按钮区域 -->
                        <button class="layui-btn layui-btn-normal layui-btn-sm" onclick="addReceipt()">
                            <i class="layui-icon layui-icon-add-1"></i> 新增回款
                        </button>
                        <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="exportPendingPayment()" style="margin-left: 8px;">
                            <i class="layui-icon layui-icon-export"></i> 导出
                        </button>
                    </div>
                    <div class="layui-col-md6" style="text-align: right;">
                        <!-- 搜索区域 -->
                        <div class="layui-inline">
                            <input type="text" id="searchInvoiceCode" placeholder="发票号码" class="layui-input" style="width: 120px; position: relative; z-index: 1;">
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <select id="searchPaymentStatus" lay-filter="searchPaymentStatus" style="position: relative; z-index: 1;">
                                <option value="">回款状态</option>
                                <option value="0">未回款</option>
                                <option value="1">部分回款</option>
                            </select>
                        </div>
                        <div class="layui-inline" style="margin-left: 8px;">
                            <button type="button" class="layui-btn layui-btn-sm" onclick="searchPendingPayment()" style="position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" onclick="resetSearch()" style="margin-left: 5px; position: relative; z-index: 1;">
                                <i class="layui-icon layui-icon-refresh"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="pendingPaymentTable" class="layui-table" lay-filter="pendingPaymentTable"></table>
            </div>
        </div>
    </div>

    <!-- 表格工具栏模板 -->
    <script type="text/html" id="pendingPaymentToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
        <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="receipt">登记回款</a>
        <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="invoice">查看发票</a>
    </script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['element', 'table', 'layer', 'form'], function() {
            var element = layui.element;
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;

            // 初始化表格
            function initTable() {
                table.render({
                    elem: '#pendingPaymentTable',
                    url: '/adm/finance/pendingpayment/datalist/',
                    cols: [[
                        {field: 'id', title: 'ID', width: 80},
                        {field: 'code', title: '发票号码', width: 150},
                        {field: 'customer_name', title: '客户名称', width: 150},
                        {field: 'contract_name', title: '关联合同', width: 150},
                        {field: 'amount', title: '发票金额', width: 120},
                        {field: 'enter_amount', title: '已回款金额', width: 120},
                        {field: 'unpaid_amount', title: '未回款金额', width: 120},
                        {field: 'enter_status', title: '回款状态', width: 100},
                        {field: 'create_time', title: '创建时间', width: 180},
                        {title: '操作', width: 200, toolbar: '#pendingPaymentToolBar'}
                    ]],
                    page: true,
                    limit: 20,
                    height: 'full-200'
                });
            }

            // 初始化表格
            initTable();

            // 监听工具条
            table.on('tool(pendingPaymentTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    layer.open({
                        type: 2,
                        title: '发票详情 - ' + data.code,
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '100%'],
                        offset: 'r',
                        anim: 2,
                        content: '/adm/finance/invoice/view/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        }
                    });
                } else if (layEvent === 'receipt') {
                    layer.open({
                        type: 2,
                        title: '登记回款 - ' + data.code,
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '100%'],
                        offset: 'r',
                        anim: 2,
                        content: '/adm/finance/paymentreceive/create/?invoice_id=' + data.id,
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        },
                        end: function() {
                            table.reload('pendingPaymentTable');
                        }
                    });
                } else if (layEvent === 'invoice') {
                    layer.open({
                        type: 2,
                        title: '发票信息 - ' + data.code,
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '100%'],
                        offset: 'r',
                        anim: 2,
                        content: '/adm/finance/invoice/view/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        }
                    });
                }
            });
        });

        // 新增回款记录
        function addReceipt() {
            layui.use(['layer', 'table'], function() {
                var layer = layui.layer;
                var table = layui.table;
                
                layer.open({
                    type: 2,
                    title: '新增回款记录',
                    shadeClose: false,
                    shade: 0.3,
                    maxmin: true,
                    area: ['80%', '100%'],
                    offset: 'r',
                    anim: 2,
                    content: '/adm/finance/paymentreceive/create/',
                    success: function(layero, index) {
                        if (layero && typeof layero.css === 'function') {
                            layero.css({
                                'right': '0',
                                'top': '0',
                                'height': '100%'
                            });
                        }
                    },
                    end: function() {
                        table.reload('pendingPaymentTable');
                    }
                });
            });
        }
        
        // 确保函数在全局作用域可用
        window.addReceipt = addReceipt;

        // 导出待回款数据
        function exportPendingPayment() {
            layui.use(['layer'], function() {
                var layer = layui.layer;
                layer.msg('导出功能开发中...', {icon: 0});
            });
        }
        window.exportPendingPayment = exportPendingPayment;

        // 搜索待回款记录
        function searchPendingPayment() {
            layui.use(['table'], function() {
                var table = layui.table;
                var code = $('#searchInvoiceCode').val();
                var status = $('#searchPaymentStatus').val();
                var params = {};
                if(code) params.code = code;
                if(status) params.enter_status = status;
                
                // 重新加载表格
                table.reload('pendingPaymentTable', {
                    where: params,
                    page: {curr: 1}
                });
            });
        }
        window.searchPendingPayment = searchPendingPayment;

        // 重置搜索
        function resetSearch() {
            $('#searchInvoiceCode').val('');
            $('#searchPaymentStatus').val('');
            layui.use(['form', 'table'], function() {
                var form = layui.form;
                var table = layui.table;
                form.render('select');
                table.reload('pendingPaymentTable', {
                    where: {},
                    page: {curr: 1}
                });
            });
        }
        window.resetSearch = resetSearch;
    </script>
</body>
</html>

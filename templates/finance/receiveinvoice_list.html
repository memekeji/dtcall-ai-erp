{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收票管理</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-header">
                <div class="layui-btn-group">
                    <button class="layui-btn layui-btn-sm" onclick="addReceiveInvoice()">
                        <i class="layui-icon layui-icon-add-1"></i> 新增收票
                    </button>
                    <button class="layui-btn layui-btn-sm layui-btn-normal" onclick="exportData()">
                        <i class="layui-icon layui-icon-export"></i> 导出数据
                    </button>
                </div>
            </div>
            <div class="layui-card-body">
                <table id="receiveInvoiceTable" class="layui-table" lay-filter="receiveInvoiceTable"></table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['table', 'layer'], function() {
            var table = layui.table;
            var layer = layui.layer;

            // 初始化表格
            table.render({
                elem: '#receiveInvoiceTable',
                url: '/adm/finance/receiveinvoice/datalist/',
                cols: [[
                    {field: 'id', title: 'ID', width: 80},
                    {field: 'code', title: '发票号码', width: 150},
                    {field: 'invoice_title', title: '开票抬头', width: 200},
                    {field: 'amount', title: '发票金额', width: 120},
                    {field: 'open_time', title: '开票时间', width: 180},
                    {field: 'enter_status', title: '回款状态', width: 100},
                    {title: '操作', width: 200, toolbar: '#receiveInvoiceToolBar'}
                ]],
                page: true,
                limit: 20,
                height: 'full-200'
            });

            // 监听工具条
            table.on('tool(receiveInvoiceTable)', function(obj) {
                var data = obj.data;
                var layEvent = obj.event;

                if (layEvent === 'view') {
                    layer.open({
                        type: 2,
                        title: '收票详情',
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '90%'],
                        offset: 'r',
                        anim: 2,
                        content: '/adm/finance/receiveinvoice/view/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        }
                    });
                } else if (layEvent === 'edit') {
                    layer.open({
                        type: 2,
                        title: '编辑收票',
                        shadeClose: false,
                        shade: 0.3,
                        maxmin: true,
                        area: ['80%', '90%'],
                        offset: 'r',
                        anim: 2,
                        content: '/adm/finance/receiveinvoice/edit/' + data.id + '/',
                        success: function(layero, index) {
                            if (layero && typeof layero.css === 'function') {
                                layero.css({
                                    'right': '0',
                                    'top': '0',
                                    'height': '100%'
                                });
                            }
                        },
                        end: function() {
                            table.reload('receiveInvoiceTable');
                        }
                    });
                }
            });
        });

        // 新增收票
        function addReceiveInvoice() {
            layer.open({
                type: 2,
                title: '新增收票',
                shadeClose: false,
                shade: 0.3,
                maxmin: true,
                area: ['80%', '90%'],
                offset: 'r',
                anim: 2,
                content: '/adm/finance/receiveinvoice/add/',
                success: function(layero, index) {
                    if (layero && typeof layero.css === 'function') {
                        layero.css({
                            'right': '0',
                            'top': '0',
                            'height': '100%'
                        });
                    }
                },
                end: function() {
                    layui.table.reload('receiveInvoiceTable');
                }
            });
        }

        // 导出数据
        function exportData() {
            layer.msg('导出功能开发中...', {icon: 1});
        }
    </script>

    <!-- 工具栏模板 -->
    <script type="text/html" id="receiveInvoiceToolBar">
        <a class="layui-btn layui-btn-xs" lay-event="view">查看</a>
        <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="edit">编辑</a>
    </script>
</body>
</html>

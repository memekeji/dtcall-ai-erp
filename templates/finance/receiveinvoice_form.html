{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if object %}编辑收票{% else %}新增收票{% endif %}</title>
    <link rel="stylesheet" href="{% static 'layui/css/layui.css' %}">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .form-container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            padding: 20px 30px;
            position: relative;
        }
        .form-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }
        .form-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }
        .form-header .subtitle {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        .form-body {
            padding: 30px;
        }
        .layui-form-item {
            margin-bottom: 25px;
        }
        .layui-form-label {
            width: 120px;
            font-weight: 500;
            color: #333;
            background: #f8f9fa;
            border-radius: 4px 0 0 4px;
        }
        .layui-input-block {
            margin-left: 120px;
        }
        .layui-input, .layui-textarea, .layui-select {
            border: 1px solid #e1e5e9;
            border-radius: 0 4px 4px 0;
            transition: all 0.3s ease;
        }
        .layui-input:focus, .layui-textarea:focus {
            border-color: #43e97b;
            box-shadow: 0 0 0 2px rgba(67, 233, 123, 0.2);
        }
        .required-field::after {
            content: '*';
            color: #ff5722;
            margin-left: 4px;
        }
        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #43e97b;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .section-title i {
            margin-right: 8px;
            color: #43e97b;
        }
        .form-actions {
            text-align: center;
            padding: 20px 0;
            border-top: 1px solid #e1e5e9;
            background: #f8f9fa;
            margin: 30px -30px -30px -30px;
        }
        .layui-btn {
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .layui-btn-normal {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border: none;
        }
        .layui-btn-normal:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 233, 123, 0.4);
        }
        .layui-btn-primary {
            background: #fff;
            border: 1px solid #d9d9d9;
            color: #666;
        }
        .layui-btn-primary:hover {
            border-color: #43e97b;
            color: #43e97b;
        }
        .amount-input {
            position: relative;
        }
        .amount-input::before {
            content: '¥';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-weight: 500;
            z-index: 10;
        }
        .amount-input .layui-input {
            padding-left: 30px;
            font-size: 16px;
            font-weight: 500;
        }
        .invoice-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-received {
            background: #e8f5e8;
            color: #52c41a;
        }
        .status-pending {
            background: #fff7e6;
            color: #fa8c16;
        }
        .status-invalid {
            background: #fff2f0;
            color: #ff4d4f;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2>
                <i class="layui-icon layui-icon-file-b" style="margin-right: 10px;"></i>
                {% if object %}编辑收票记录{% else %}新增收票记录{% endif %}
            </h2>
            <p class="subtitle">请填写收到的发票信息，确保记录准确完整</p>
        </div>
        
        <div class="form-body">
            <form class="layui-form" method="post" lay-filter="receiveInvoiceForm">
                {% csrf_token %}
                
                <!-- 发票基本信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-form"></i>
                        发票基本信息
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">发票号码</label>
                                <div class="layui-input-block">
                                    <input type="text" name="code" value="{{ form.code.value|default:'' }}" 
                                           placeholder="请输入发票号码" class="layui-input" required>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">发票类型</label>
                                <div class="layui-input-block">
                                    <select name="invoice_type" class="layui-select" required>
                                        <option value="">请选择发票类型</option>
                                        <option value="1">增值税专用发票</option>
                                        <option value="2">普通发票</option>
                                        <option value="3">电子发票</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 客户信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-user"></i>
                        客户信息
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">关联客户</label>
                                <div class="layui-input-block">
                                    <select name="customer_id" class="layui-select" required>
                                        <option value="">请选择客户</option>
                                        <option value="1" {% if form.customer_id.value == "1" %}selected{% endif %}>客户A</option>
                                        <option value="2" {% if form.customer_id.value == "2" %}selected{% endif %}>客户B</option>
                                        <option value="3" {% if form.customer_id.value == "3" %}selected{% endif %}>客户C</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">开票抬头</label>
                                <div class="layui-input-block">
                                    <input type="text" name="invoice_title" value="{{ form.invoice_title.value|default:'' }}" 
                                           placeholder="请输入开票抬头" class="layui-input" required>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 金额信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-rmb"></i>
                        金额信息
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label required-field">发票金额</label>
                                <div class="layui-input-block amount-input">
                                    <input type="number" step="0.01" name="amount" value="{{ form.amount.value|default:'' }}" 
                                           placeholder="0.00" class="layui-input" required>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">收票状态</label>
                                <div class="layui-input-block">
                                    <select name="receive_status" class="layui-select">
                                        <option value="1">已收到</option>
                                        <option value="0">待收取</option>
                                        <option value="2">已作废</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 时间信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-date"></i>
                        时间信息
                    </div>
                    
                    <div class="layui-row layui-col-space15">
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">开票日期</label>
                                <div class="layui-input-block">
                                    <input type="date" name="invoice_date" class="layui-input">
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-md6">
                            <div class="layui-form-item">
                                <label class="layui-form-label">收票日期</label>
                                <div class="layui-input-block">
                                    <input type="date" name="receive_date" class="layui-input">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 备注信息 -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="layui-icon layui-icon-edit"></i>
                        备注信息
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">备注说明</label>
                        <div class="layui-input-block">
                            <textarea name="remark" placeholder="请输入备注信息（选填）" 
                                      class="layui-textarea" rows="4">{{ form.remark.value|default:'' }}</textarea>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="form-actions">
                    <button class="layui-btn layui-btn-normal layui-btn-lg" lay-submit lay-filter="submit">
                        <i class="layui-icon layui-icon-ok"></i>
                        {% if object %}更新收票{% else %}保存收票{% endif %}
                    </button>
                    <button type="button" class="layui-btn layui-btn-primary layui-btn-lg" onclick="parent.layer.closeAll()" style="margin-left: 15px;">
                        <i class="layui-icon layui-icon-close"></i>
                        取消
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static 'layui/layui.js' %}"></script>
    <script>
        layui.use(['form', 'layer', 'laydate'], function() {
            var form = layui.form;
            var layer = layui.layer;
            var laydate = layui.laydate;
            
            // 日期选择器
            if (laydate && laydate.render) {
                laydate.render({
                    elem: 'input[name="invoice_date"]',
                    type: 'date'
                });
                
                laydate.render({
                    elem: 'input[name="receive_date"]',
                    type: 'date',
                    value: new Date()
                });
            }
            
            // 表单验证
            form.verify({
                amount: function(value) {
                    if(!/^\d+(\.\d{1,2})?$/.test(value)) {
                        return '金额格式不正确，最多保留两位小数';
                    }
                    if(parseFloat(value) <= 0) {
                        return '发票金额必须大于0';
                    }
                }
            });
            
            // 监听客户选择变化
            if (form && form.on) {
                form.on('select(customer)', function(data) {
                    // 根据客户自动填充开票抬头
                    var customerNames = {
                        '1': '客户A公司',
                        '2': '客户B集团',
                        '3': '客户C有限公司'
                    };
                    if(data && data.value && customerNames[data.value]) {
                        $('input[name="invoice_title"]').val(customerNames[data.value]);
                    }
                });
            }
            
            // 监听提交
            form.on('submit(submit)', function(data) {
                var loadIndex = layer.load(2, {shade: [0.3, '#000']});
                
                setTimeout(function() {
                    layer.close(loadIndex);
                    layer.msg('保存成功', {icon: 1}, function() {
                        parent.layer.closeAll();
                        if(parent.layui && parent.layui.table) {
                            parent.layui.table.reload('receiveInvoiceTable');
                        }
                    });
                }, 1000);
                
                return true;
            });
            
            // 金额输入格式化
            $('input[name="amount"]').on('blur', function() {
                var value = $(this).val();
                if(value && !isNaN(value)) {
                    $(this).val(parseFloat(value).toFixed(2));
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if notice %}编辑公告{% else %}新增公告{% endif %}</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div style="padding: 20px;">
        <form class="layui-form" method="post">
            {% csrf_token %}
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md8">
                    <div class="layui-form-item">
                        <label class="layui-form-label">公告标题 <span style="color: red;">*</span></label>
                        <div class="layui-input-block">
                            {{ form.title }}
                        </div>
                    </div>
                </div>
                <div class="layui-col-md4">
                    <div class="layui-form-item">
                        <label class="layui-form-label">公告类型</label>
                        <div class="layui-input-block">
                            {{ form.notice_type }}
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">公告内容 <span style="color: red;">*</span></label>
                <div class="layui-input-block">
                    {{ form.content }}
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">过期时间</label>
                        <div class="layui-input-block">
                            {{ form.expire_time }}
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">设置</label>
                        <div class="layui-input-block">
                            {{ form.is_top }}<span style="margin-right: 15px;">置顶</span>
                            {{ form.is_published }}<span>发布</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">目标部门</label>
                <div class="layui-input-block">
                    {{ form.target_departments }}
                    <div class="layui-form-mid layui-word-aux">不选择则发送给所有部门</div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">目标用户</label>
                <div class="layui-input-block">
                    {{ form.target_users }}
                    <div class="layui-form-mid layui-word-aux">不选择则发送给所有用户</div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" type="submit">保存</button>
                    <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">返回</button>
                </div>
            </div>
        </form>
    </div>
    
    <script src="/static/layui/layui.js"></script>
    <script src="/static/js/jquery.min.js"></script>
    <script>
        layui.use(['form', 'layer'], function() {
            var form = layui.form;
            var layer = layui.layer;
            
            form.render();
        });
        
        function closeLayer() {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if notice %}编辑公告{% else %}新增公告{% endif %}</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div style="padding: 20px;">
        <form class="layui-form" method="post">
            {% csrf_token %}
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md8">
                    <div class="layui-form-item">
                        <label class="layui-form-label">公告标题 <span style="color: red;">*</span></label>
                        <div class="layui-input-block">
                            {{ form.title }}
                        </div>
                    </div>
                </div>
                <div class="layui-col-md4">
                    <div class="layui-form-item">
                        <label class="layui-form-label">公告类型</label>
                        <div class="layui-input-block">
                            {{ form.notice_type }}
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">公告内容 <span style="color: red;">*</span></label>
                <div class="layui-input-block">
                    {{ form.content }}
                </div>
            </div>
            
            <div class="layui-row layui-col-space15">
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">过期时间</label>
                        <div class="layui-input-block">
                            {{ form.expire_time }}
                        </div>
                    </div>
                </div>
                <div class="layui-col-md6">
                    <div class="layui-form-item">
                        <label class="layui-form-label">设置</label>
                        <div class="layui-input-block">
                            {{ form.is_top }}<span style="margin-right: 15px;">置顶</span>
                            {{ form.is_published }}<span>发布</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">目标部门</label>
                <div class="layui-input-block">
                    {{ form.target_departments }}
                    <div class="layui-form-mid layui-word-aux">不选择则发送给所有部门</div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <label class="layui-form-label">目标用户</label>
                <div class="layui-input-block">
                    {{ form.target_users }}
                    <div class="layui-form-mid layui-word-aux">不选择则发送给所有用户</div>
                </div>
            </div>
            
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" type="submit">保存</button>
                    <button type="button" class="layui-btn layui-btn-primary" onclick="closeLayer()">返回</button>
                </div>
            </div>
        </form>
    </div>
    
    <script src="/static/layui/layui.js"></script>
    <script src="/static/js/jquery.min.js"></script>
    <script>
        function getCookie(name) {
            var cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        layui.use(['form', 'layer'], function() {
            var form = layui.form;
            var layer = layui.layer;
            
            form.render();
            
            // 表单提交处理
            $('form').on('submit', function(e) {
                e.preventDefault();
                
                var submitBtn = $(this).find('button[type="submit"]');
                var originalText = submitBtn.text();
                submitBtn.prop('disabled', true).text('保存中...');
                
                $.ajax({
                    url: $(this).attr('action') || '{% url "system:admin_office:notice_create" %}',
                    type: 'POST',
                    data: $(this).serialize(),
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    success: function(response) {
                        // 获取当前弹窗的索引
                        var index = parent.layer.getFrameIndex(window.name);
                        
                        // 在父窗口显示成功消息
                        parent.layer.msg('保存成功', {icon: 1});
                        
                        // 刷新父窗口的公告列表
                        if (parent.location.href.indexOf('/system/admin_office/notice/') !== -1) {
                            parent.location.reload();
                        }
                        
                        // 关闭弹窗
                        parent.layer.close(index);
                    },
                    error: function(xhr, status, error) {
                        var errorMsg = '保存失败';
                        try {
                            var response = JSON.parse(xhr.responseText);
                            errorMsg = response.message || errorMsg;
                            if (response.errors) {
                                errorMsg = Object.values(response.errors).flat().join('; ');
                            }
                        } catch(e) {}
                        
                        layer.msg(errorMsg, {icon: 2});
                        submitBtn.prop('disabled', false).text(originalText);
                    }
                });
            });
        });
        
        function closeLayer() {
            var index = parent.layer.getFrameIndex(window.name);
            parent.layer.close(index);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
